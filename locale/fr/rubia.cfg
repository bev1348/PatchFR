[item-description]
biorecycling-science-pack=Ça pue le progrès.
makeshift-biorecycling-science-pack=Des blocs de métal baignent vaguement dans un liquide brun clair. C'est très rudimentaire.
ghetto-biorecycling-science-pack=Des morceaux de métal sont coincés dans une boue brune épaisse. Vous êtes sur le point de faire une découverte, mais pas tout à fait.
rubia-biofusion-science-pack=Un mélange malsain né de l'association de l'ADN d'êtres vivants provenant de différentes planètes. Toujours fraîchement préparé.
rubia-cupric-scrap=Un mélange apparemment aléatoire de déchets riches en cuivre.
rubia-ferric-scrap=Un mélange apparemment aléatoire de déchets riches en fer.
rubia-bacteria-A=Vous l'avez nommé ainsi en raison de la rapidité avec laquelle elle digère les déchets.
rubia-bacteria-B=Vous l'avez nommé ainsi en raison de la manière méthodique dont il digère la saleté.
craptonite-chunk=Un morceau de matière durci par les bombardements constants contre la surface de la planète Rubia.
craptonite-frame=Le matériau le plus durable de la galaxie s'est transformé en une structure poreuse utilisable.
rubia-wind-turbine=Convertit l'énergie éolienne en électricité.
garbo-grabber=Récupère les [item=craptonite-chunk] à partir des astéroïdes de déchets qui ont été détruits dans son rayon d'action à l'aide de munitions d'attaque physique ou explosives.
crapapult=Jetez vos problèmes à tous vents pour vous débarrasser des objets indésirables. Maintenant, vous faites partie du problème.

