[mod-description]
rubia=○🌐Découvrez Rubia, la planète du vent. Toute votre usine doit faire face au vent, car un flot incessant de déchets s'abat sur votre base. Les convoyeurs et les bras fonctionnent différemment sur Rubia, ce qui entraîne des défis de construction uniques, inconnus sur les autres planètes.

