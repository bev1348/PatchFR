[technology-description]
;Tout ce qui tombe de l'orbite sera bombardé de déchets et subira de graves dommages dus à l'impact. Les fusées normales qui décollent de la surface ne sont pas non plus sûres. Une meilleure technologie est nécessaire pour y remédier. 
planet-discovery-rubia=Une planète balayée par les vents et recouverte de déchets. La faible gravité et les vents violents soulèvent constamment les déchets et les projettent à grande vitesse, y compris en orbite basse. Des micro-organismes utiles vivent sur cette planète et permettent de transformer les déchets en matériaux plus utiles. \n[img=utility/warning_icon]Consultez les [font=default-semibold]"Trucs et astuces"[/font] pour obtenir des informations sur la planète.
operation-iron-man=Des systèmes de guidage avancés et des conteneurs blindés permettent de larguer en toute sécurité des capsules de marchandises dans l'espace aérien hostile de Rubia.
rubia-unknown-technology=Vous devez approfondir vos recherches sur Rubia pour voir ce qui vous attend.
rubia-progression-stage1=Vous avez découvert une bactérie qui se nourrit de déchets et l'avez baptisée __ITEM__rubia-bacteria-A__. La science est pratiquée un peu différemment par ici.
rubia-progression-stage1B=Ne faites plus qu'un avec les déchets. Avec une compréhension rudimentaire de la crassapulte, vous êtes prêt à construire votre première base, un véritable tas d'ordures.
rubia-progression-stage2=Votre étude assidue de la garbologie vous a conduit à découvrir un ami improbable : un petit gars que vous avez baptisé sans aucun humour __ITEM__rubia-bacteria-B__.
rubia-progression-stage3=Vous avez étudié les déchets. Vous vous êtes baigné dedans. Vous avez été façonné par eux. Vous êtes enfin prêt à passer au niveau supérieur en matière de déchets.
craptonite-processing=Ce n'est pas parce que vous avez découvert le matériau le plus résistant de la galaxie et que vous pouvez techniquement lui donner le nom que vous voulez que vous devez le faire.
rubia-armored-train=Vous êtes enfin en mesure de construire des trains capables de braver les vents de la planète Rubia.
rubia-project-trashdragon=Fabriquez des fusées blindées capables de résister aux épais barrages de débris présents dans l'espace aérien de Rubia.
rubia-scrapapalooza=Mieux que Crastoberfest. Au moins, tu as mis un "s" dans le nom.
rubia-sniper-turret=Les débutants optent pour une mise à niveau afin d'obtenir une plus grande portée. Les experts optent pour une mise à niveau afin de réduire l'impact sur les perfomances du jeu et le bruit.
rubia-postgame-biorecycle-part1=Seul un véritable magnat des déchets comme vous peut apprécier la valeur d'une utilisation aussi excentrique de ces bactéries.
rubia-long-bulk-inserter=Équipez les bras longs d'un châssis robuste en crastonite capable de supporter le couple important généré par le balancement rapide d'un grand nombre d'objets.
rubia-long-stack-inserter=Le joyau de Rubia. Doté d'un cadre en crastonite résistant, d'une base lourde en uranium et de poignées flexibles en fibre de carbone, ce bras empileur permet de déposer rapidement des piles d'objets à une plus grande distance. Plus lent qu'un bras empileur normal.
craptonite-wall=Utilisez des renforts en crastonite pour construire les structures défensives les plus résistantes de la galaxie. Ces murs peuvent empêcher les [entity=medium-trashsteroid] de les franchir.
craptonite-axe=Remplacez votre hache en acier de mauvaise qualité par une hache en crastonite durable, capable d'extraire des minerais beaucoup plus efficacement. Débloquez l'accès à divers accessoires en crastonite.
rubia-efficiency-module4=Fixer un convertisseur crastalytique à votre machine provoquera la colère des neutrons de toutes les particules polluantes qui le traversent, les faisant exploser et émettre le doux arôme de la crastonite.
rubia-holmium-craptalysis=Le passage du minerai dans un convertisseur crastalytique agresse les atomes d'holmium, les rendant plus enclins à s'échapper et à entrer plus efficacement en solution.
craptonite-productivity=Vos privilèges en matière de nommage sont par la présente révoqués. Nous avons baptisé celui-ci "Productivité de Rubia", et vous allez l'adorer.
rubia-braking-force-8=Tes trains sont lents, et j'ai besoin de vitesse.
rubia-biofusion-science-pack=Dernier défi de Rubia : créer un mélange malsain à partir de l'ADN d'êtres vivants provenant de différentes planètes. Facultatif.
rubia-biofusion-science-pack-removed=Supprimer Gléba de votre partie vous empêche d'accéder au contenu après à la fin du jeu sur Rubia. Dommage pour vous.\nCauses actuelles : __1__
rubia-nutrients-from-sludge=Apprenez à filtrer et à transformer les matières organiques utiles issues des boues bactériennes en biocarburants pratiques sur Rubia.
rubia-nutrient-productivity=Produisez des nutriments plus efficacement.
rubia-biochamber-productivity-bonus=Votre vaste expérience dans le domaine des produits biologiques vous permet d'utiliser la chambre biologique plus efficacement.
rubia-biofusion-promethium-science-pack=Tirez parti de votre expertise en biologie interplanétaire pour fabriquer plus efficacement le __ITEM__promethium-science-pack__.
rubia-cargo-landing-pad-capacity=Votre expérience dans le contrôle de cargaisons à travers l'espace aérien hostile de Rubia vous permet de créer une zone d'atterrissage supplémentaire par planète.
rubia-bio-utility-science-pack=Votre expertise en biologie vous permet de déceler la vie même dans les robots ! Fabriquez le __ITEM__utility-science-pack__ dans une __ENTITY__biochamber__ avec une efficacité accrue. Votre explication sur le fonctionnement de ce procédé est très attendue, Monsieur l'expert.
rubia-bio-flying-robot-frame=Dans ton esprit malade, tu imagines des bactéries fabriquant des carcasses de robots en déplaçant les minuscules pièces avec leurs petites mains bactériennes. Elles sont inefficaces avec les pièces, mais elles sont rapides.
;Craptonite tools
rubia-craptonite-boots=Bottes renforcées en crastonite avec bordures et semelles en alliage d'holmium pour courir plus vite. Sentez les semelles intérieures en crastonite à chaque pas.
rubia-craptonite-hook=Un bracelet en crastonite doté d'un puissant mécanisme qui lance un crochet en tungstène muni d'une chaîne pour atteindre des objets situés à grande distance.
rubia-craptonite-satchel=Un sac robuste fabriqué à partir de fibre de carbone résistante et doté d'une armature solide en crastonite pour contenir plus de déchets.
rubia-craptonite-cannister=Conservez une bouteille d'Eau du bain de la joueuse bien fraîche dans un bidon renforcé en crastonite. Refroidie grâce à la cryogénie d'Aquilo, une gorgée vous donnera toujours de l'énergie, mais vous rendra un peu malade.
rubia-craptonite-eyedrop=Vos yeux piquent lorsqu'ils s'imprègnent de l'eau du bain de la joueuse, afin qu'Elle puisse améliorer votre vision. Elle exige un tribut en échange de Sa bénédiction. Les paramètres du mod vous permettent de refuser Sa générosité.
;Other mods
rubia-craptonite-circlet=Un puissant diadème en crastonite incrusté d'un bloc du meilleur Moshite de la galaxie. Vous pensez qu'il vous aide à communiquer avec les machines.
rubia-craptonite-earring=Une boucle d'oreille en crastonite incrustée de plutonium pour vous garder au chaud et guider les neutrons vers leur juste place.
rubia-craptonite-glove=Gantelets avec catalyseur en platine renforcé par un matériau crastonite pour vous permettre de fabriquer des objets plus rapidement.
rubia-craptonite-lamp=Gardez une ampoule à faible consommation d'énergie sur votre combinaison. Sa structure en crastonite résistante peut supporter une pression élevée pour éclairer les profondeurs les plus sombres.
rubia-craptonite-belt-buckle=Fabriquez une boucle de ceinture en crastonite incrustée d'une météorite précieuse provenant de la __PLANET__muluna__. Le cosmos veillera à ce que votre pantalon reste bien en place.
rubia-craptonite-bracer=Cube cube cube cube, cube Cube cube cube--cube cube Cube cube. Cube cube, cube cube cube Cube! Cube cube cube cube cube cube cube... cube ? CUBE !!!?!? Cube cube cube Cube cube cube CUBE Cube; Cube, Cube cube. cube cube cube cube (cube cube Cube), cube Cube cube cube ? CUBE/cube/cube cube Cube cube cube : cube, cube, Cube, cube cube. Cube cube cube.
rubia-craptonite-hip-replacement=À l'aide de méthodes douteuses, remplacez le cartilage de votre hanche par une articulation à rotule en crastonite durable, fixée à vos os à l'aide de titane de Jahtran. Cette articulation plus solide vous permet de porter des charges plus lourdes [font=default-tiny-bold]avec quelques effets secondaires disgracieux.[/font]
rubia-craptonite-codpiece=Augmentez votre confiance en vous grâce à une coquille dorée brillante qui protège vos précieux bijoux avec une armature en crastonite. Elle vous rappellera constamment de toujours tirer le meilleur parti de ce que vous avez, même si ce n'est pas aussi gros que vous l'espériez.
rubia-craptonite-wood-charm=Un mousqueton en crastonite permet à ces jolis pendentifs en bois de se balancer à vos côtés, imposant le respect à tous les arbres qui croisent votre regard.
rubia-craptonite-mask=Ce masque criard vous donne l'impression de pouvoir voir à travers le temps.
rubia-craptonite-tiber-implant=Cet implant enfonce douloureusement ses aiguilles dans votre peau, garantissant que votre sang reste toujours en contact étroit avec le Tiberium. Cela vous permet de voir le Tiberium partout.
rubia-craptonite-grillz=Montrez à l'univers que votre mauvais goût n'a pas de limites avec ces grilles dentaires en zinc plaqué, renforcées avec de la crastonite. Vos dents seront violemment conductrices grâce à cette "amélioration".
rubia-craptonite-stopwatch=Vous avez fabriqué ce chronomètre à partir de nombreux petits éléments composés d'actinides exotiques, logés dans un boîtier en crastonite. Malgré votre sens douteux de la mode, son cadran lumineux vous permet d'être ponctuel pour tout événement de désintégration. En gardant cet objet hautement radioactif près de vous en permanence, vous êtes sûr qu'il vous survivra.
rubia-craptonite-rainbow-brooch=Ce bijou fantaisie en crastonite renferme une puissante pierre précieuse prismatique qui fait rayonner celui qui le porte.
;WIP
rubia-craptonite-carrot=Le mécanisme de cette prise de Rabbascan absorbe les faibles signatures énergétiques. Ses composants internes en crastonite résistent à des vibrations violentes et soutenues lorsqu'elle transmet l'énergie à l'utilisateur.
rubia-progression-stage1-compat-k2so=L'esprit de Krastor coule dans tes veines. Les connaissances bactériennes ancestrales utilisées pour fabriquer des gadgets inutiles pénètrent ton crâne épais.

[modifier-description]
rubia-project-trashdragon=Permet le lancement de fusées depuis Rubia.
operation-iron-man-effect=Les largages de cargaison contenant des joueurs ou des marchandises peuvent atterrir en toute sécurité sur Rubia.
biofusion-bacteria-release=La propagation des bactéries clés de Gléba n'est plus limitée à leur surface.
rubia-craptonite-lamp=Augmentation du faisceau lumineux des personnages dans la tranchée.
rubia-bio-utility-science-pack-unlock=__ITEM__utility-science-pack__ peut désormais être réalisé dans la __ENTITY__biochamber__ avec une efficacité accrue.
cargo-landing-pad-count=Nombre maximal d'aires d'atterrissage cargo : +__1__
rubia-zoom-modifier=Plage de zoom +__1__%
rubia-sniper-turret-attack-bonus=Degâts de la __ITEM__rubia-sniper-turret__ : +__1__

