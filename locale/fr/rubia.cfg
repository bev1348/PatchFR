[tips-and-tricks-item-description]
rubia-briefing=[img=utility/warning_icon][img=utility/warning_icon][color=250,250,0][font=default-semibold]AVERTISSEMENT ![/font][/color][img=utility/warning_icon][img=utility/warning_icon]  Les passagers des capsules cargo subiront de GRAVES dommages dus à l'impact lorsqu'ils entreront dans l'espace aérien de Rubia. Pour atterrir en toute sécurité sur Rubia, vous devez être capable de résister à des dommages importants dus à l'impact, sinon [color=250,250,0][font=default-semibold]VOUS MOURREZ À L'ATTERRISSAGE[/font][/color]. Les prérequis pour [technology=planet-discovery-rubia] permettent de fabriquer tout le nécessaire pour atterrir. Après avoir vaincu Rubia, [technology=planetslib-rubia-cargo-drops] permet de voyager librement sans l'équipement requis.\n\n[planet=rubia] est une planète poubelle balayée par des vents constants de la force d'un ouragan. Le vent limite l'orientation de plusieurs entités et bombarde constamment la surface d'astéroïdes de déchets. La planète est recouverte de déchets riches en ressources, qui peuvent être convertis en matériaux utiles à l'aide de microbes dans une [entity=biorecycling-plant]. Les nombreux débris atmosphériques empêchent les fusées de décoller en toute sécurité sans [technology=rubia-project-trashdragon], et empêchent les capsules de transport d'envoyer des fournitures sans [technology=planetslib-rubia-cargo-drops].
rubia-trashsteroid-tips=Les asteroïdes de déchets constituent une menace permanente sur Rubia :\n   • L'[entity=medium-trashsteroid] bombardera votre base et nécessitera des tourelles pour se défendre.\n   • Les asteroïdes de déchets qui tombent infligent des dégâts avec une petite probabilité d'infliger un coup critique, qui est calculé une fois par asteroïde de déchets.\n   • La [entity=cargo-pod] subira de GRAVES dégâts d'impact à son entrée, sans [technology=planetslib-rubia-cargo-drops].\n   • Le [entity=rocket-silo] ne peut pas lancer de fusée en toute sécurité sans [technology=rubia-project-trashdragon].\n   • Le [entity=garbo-grabber] ne peut collecter que des [item=craptonite-chunk] provenant de asteroïdes de déchets détruits par des dégâts physiques/explosifs dans leur rayon d'action.\n   • Certaines entités sont immunisées contre les bombardements, telles que les [item=rail], [entity=rail-signal], [entity=rubia-armored-locomotive], les entités associées et toute entité fabriquée avec des [item=craptonite-frame].\n   • Le [entity=craptonite-wall] bloque la trajectoire des astéroïdes de déchets, mais ne peut pas empêcher qu'elles apparaissent. Les murs sont immunisés contre leur impact, mais les autres entités prises dans la zone d'effet subissent toujours des dégâts normaux.\n   • [technology=physical-projectile-damage-1]/[technology=weapon-shooting-speed-1]/etc. rendront les [entity=medium-trashsteroid] plus volumineux. Les niveaux technologiques plus élevés vous donnent toujours un avantage substantiel, mais pas aussi important que vous pourriez le penser.\n   • Les paramètres de difficulté du mod Rubia ajustent la résistance et les dégâts infligés par les astéroïdes de déchets.\n\n[font=default-semibold]Conseils pour les Mégabases et les performances :[/font]\n   • Ne pas observer Rubia réduira considérablement le coût en performance du jeu, car une grande partie du temps est consacrée au rendu des astéroïdes de déchets.\n   • Les astéroïdes de déchets n'apparaissent que dans les blocs contenant quelque chose qui leur est vulnérable OU dans les blocs visibles par le joueur.\n   • N'ayez pas peur d'explorer de vastes zones de la surface de Rubia. J'ai passé des semaines à optimiser les astéroïdes de déchets afin d'éviter de gaspiller du temps e processeur sur des blocs inutiles de la carte.\n   • Les astéroïdes de déchets morts ne coûtent rien en performances.\n   • Les paramètres du mod "Carte > Rubia > Mode Mégabases" réduisent les coûts en performance pour les très grandes bases, mais immobilisent les astéroïdes de déchets.
rubia-wind-tips=Les vents d'est auront les effets suivants :\n   • Le [entity=inserter] et le [entity=splitter] ne peuvent déplacer les objets que vers la droite.\n   • Le [entity=transport-belt], le [entity=underground-belt], et la [entity=electric-mining-drill] ne peuvent pas déplacer les objets vers la gauche.\n   • Le [entity=logistic-robot] ne peut pas se déplacer en toute sécurité vers le [entity=requester-chest], le [entity=buffer-chest], le [entity=active-provider-chest], ou le [entity=rocket-silo].\n   • La [entity=locomotive], le [entity=cargo-wagon], le [entity=recycler], et les entités associées ne peuvent pas résister au vent.\n   • L'[entity=rubia-wind-turbine] produira de l'électricité.\n\n-----------\nListe complète des entités interdites sur Rubia : 
rubia-crapapult-tips=La [entity=crapapult] peut faire disparaître [color=250,250,0][font=default-semibold]presque tous les objets[/font][/color] en les projetant dans les vents de Rubia.\nDe nombreuses technologies sont étudiées en lançant un grand nombre d'objets spécifiques. La crastapulte n'est PAS un bâtiment militaire.
rubia-garbo-grabber-tips=Utiliser des munitions physiques/explosives pour détruire un [entity=medium-trashsteroid] à portée d'un [entity=garbo-grabber] lui permet de collecter des [item=craptonite-chunk].
rubia-craptonite-wall-tips=Le [entity=craptonite-wall] peut bloquer la trajectoire d'un [entity=medium-trashsteroid].

