[alert]
wind_correction_notification=Le vent a fait tourner ta machine !
wind_block_notification=Le vent a bloqué cette orientation !
wind_full_block_notification=Le vent a bloqué cette machine !
pre-rubia-cutscene-prepared=Vous vous sentez prêt pour Rubia, mais Rubia est-elle prête pour vous ?
pre-rubia-cutscene-unprepared=Vous avez le sentiment désagréable de ne pas être suffisamment préparé pour Rubia, comme si vous aviez oublié de lire quelque chose d'important avant de partir.
pre-rubia-cutscene-unprepared-naked=Vous sentez un frisson vous parcourir l'échine. Vous êtes complètement nu, et ce voyage se terminera par une mort certaine.
pre-rubia-cutscene-unprepared-low-shield=Tu te sens presque nu. Tu n'as pas suffisamment de protection pour atterrir vivant sur Rubia.
pre-rubia-cutscene-unprepared-medium-shield=Vous avez l'impression de ne disposer que de la moitié du matériel nécessaire pour atterrir sur Rubia sans mourir.
pre-rubia-cutscene-unprepared-almost-shield=Vous avez l'impression d'être tout juste à court de ce dont vous avez besoin pour atterrir sur Rubia sans mourir.
pre-rubia-cutscene-unprepared-too-close=Vous n'êtes pas sûr d'avoir ce qu'il faut pour atterrir sur Rubia sans mourir. Le résultat semble trop serré pour être certain.
;⚠️ = [img=utility/warning_icon]
landing-cutscene-part1=[img=utility/danger_icon] Coque endommagée
landing-cutscene-part2=[img=utility/danger_icon] Propulseurs d'atterrissage détruits
landing-cutscene-part3=[img=utility/danger_icon] Propulseurs de secours endommagés. Préparez-vous à l'impact
on-player-died-on-entry=Vous êtes mort des suites de graves dommages causés par l'impact lors de votre entrée dans l'atmosphère de la planète. Il vous faudrait être capable d'encaisser davantage de dommages pour survivre à ce voyage.
landing-cutscene-abort-external-mod=(Rubia) : Vous ne pouvez pas atterrir sur la planète Rubia sans protection supplémentaire. Vous utilisez un mod qui permet d'éviter les voyages spatiaux, mais vous devez tout de même remplir les conditions requises pour atterrir en toute sécurité sur Rubia. Veuillez consulter le résumé sur la planète Rubia pour plus de détails.
promethium_warning=⚠️ Vous disposez d'une productivité de recherche infinie, et Rubia a ajouté son pack de science à son coût. Ce comportement peut être désactivé dans les paramètres du mod si vous ne le souhaitez pas. Cet avertissement n'apparaîtra plus dans cette sauvegarde. 
promethium_warning-part2=⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️
rocketizer-warning=⚠️ Vous aviez un __ENTITY__rci-rocketizer__ dans votre base avant d'installer Rubia. Rubia modifie par défaut les conditions de déverrouillage et la recette de cet objet. Ce comportement peut être activé ou désactivé dans les Paramètres de mods. Cet avertissement n'apparaîtra plus dans cette sauvegarde.
rubia-rocket-silo-setting-warning=[img=utility/danger_icon]AVERTISSEMENT : le [entity=logistic-robot] ne peut pas se rendre aux silos de fusées sur Rubia. Désactivation des demandes logistiques automatiques.

[rubia-crapapult]
yeet-item=Lancer __1__
yeet-recipe=Lancer __1__
yeet-item-description=Lancer __1__ dans le vent à l'aide d'une __ENTITY__crapapult__.
yeet-recipe-description=Lancer __1__ dans le vent à l'aide d'une __ENTITY__crapapult__.

[rubia-lore]
rubia-notice-prestring=(Rubia)
spidertron-mine-hint-part1=Vous découvrez une étrange bactérie qui digère la structure métallique du spidertron. Vous nommez cette espèce [font=compi]"__ITEM__rubia-bacteria-A__"[/font], sans vous soucier du jugement des autres.
spidertron-mine-hint-part2=Vous ne pouvez pas vous empêcher de penser à ce premier accident de spidertron. Vous avez l'idée de construire un gros canon qui [font=compi]propulse les objets indésirables dans le vent.[/font] Vous appelez votre invention [font=compi]"__ENTITY__crapapult__"[/font] et vous riez de votre génial jeu de mots.
spidertron-mine-part1=Ce spidertron avait une demande logistique pour un certain type de cube.
spidertron-mine-part2=La cargaison de ce spidertron contenait une "Carte Contem□□□□□on" usée. Ne sachant pas comment l'utiliser, vous la jetez au vent, pour ne plus jamais la revoir.
spidertron-mine-part3=Ce spidertron comporte un disque sur lequel on peut lire "Fas□□□ □□□n Light Th□□□□: □□rt C." Il est irréparable et finit par se désagréger dans votre inventaire.
spidertron-mine-part4=D'après tous ces spidertrons que vous avez récupérés, il est clair que le cube, s'il a jamais existé ici, n'est définitivement plus sur cette planète.
spidertron-mine-destroyer-trap=En fouillant dans ce spidertron, vous déclenchez accidentellement des capsules destructrices à l'intérieur.
spidertron-mine-destroyer-trap-2=Vous vous demandez ce qui est arrivé sur Rubia pour justifier la construction de ces robots destructeurs.
train-stop-mine-part1=Cet arrêt de train rouillé porte une note usée : "J'ai raté les proportions. Veuillez corriger - Trangar"
train-stop-mine-part2=Ce message ne contient que le mot "ZIGGURAT" gravé à plusieurs reprises.
train-stop-mine-part3=Cet arrêt de train s'appelait autrefois "Grak Pack".
train-stop-mine-part4=Cet article contient une note de "□□skid", détaillant les efforts qu'il déploie pour cacher sa passion pour les spaghettis à ses collègues.
train-stop-mine-part5=Sous cet arrêt de train, vous trouvez un livre en lambeaux : "Anomancie : Traité sur la lecture des plis et des rides de l'anus."
train-stop-mine-part5-2=Après avoir parcouru quelques pages, le vent vous l'arrache des mains. Vous vous demandez si vous pourriez en trouver un nouvel exemplaire en ligne.
train-stop-mine-part6=Il y a un enregistrement coincé dans ces décombres, mais il est indéchiffrable. Vous transmettez ces données à votre base principale pour analyse.
train-stop-mine-part6-2=L'analyse de l'enregistrement que vous avez trouvé plus tôt est terminée. Les archives indiquent la construction d'une ligne ferroviaire massive conçue pour atteindre "le bout du monde". On ignore si "Zyl□□□□" a réussi ou non.
train-stop-mine-part7=Vous trouvez une cachette contenant des documents proposant des technologies visant à neutraliser le vent. Des traces de matières fécales sont étalées dessus, probablement laissées par un destinataire irrité.
train-stop-mine-part8-rand1=À cet arrêt, il y avait une boîte de "Jivolite". Jaloux que quelqu'un d'autre ait donné ce nom insipide à ce minéral avant vous, vous broyez la boîte avec colère.
train-stop-mine-part8-rand2=À cet arrêt, il y avait une boîte de "Bobmonium". Vous broyez la boîte avec colère, jaloux que quelqu'un d'autre ait donné à ce minéral un nom plus insipide que celui que vous auriez pu lui donner.
train-stop-mine-part8-rand3=À cet arrêt, il y avait une boîte de "Immersite". Vous jetez tristement la boîte, sachant que vous auriez pu donner à ce minéral un nom beaucoup plus drôle.
train-stop-mine-part8-rand4=À cet arrêt, il y avait une boîte de "stupidium". Vous ricanez, amusé par le nom ridicule que quelqu'un a donné à cet élément.
train-stop-mine-part8-rand5=À cet arrêt, il y avait une boîte de "Nexélite". Cela semble beaucoup plus complexe que vous ne l'imaginiez, alors vous vous éloignez prudemment de la boîte.
train-stop-gun-turret-trap=En fouillant dans les débris, vous trouvez une tourelle sous les décombres marquée "□□□□riété de Bob". Vos gestes maladroits la réveillent.
;junk-mine-hint-part1=En fouillant parmi les débris, vous trouvez l'inspiration pour créer un gros canon permettant de propulser les objets indésirables dans les airs. Vous baptisez votre invention la __ENTITY__crapapult__.
junk-mine-part1=Dans ce tas, vous trouvez un plan déchiré signé "Fr□□□". Il n'a aucun sens tant que vous ne l'inclinez pas à 45 degrés. Vous le jetez avec colère.
;Dans ce tas, vous voyez une pompe cassée avec un filtre réglé sur un fluide que vous n'avez jamais vu auparavant.
junk-mine-part2=Cette pile contient des œuvres d'art réalisées par quelqu'un qui s'appelle "HideBoar". Vous la rangez en lieu sûr, là où personne ne pourra vous juger pour cela.
junk-mine-part3=Ce tas d'ordures contient un commentaire qui dit "Maraxsis: 7/10. Trop d'eau." Vous êtes perplexe, mais vous n'êtes toujours pas d'accord.
junk-mine-part4-rand1=Vous trouvez un cadre photo brisé. Au dos, il est écrit "Jul□□□, □□ali, Lo□□, et □□ppy". La photo est rayée au point d'être méconnaissable.
junk-mine-part4-rand2=Vous trouvez un cadre photo brisé. Au dos, il est écrit "□□□vik, Ju□□□□, □□garre et Buf□□□". Vous ne savez pas qui sont ces personnes, mais vous espérez qu'elles vont bien.
junk-mine-part4-rand3=Vous trouvez un cadre photo brisé. Au dos, il est écrit "De□□□□□r, □0X, □□□□hiri et □earw□□□". La photo est rayée au point d'être méconnaissable.
junk-mine-part4-rand4=Vous trouvez un cadre photo brisé. Au dos, il est écrit "□oj□, □□□itri, Fox□□□□". Vous vous demandez si ces personnes se connaissent encore.
junk-mine-part4-rand5=Vous trouvez un cadre photo brisé. Au dos, il est écrit "Grak□□□□, □□□□eymint, Ma□□, □□□□wuka". La photo dégage une légère odeur de pizza.
junk-mine-part4-rand6=Vous trouvez un cadre photo brisé. Au dos, il est écrit "Be□□□, □□□cado, Recor□□□, □□□box". Vous ne les connaissez pas, mais vous espérez qu'ils vont bien.
junk-mine-part5=Ce tas contenait un bloc de "greel". À première vue, cela ne semble pas avoir d'utilité particulière, mais on devine que sa fabrication a pris un certain temps.
junk-mine-part6-rand1=Vous trouvez une guitare cassée. Au dos, il y a une dédicace : "□□□□□□ Dan". Cette guitare était très appréciée.
junk-mine-part6-rand2=Vous trouvez une guitare cassée. Le dos est signé "JJ". Elle présente de légères traces de couleurs décoratives.
junk-mine-part6-rand3=Vous trouvez une guitare cassée. Le dos est signé "□□□□□rat". Elle est extrêmement usée.
junk-mine-part7=Dans ce tas, vous trouvez un donnut dur comme de la pierre dans un emballage déchiré avec un reçu pour "Lau□□□□". Quelle cruauté... La moisissure l'a rendu immangeable !
junk-mine-grenade-trap=Ces débris contiennent une boîte portant l'inscription "□□ig□□□□/□□_□rt". Vous l'ouvrez sans précaution, et des objets en surgissent.
junk-mine-grenade-trap-2=Tout ce qui se trouvait dans cette boîte a été détruit par les explosifs, y compris certains dossiers. Son contenu était clairement destiné à leurs yeux uniquement.
all-lore-done=Vous ne pensez pas trouver d'autres messages intéressants provenant du passé.
;deprecated=Des symboles ont été gravés dans cet arrêt de train : "🦶📸🍆💦". Vous ne savez pas ce que cela signifie, mais vous ressentez tout de même du dégoût.

[rubia-taunt]
forgot-roboport-failsafe=(Loup&Snoop) Vous avez oublié d'apporter un roboport personnel à Rubia. Vérifiez votre inventaire.
forgot-roboport-failsafe-part2=(Loup&Snoop) Et ce robot n'est pas gratuit. Je vais manger ta jambe gauche en guise de compensation.

rubia-first-blast-off-part1=(Rubia) : Et c'est ainsi que l'ingénieur décolla à bord de sa fusée pourrie, impatient de découvrir d'autres matériaux et planètes, ravi de leur donner des noms encore pires que ceux de Rubia.
rubia-first-blast-off-part2=(Rubia) : Il n'y a véritablement aucun endroit dans le cosmos qui soit à l'abri de cette menace.
rubia-first-blast-off-part3=(Loup&Snoop) : Félicitations pour votre victoire contre Rubia. J'ai toujours douté de vous.
rubia-first-blast-off-part4-mp=(Loup&Snoop) : Oh, je vois ce qui s'est passé ici. Merci à tous d'avoir été si gentils et d'avoir aidé __1__ à remporter la victoire. Il n'y serait pas arrivé sans vous.
rubia-first-blast-off-part5-mp=(Loup&Snoop) : Non, vraiment. __1__ est resté inactif pendant plus d'une heure alors que tout le monde faisait la majeure partie du travail.
;WIP (unused)
rubia-shield-warning-convo-part1=(exfret) : Il n'y a aucune chance qu'il comprenne. Il est trop stupide.
rubia-shield-warning-convo-part2=(Loup&Snoop) : Je veux y croire
rubia-shield-warning-convo-part3=(exfret): Il va carrément s'éclater, lol.
rubia-shield-warning-convo-part4=(Loup&Snoop) : Non, non, non. Il va faire demi-tour. Regarde !

[version-change-warnings]
rubia-trashsteroid-health-scaling=(Loup&Snoop / Rubia) : Alors... ne m'en veux pas, mais j'ai corrigé un bug qui empêchait la résistance des asteroïdes de déchets d'augmenter autant qu'elle le devait lorsque tu disposais d'une technologie infligeant des dégâts physiques élevés... Une erreur tout à fait compréhensible ! Mais le bon côté, c'est que j'ai également ajouté des paramètres de difficulté sous Paramètres des mods => Paramètres de carte. Si ta base commence soudainement à exploser, tu devrais les utiliser. Bonne chance !
rubia-craptonite-wall=(Loup&Snoop / Rubia) : Bonne nouvelle ! Les murs en crastonite ont été améliorés dans une récente mise à jour. Pour plus de détails, consultez leur technologie ou la rubrique Trucs et astuces.
rubia-craptonite-wall-recipe=(Loup&Snoop / Rubia): Remarque : la recette des murs en crastonite a été modifiée, et la recette spécifique à Rubia pour le béton blindé a été supprimée.
rubia-factorissimo-destruction_warning=(Rubia): Les usines de Factorissimo sur Rubia seront détruites dans __1__ minute. La rétrogradation provoquera un crash.
;rubia-factorissimo-destruction-position=Les usines de Factorissimo à Rubia ont déménagé à :[gps=__1__,__2__,__3__]
rubia-bzmod-silo-recipe-change=(Rubia) : Avertissement : Rubia vient d'apporter une modification aux recettes de silos à fusées pour le pack de mods BZ. La recette de base du silo utilise désormais à nouveau de la soudure.

rubia-tangible-projectile-mod-warning=(Loup&Snoop / Rubia) : Avertissement. Vous utilisez actuellement un mod qui transforme les balles en véritables projectiles (tirs ratés à distance). Cela rend Rubia beaucoup plus difficile que prévu.
rubia-tech-cost-multiplier-warning=(Loup&Snoop / Rubia) : Remarque : vous jouez avec des multiplicateurs de coût technologique, mais Rubia a le multiplicateur par défaut x1. Les technologies de déclenchement de Rubia ont leur propre multiplicateur de coût technologique, contrôlé dans les paramètres au démarrage du mod. Ceci est totalement facultatif, nous tenions simplement à vous en informer. Ce message n'apparaîtra plus.

[tips-and-tricks-item-name]
rubia-briefing=Informations sur Rubia
rubia-trashsteroid-tips=Mécanique des astéroïdes de déchets de Rubia
