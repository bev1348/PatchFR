[achievement-description]
land-on-rubia=Atterrissez sur Rubia sans mourir.
research-with-biorecycling=Débloquez une recherche utilisant la science du biorecyclage dans un laboratoire.
rubia-lore-complete=Découvrez toutes les traditions en explorant les tas d'ordures de Rubia.
rubia-easy-mode=Choisissez un niveau de difficulté plus adapté à Rubia.
rubia-very-very-hard-clear=Battez Rubia en mode "L'ingénieur doit mourir" depuis le moment où vous atterrissez jusqu'à votre décollage.

[mod-setting-name]
disable-lyrical-music=Désactiver la musique lyrique
remove-rubia-from-promethium_sci=Supprimer la science de Rubia de la recherche sur le prométhium
require-rubia-for-endgame-planets=Nécessite de terminer Rubia pour débloquer les planètes de fin de partie.
rubia-difficulty-setting=Difficulté de la planète Rubia
rubia-rocketizer-early-unlock=Déblocage anticipé du Rocketizeur
invert-trashsteroid-scaling=Inverser la mise à l'échelle visuelle des météorites de déchets
rubia-megabase-mode=Mode Mégabase
rubia-tech-cost-multiplier=Multiplicateur de coût de la technologie par déclenchement de Rubia
rubia-zoom-change=Permettre les gouttes oculaires
rubia-renai-special-trajectories=Trajectoires uniques du bras lanceur sur Rubia

[mod-setting-description]
disable-lyrical-music=Active le mode accessibilité pour les personnes ayant des goûts de poubelle. Le mode désactivé par défaut est le mode prévu pour jouer au mod.
remove-rubia-from-promethium_sci=Si activé, le pack de science de Rubia ne sera PAS nécessaire pour la technologie de productivité de recherche scientifique infinie du prométhium. Désactivé par défaut.
require-rubia-for-endgame-planets=Si activé, il est nécessaire de battre Rubia pour débloquer les planètes de fin de jeu telles qu'Aquilo ET les planètes de fin de jeu moddées telles que Maraxsis. Activé par défaut.
rubia-difficulty-setting=Augmente la résistance des astéroïdes de déchets, les dégâts infligés par ceux-ci et les dégâts subis lors de la rentrée dans la planète Rubia. Les ressources et la fabrication ne sont pas affectés. Par défaut = Normal.\n[img=utility/warning_icon]AVERTISSEMENT : "Pyanodons" nécessite la technologie de Fulgora (qui n'est pas explicitement requise par l'arbre technologique) pour pouvoir atterrir sur Rubia.\n[img=utility/warning_icon]AVERTISSEMENT : "L'ingénieur doit mourir" nécessite en outre un équipement de qualité [quality=epic] pour atterrir sur Rubia.
rubia-rocketizer-early-unlock=Débloquez le rocketizeur en même temps que les silos à fusées (comme si le mod Rubia n'était pas installé). Ce paramètre est destiné à assurer la rétrocompatibilité avec les fichiers de sauvegarde qui ont installé le mod "Rocket Cargo Insertion" avant le téléchargement de Rubia. Veuillez ne pas l'activer sauf si cela s'applique à vous. Désactivé par défaut.
invert-trashsteroid-scaling=Inverser la taille des astéroïdes de déchet pour qu'ils deviennent plus petits lorsqu'ils entrent en collision (au lieu de plus grands). Purement visuel. Désactivé par défaut.
rubia-megabase-mode=Si activé, cela réduit la consommation d'UPS des astéroïdes de déchet en les rendant immobiles, mais UNIQUEMENT si un très grand nombre d'astéroïdes de déchet apparaissent. Cela modifie les mécanismes. Désactivé par défaut.
rubia-tech-cost-multiplier=Les technologies de déclenchement de Rubia sont immunisées contre les paramètres standard de multiplication des coûts technologiques. Ce paramètre utilise un multiplicateur pour le coût de ces technologies. Plus le chiffre est élevé, plus le coût est élevé. Valeur par défaut = 1.
rubia-zoom-change=Si désactivé, les gouttes oculaires n'auront aucun effet. Activée par défaut.
rubia-renai-special-trajectories=Si activé, les bras lanceurs placés sur Rubia auront des trajectoires uniques. Cela entraîne des coûts UPS plus élevés pour Renai Transportation. Par défaut : activé.

