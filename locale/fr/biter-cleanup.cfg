[mod-setting-name]
biter-cleanup-operation-interval=Intervalle de fonctionnement
biter-cleanup-captive-spawners-produce-creep=Les nids captifs produisent de la matière organique
biter-cleanup-cleanup-speed=Vitesse de nettoyage
biter-cleanup-compensate-for-map-size=Compenser la taille de la carte
biter-cleanup-nominal-map-size=Taille nominale de la carte
biter-cleanup-primary-decal-check-range=Rayon de matière organique autour du nid
biter-cleanup-secondary-decal-removal-range=Portée de nettoyage des dégâts causés par la matière organique
biter-cleanup-mark-cleanups-with-map-pins=Marquer les lieux de nettoyage à l'aide de repères sur la carte

[mod-setting-description]
biter-cleanup-operation-interval=Fréquence à laquelle le mod fonctionne réellement (mesurée en ticks). Les taux calculés sur une base par tick ne sont pas affectés par ce paramètre ; ils seront simplement regroupés par lots de ce nombre de ticks.\n\nCe paramètre offre un compromis entre un impact moyen plus important mais plus constant sur les performances (pour les valeurs faibles) et un impact global plus faible mais avec des pics occasionnels pouvant entraîner des saccades perceptibles (pour les valeurs élevées). Réglez-le selon vos préférences. Si vous rencontrez des saccades que vous ne parvenez pas à résoudre en ajustant les autres paramètres, augmenter considérablement cette valeur permettra de les réduire (une fois par heure au maximum).
biter-cleanup-captive-spawners-produce-creep=Les nids de Biters captifs de Space Age seront-ils pris en compte comme structures de type nid afin de déterminer s'il faut y supprimer la matière organique ?\n\nN'a aucun impact sur les performances. Ce paramètre est purement une question de préférence.\n\nN'a aucun effet (est considéré comme désactivé) si Space Age n'est pas installé ni activé.
biter-cleanup-cleanup-speed=Le nombre moyen d'opérations de nettoyage à effectuer à chaque tick.\n\nCe paramètre a un impact significatif sur les performances. Il doit être réglé sur une valeur très faible dans presque tous les cas. Soyez prudent si vous l'augmentez, car les effets peuvent être importants. Si vous constatez un ralentissement ou des saccades inattendus, essayez de réduire cette valeur.
biter-cleanup-compensate-for-map-size=Détermine si le mod doit intensifier le nettoyage à mesure que la carte s'agrandit, afin de maintenir le rythme apparent de la décomposition de la matière organique raisonnablement constant tout au long d'une partie.\n\nL'impact de ce paramètre sur les performances dépendra de la taille de votre fichier de sauvegarde par rapport au paramètre "Taille nominale de la carte". Consultez la description de ce paramètre pour plus de détails.
biter-cleanup-nominal-map-size=Lorsque l'option "Compenser la taille de la carte" est activée, ce paramètre détermine la taille de la carte (mesurée en blocs) pour laquelle la vitesse de nettoyage correspondra exactement à celle que vous avez définie avec le paramètre "Vitesse de nettoyage". La moitié de la taille spécifiée correspond à la moitié de la vitesse de nettoyage spécifiée. Mais attention, l'inverse est également vrai : deux fois la taille, deux fois la vitesse de nettoyage, et par conséquent deux fois l'impact sur les performances !\n\nEn raison de l'impact variable de ce paramètre, vous devriez viser à le régler à environ la taille de vos sauvegardes les plus volumineuses afin qu'il ait tendance à réduire la vitesse et l'impact. Vous pouvez obtenir cette taille à l'aide de la commande "biter-cleanup-map-size". Vous pouvez également augmenter ce paramètre pour réduire l'impact sur les performances, ou le diminuer pour augmenter la vitesse de nettoyage.\n\nN'a aucun effet si l'option "Compenser la taille de la carte" est désactivée.
biter-cleanup-primary-decal-check-range=Toute matière organique située à une distance supérieure à cette valeur (en tuiles) d'un nid sera éliminée.\n\nCette option est essentiellement esthétique. La réduire peut atténuer les saccades si vous en rencontrez, mais cela ne fera très probablement pas une grande différence.
biter-cleanup-secondary-decal-removal-range=En plus de tacher le sol, la matière organique des Biters détériore également la végétation et d'autres éléments du décor. Toutefois, ces effets peuvent aussi se produire naturellement, par exemple lorsque les plantes sont moins vigoureuses dans les déserts. Ce paramètre permet de définir la distance (en tuiles) autour de la matière organique de Biters dans laquelle ces détériorations seront également effacées.\n\nCette option est essentiellement esthétique. La réduire peut atténuer les saccades si vous en rencontrez, mais cela ne fera très probablement pas une différence notable.
biter-cleanup-mark-cleanups-with-map-pins=Faut-il indiquer sur la carte, à l'aide de repères, les emplacements des opérations de nettoyage en cours ?\n\nCela n'a aucune incidence sur les performances. Ce paramètre relève uniquement d'une question de préférence.

[biter-cleanup-command-help]
map-size=Affiche le nombre de blocs dans la sauvegarde actuelle, à la fois sous forme de total général et de nombre individuel pour chaque surface.
cleanup-speed=Affiche des informations sur la cadence actuelle des opérations de nettoyage.
recount-chunks=Oblige Biter Cleanup à recalculer le nombre de blocs dans l'ensemble de la sauvegarde et sur chaque surface, et affiche les éventuels écarts entre les valeurs enregistrées et les valeurs réelles.
clean-here=Force l'exécution d'une opération de nettoyage à l'emplacement actuel du joueur.
clean-everywhere=Nettoie l'intégralité de toutes les surfaces de la sauvegarde. Le jeu risque de se bloquer pendant un moment.

[biter-cleanup-command-output]
# Map Size command
map-size-total-chunk-count=[Biter Cleanup] Le nombre total de blocs dans la sauvegarde actuelle est de __1__. Il se compose de :
map-size-surface-chunk-count=[Biter Cleanup] __1__ __plural_for_parameter__1__{1=bloc|rest=blocs}__ sur __2__ [__3__]
# Cleanup Speed command
cleanup-speed-operation-rate-lt-eq-tick=[Biter Cleanup] Une opération de nettoyage est effectuée environ chaque __plural_for_parameter__1__{1=tick|rest=__1__ ticks}__
cleanup-speed-operation-rate-gt-tick=[Biter Cleanup] Environ __1__ __plural_for_parameter__1__{1=opération de nettoyage est effectuée|rest=opérations de nettoyage sont effectuées}__ à chaque tick.
# Refresh Chunk Count command
recount-chunks-total-chunk-count-changed=[Biter Cleanup] Il y avait un écart de __1____2__ dans le nombre total de blocs (il était de __3__, il est désormais de __4__). Cela se compose comme suit :
recount-chunks-total-chunk-count-cancelled-out=[Biter Cleanup] Des divergences ont été détectées dans le nombre de blocs par surface, mais le total général reste correct. Les erreurs par surface étaient les suivantes :
recount-chunks-surface-chunk-count-changed=[Biter Cleanup] __1____2__ __plural_for_parameter__2__{1=bloc|rest=blocs}__ sur __3__ [__4__] (il était de __5__, il est désormais de __6__)
recount-chunks-no-changes=[Biter Cleanup] Le nombre de blocs a été mis à jour. Aucune anomalie n'a été détectée.
# Clean Here command
clean-here-start=[Biter Cleanup] L'opération de nettoyage a commencé.
# Clean Everywhere command
clean-everywhere-warning=[Biter Cleanup] Le nettoyage complet de la sauvegarde risque de bloquer votre jeu pendant un certain temps, surtout s'il s'agit d'une sauvegarde volumineuse ou si vous utilisez un matériel peu performant. Ne vous inquiétez pas, c'est tout à fait normal.
clean-everywhere-end=[Biter Cleanup] Nettoyage terminé.

