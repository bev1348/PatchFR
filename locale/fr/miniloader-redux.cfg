command_control_miniloader_inserters_on=[Contrôle des bras des mini-chargeurs] Tous les bras des mini-chargeurs activés.
command_control_miniloader_inserters_off=[Contrôle des bras des mini-chargeurs] Tous les bras des mini-chargeurs désactivés.
command_control_miniloader_inserters_invalid=[Contrôle des bras des mini-chargeurs] 'activé' / 'désactivé', '__1__' obtenu
command_rebuild_miniloader_inserters=Reconstruire les bras dans tous les mini-chargeurs.
command_resync_miniloaders=Resynchronise la configuration de tous les mini-chargeurs actuellement présents dans le jeu. Ajoutez 'Vitesse' pour activer le mode rapide si possible.
command_resync_miniloaders_speed=[Resynchroniser les mini-chargeurs] Vérification des mini-chargeurs pour le mode Vitesse.
command_resync_miniloaders_invalid=[Resynchroniser les mini-chargeurs] 'Vitesse' pris en charge, '__1__' obtenu
check_speed_mode_result=[Miniloader (Redux)] Mode Vitesse activé pour __1__ mini-chargeurs. Ignoré pour __2__ mini-chargeurs.
#
turbo_mode=Mode Vitesse
turbo_mode_tooltip=Le mode Vitesse permet uniquement de déplacer des objets entre un convoyeur et un conteneur (ou un wagon), mais accélère le transfert des objets.
lane_filter=Utiliser les filtres par ligne
lane_filter_tooltip=Prend en charge les filtres par ligne (le premier filtre correspond à la ligne de gauche, le second à la ligne de droite).
spill_stuck_items=Déverser les objets coincés
spill_stuck_items_tooltip=Dépose au sol, autour du mini-chargeur, les objets qui se sont coincés lors du changement de filtre ou de mode de fonctionnement, et les marque pour qu'ils soient ramassés par les robots.
discard_stuck_items=Éliminer les objets coincés
discard_stuck_items_tooltip=Élimine discrètement les objets qui se sont coincés lors du changement de filtre ou de mode de fonctionnement.

