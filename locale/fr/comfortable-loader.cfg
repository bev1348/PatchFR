[entity-name]
comfortable-loader=Chargeur confortable
fast-comfortable-loader=Chargeur confortable rapide
express-comfortable-loader=Chargeur confortable express
turbo-comfortable-loader=Chargeur confortable turbo

[entity-description]
deadlock-loader=Permet de transférer rapidement des ressources entre les convoyeurs et les stockages. Faites-le pivoter après le placement pour changer de mode d'entrée/sortie.

[mod-setting-name]
comfortable-loader-snap-to-belts=Fixer les chargeurs aux convoyeurs
comfortable-loader-snap-to-inventories=Fixez les chargeurs aux stockages
comfortable-strict-fast-replace-loaders=Placement rapide de chargeur contrôlé

[mod-setting-description]
comfortable-loader-snap-to-belts=Quand on les place, les chargeurs règlent automatiquement leur mode et leur orientation pour s'aligner sur les convoyeurs adjacents (et sur les stocks situés de leur côté convoyeur)
comfortable-loader-snap-to-inventories=Quand on les place, les chargeurs déposent automatiquement leur contenu dans les stocks vers lesquels ils sont tournés ou dont ils sont éloignés
comfortable-strict-fast-replace-loaders=Empêcher les chargeurs de remplacer rapidement tout autre élément qu'un autre chargeur


