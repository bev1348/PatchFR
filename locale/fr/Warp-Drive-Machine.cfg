[entity-description]
wdm_destroyed_terminal=Vous pouvez essayer de pirater ce terminal de vaisseau spatial en le connectant au vôtre à l'aide d'un [item=green-wire].
wdm_terminal=Voici le terminal principal du vaisseau de téléportation, où est stockée l'énergie du vaisseau.\n[color=yellow]Cliquez ici pour plus d'options.[/color]
wdm-linked-chest=Permet de transférer des objets entre les différents étages du vaisseau spatial
wdm_ship_pipe=Permet de transférer des fluides entre les différents étages du vaisseau spatial
warp_pipe=Permet de transférer des objets entre le vaisseau et le monde extérieur
wdm_warp_power_tower=Consomme à distance l'énergie du vaisseau de téléportation et communique avec le terminal du vaisseau pour les signaux logiques.
wdm_entrance_cave=Voici l'entrée d'une grotte. Cliquez pour y entrer.
wdm_exit_cave=Sortie de la grotte. Cliquez pour en sortir.
wdm_warp_resource_sucker=Placez cette machine au-dessus des gisements de minerai, alimentez-la et attendez qu'elle téléporte le filon directement vers le vaisseau spatial sur les [tile=acid-refined-concrete] Tuiles de ressources. La tuile du vaisseau doit être vide.
wdm_warp_insured_desc=Cette zone de téléportation sécurisée peut être placée dans le monde extérieur, et tout ce qui est construit sur les [item=pink-refined-concrete] Tuiles de téléportation sécurisées de l'étage "H" sera téléporté à cet emplacement. [color=yellow]La mise en place de la pièce nécessite 25 [img=fluid/warponium-fluid]unités de carburant au warponium provenant du vaisseau.[/color] Le vaisseau spatial rappellera automatiquement la zone sécurisée lors de la téléportation.
wdm_rune_test_chest=Placez une rune ancienne sur cet autel
wdm_rune_altar_log=Vous pouvez ici tester vos connaissances sur les runes anciennes factoriennes. Vos résultats seront enregistrés ici. Vous pouvez y ajouter vos propres notes et hypothèses.
wdm_charge_generator=Rechargez cet appareil pour déverrouiller son contenu
wdm_broken_lab=Réparez cet artéfact pour récupérer son contenu en y insérant les matériaux nécessaires.
warp_electric_mining_drill=Cette foreuse ne peut être construite que sur le vaisseau spatial, afin d'exploiter les ressources aspirées par le [entity=wdm_warp_resource_sucker_1].
wdm_driller_machine=Cette foreuse a besoin de [item=warponium-fluid-barrel]barils de warponium pour fonctionner. Restez à proximité de sa zone d'action, avec un baril de carburant dans votre inventaire. Remarque : les joueurs ne peuvent pas creuser devant la foreuse.

