home_planet_deleted=Attention ! __1__ n'est plus votre planète d'origine ! Elle sera bientôt supprimée ! N'oubliez pas de tout emporter avant de partir.
wdm_win_title=GLORIEUSE VICTOIRE ! Vous avez vaincu le vaisseau-mère des pirates !
wdm_win_text=Félicitations, Ingénieur !\n\nContre toute attente, vous êtes arrivé au terme d’un voyage extraordinaire à travers les étoiles.\n\nVous avez commencé avec un moteur à distorsions hors d’usage, coincé à bord d’un vaisseau défaillant qui se téléportait de manière incontrôlable d’une planète à l’autre. Chaque atterrissage apportait son lot de dangers : des mondes hostiles grouillant de créatures féroces, des atmosphères toxiques et, bien souvent, une pénurie criante des ressources essentielles à la survie.\n\nVous avez supporté l'isolement, le chaos et des menaces accablantes. À chaque téléportation à travers la galaxie, vous avez sauvé, reconstruit et adapté votre vaisseau à distorsions. Pièce par pièce, vous avez rétabli son fonctionnement, transformant une épave condamnée en une formidable base mobile.\n\nEnfin, vous avez affronté le défi ultime : une bataille décisive contre le chef des pirates et son immense vaisseau-mère. Au milieu du rugissement des moteurs et des tirs nourris, vous avez tenu bon et vous vous êtes battu pour prendre le contrôle de votre avenir.\nEt finalement, grâce à votre stratégie, votre détermination et votre incroyable résilience...\n\nVous avez triomphé.\n\nLa menace pirate n'est plus. Les étoiles vous appartiennent.
wdm_intro_message=Voici la Machine à distorsions. Votre invention (un vaisseau équipé d'un moteur à distorsions) s'est transformée en véritable catastrophe. Elle est hors d'usage, instable, et plus douée pour mettre en rage les créatures planétaires que pour voyager en toute sécurité dans l'espace. Pire encore, si rien n'est fait, son instabilité pourrait anéantir la planète même sur laquelle elle se trouve. En dernier recours, le moteur déclenche automatiquement une téléportation vers une planète choisie au hasard afin d’éviter la destruction totale.\nVotre mission : survivre au chaos de cette boucle de distorsions sans fin, reconstruire votre vaisseau et en reprendre le contrôle total. Ce n'est qu'alors que vous serez prêt à affronter le véritable ennemi qui vous attend.
