[technology-description]
wdm_drill_cannon=Un canon de forage portable conçu pour les environnements souterrains hostiles. Une fois équipé, il tire des charges à impact dotées de pointes de forage rotatives, capables de briser rapidement la roche et d'ouvrir des passages dans les grottes profondes. Indispensable pour les ingénieurs qui doivent progresser en urgence et éviter de se retrouver piégés.
wdm_warp_drive_tech=Améliorez la technologie principale du moteur à distorsions, à laquelle toutes les autres fonctionnalités de téléportation sont liées. Cette technologie se débloque en réparant le moteur à distorsions depuis le terminal du vaisseau spatial.
wdm_ship_floors_tech=Débloque un nouvel étage du vaisseau spatial, accessible via l'ascenseur.
wdm_ship_floor_size_tech=Élargis les limites de construction au sol du vaisseau spatial. En mode Alt, vous pouvez voir ces limites indiquées en jaune.
wdm_ship_power_tech=Augmente la capacité totale du réacteur d'énergie du vaisseau spatial.
wdm_warp_chest_tech=Crée des coffres de téléportation qui partagent le même inventaire sur des distances illimitées, permettant ainsi le transfert d'objets entre le vaisseau spatial et le monde extérieur. Chaque niveau technologique débloque un nouveau type de coffre permettant de partager les objets entre eux.
wdm_warp_pipe_tech=Crée des tuyaux de téléportation qui permettent le transfert de fluides entre le vaisseau spatial et le monde extérieur. Chaque niveau technologique débloque un nouveau type de tuyau adapté à différents fluides.
wdm_alien_involution_bomb=Capacité du vaisseau spatial : une bombe qui libère dans l'atmosphère une toxine qui affecte la menace extraterrestre en l'affaiblissant. Elle élimine également toute la pollution.
wdm_ability_charting=Permet aux scanners du vaisseau spatial de cartographier la surface de la planète dans une direction à partir du vaisseau.
wdm_ability_blast_cannon=Permet au vaisseau de tirer un rayon d'énergie directionnel pour frapper les ennemis ou creuser des galeries dans les grottes
wdm_ability_accelerator=Capacité du vaisseau spatial : le temps de recharge du moteur à distorsions est réduit de moitié. Consomme du [img=fluid/warponium-fluid]Carburant au warponium.
wdm_ability_stabilizer=Capacité du vaisseau spatial : le stabilisateur agit sur le moteur à distorsions du vaisseau spatial, lui permettant de rester en place un peu plus longtemps.
wdm_ship_platform_camera=Capacité du vaisseau spatial : permet d'activer la caméra de la plateforme afin que vous puissiez voir ce qui se passe à l'extérieur.
wdm_platform_bomb=Capacité du vaisseau spatial : libère une puissante onde de choc sur la plateforme du vaisseau spatial qui ne blessera que les ennemis.
wdm_ability_defense_capsules=Capacité du vaisseau spatial : lance les drones de défense du vaisseau spatial à la surface
wdm_ability_ship_scanner=Capacité du vaisseau spatial : le scanner du vaisseau spatial permet de repérer des points d'intérêt sur la surface d'une planète.
wdm_ship_tile_deconstructor=Permet d'utiliser l'outil spécial pour sélectionner des tuiles de vaisseau spatial dans une zone afin de les démonter. Plus le niveau technologique est élevé, plus la probabilité de récupérer des tuiles de vaisseau spatial est grande.
wdm_external_defense_ship_platform=Permet de construire des tuiles spéciales au-delà de la limite maximale de taille du vaisseau spatial, uniquement sur la plateforme principale. Plus le niveau technologique est élevé, plus le nombre de tuiles pouvant être placées pour agrandir le vaisseau spatial est important (350 + [175 par niveau supplémentaire]).
wdm_warp_power_tower=Permet de construire une tour d'alimentation qui capte à distance l'énergie du vaisseau et de communiquer avec le terminal du vaisseau spatial pour les signaux logiques.
wdm_warponium_processing=Permet le traitement des minerais de Warponium, que l'on trouve uniquement dans des veines souterraines (à l'intérieur des grottes).
wdm_warponium_fuel=Permet le traitement du carburant au Warponium, utilisé par la Machine à distorsions.
wdm-linked-chest=Permet de transférer des objets entre les différents étages du vaisseau spatial
wdm_ship_pipe=Permet de transférer des fluides entre les différents étages du vaisseau spatial, grâce à des tuyaux reliés entre eux.
wdm_scan_another_planet_resource=Permet au vaisseau de rechercher une planète riche en une ressource spécifique. Si la recherche aboutit, la Machine à distorsions se dirigera automatiquement vers cette destination lors de la prochaine téléportation. La probabilité de réussite augmente à chaque [img=technology/wdm_warp_drive_tech-1] technologie d'amélioration  du moteur à distorsions. Le scan consomme du [img=fluid/warponium-fluid] Carburant au warponium.
wdm_scan_soil_analisys=Permet au vaisseau spatial d'analyser le sol de la planète sur laquelle il se trouve afin d'évaluer la richesse en ressources.
wdm_return_to_previous_planet=Permet au moteur à distorsion de définir la trajectoire de la prochaine téléportation vers une planète déjà visitée. Une fois le scan terminé, l'équipage sera informé si la destination a bien été définie sur la planète choisie.
wdm_ability_mining_bomb=Capacité du vaisseau spatial : lance une bombe nucléaire minière sur la planète, ce qui pourrait révéler certains itinéraires menant à des ressources souterraines cachées
wdm_basic_ship_tiles=Construisez ces tuiles pour agrandir le vaisseau spatial. Chaque type permet de construire certains bâtiments.
wdm_warp_resource_sucker=Cette machine spéciale permet de téléporter directement la veine de ressources vers le vaisseau spatial sur les [item=acid-refined-concrete] Tuiles de ressources. Chaque amélioration technologique augmente la quantité de ressources extraites, mais nécessite également davantage d'énergie.
wdm_ship_resource_tile_limit=Augmente la limite de construction des tuiles de ressources pour vaisseaux spatiaux, utilisées par l' [entity=wdm_warp_resource_sucker_1] Aspirateur de ressources à téléportation
wdm_ship_win=Une fois cette recherche terminée, le vaisseau spatial sera considéré comme entièrement réparé ! Cela signifie qu'il n'y aura plus de dysfonctionnements ni de pollution. Vous pourrez vous rendre sur n'importe quelle planète et voyager dans l'espace quand vous le souhaitez.
wdm_warp_insured_room=Permet d'accéder à un nouvel étage du vaisseau, où l'équipage peut construire deux pièces à l'aide de [item=pink-refined-concrete]tuiles de zones sécurisées, dont la taille augmente à chaque amélioration technologique. Tout ce qui y est construit peut être téléporté vers le monde extérieur et sera automatiquement rappelé lorsque le vaisseau effectuera une téléportation ou depuis le terminal du vaisseau.
wdm_spaceship_solarium=Le solarium du vaisseau spatial est une nouvelle zone située à l'étage des zones sécurisées, où des panneaux solaires ou des éoliennes exploitent l'énergie naturelle du monde extérieur. Chaque niveau augmente la surface sur laquelle l'équipage peut construire la [item=blue-refined-concrete] tuile bleue spéciale du vaisseau spatial.
wdm_spaceship_condenser=Permet au vaisseau spatial de condenser l'eau présente dans l'atmosphère de la planète. Chaque niveau augmente la quantité d'eau produite. Pour récupérer l'eau, placez des tuyaux de vaisseau [img=item/wdm_ship_pipe] reliés au signal du condenseur du vaisseau spatial ([img=virtual-signal/wdm_signal_condenser])
wdm_ability_attack_droid=Déploie des droïdes d'attaque qui traqueront les ennemis à proximité. À chaque niveau, un droïde supplémentaire est ajouté.
wdm_home_planet=Cela vous permet de choisir une planète connue et de la définir comme planète d'origine. Ce choix sera désormais permanent. Pour choisir une planète, ouvrez le panneau d'informations sur les planètes, cliquez sur le bouton "Planètes connues", puis sur le bouton "Planète d'origine".
wdm_build_on_home_planet=Permet de construire n'importe quoi à l'extérieur du vaisseau, sur la planète d'origine. Seules des tuiles de béton de base sont nécessaires.
wdm_ability_remove_planet_anomaly=Capacité du vaisseau spatial : une bombe qui agira sur la cause d'une anomalie planétaire, en neutralisant ses effets.
wdm-storage-room=Permet d'accéder à un nouvel étage du vaisseau (H) et débloque la salle de stockage du vaisseau spatial. Chaque amélioration technologique l'agrandit. On peut y installer autant de [entity=warp_chest_1] que souhaité.
wdm_space_market=Chaque mise à niveau améliore l'offre du Marché de la Station spatiale : plus d'objets et une meilleure probabilité d'obtenir des objets de qualité
wdm_warp_pollution_redux=Réduire la pollution générée par le vaisseau spatial défectueux. Chaque niveau permet de réduire les émissions de 8 %
wdm_pirate_ship_search=Cela vous permet de construire une sonde spatiale spéciale capable de localiser le vaisseau spatial pirate principal, afin que vous puissiez affronter son capitaine. Lancez la sonde depuis le silo à fusée. [img=virtual-signal/signal-info][color=green]Remportez la partie en battant le capitaine des pirates, puis piratez le terminal principal depuis le vaisseau spatial pirate.[/color]
warp_electric_mining_drill=Cette foreuse ne peut être construite qu'à bord du vaisseau spatial, afin d'exploiter les ressources aspirées par l'[entity=wdm_warp_resource_sucker_1].
wdm_warp_timer_clock=Un bracelet futuriste relié au cœur de distorsion instable, qui affiche le compte à rebours exact jusqu'au prochain saut. Il donne à l'équipage le temps précieux de se préparer avant d'être propulsé vers l'inconnu. [Affiche le compte à rebours dans la partie supérieure gauche de l'interface et alerte les membres d'équipage à l'extérieur du vaisseau]
wdm_ship_fix_lock=Vous en apprendrez davantage sur les [color=purple]runes anciennes factoriennes[/color]  dans les Stations spatiales, en testant différentes runes. Consultez le panneau de commande de votre vaisseau pour obtenir de l'aide.
wdm_artifact_tech_trigger=Consultez votre liste de planètes connues. Elle indique où se trouve cet artéfact lorsque les conditions préalables sont remplies.
wdm_enemy_evolution_tracker=Permet au vaisseau de suivre l'évolution des ennemis. Ces informations s'affichent sur le panneau d'informations de la planète, ce qui vous permet de surveiller l'évolution des ennemis sur chaque planète.

