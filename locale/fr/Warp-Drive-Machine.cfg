[item-description]
drill_cannon=Un canon de forage portable conçu pour les environnements souterrains hostiles. Une fois équipé, il tire des charges à impact dotées de pointes de forage rotatives, capables de briser rapidement la roche et d'ouvrir des passages dans les grottes profondes. Utilisation : Maj+Espace à proximité d'une paroi rocheuse.
wdm_warp_power_tower=Permet de prélever de l'énergie à distance depuis le vaisseau de téléportation.
wdm_ship_pipe=Permet de transférer des fluides entre les différents étages du vaisseau spatial
wdm-linked-chest=Permet de transférer des objets entre les différents étages du vaisseau spatial
warp_chest=Permet de transférer des objets entre le vaisseau et le monde extérieur
wdm_ship_tile_deconstructor=Glissez-déposez avec cet outil en main sur les tuiles du vaisseau spatial pour le démonter. [img=utility/warning_icon]Attention ! Veillez à ne pas vous cogner le pied sur l'espace avec cet outil.
wdm_pirate_ship_search_probe=Lancez-le depuis le silo à fusées pour partir à la recherche du vaisseau spatial pirate principal
wdm_rune_key=Peut être utilisé pour accéder à la salle d'épreuve des runes anciennes factoriennes.
wdm_quantum_flux_core=[color=purple]Artéfact de vaisseau :[/color] Une chambre cristalline pulsatoire qui canalise des particules exotiques à des fréquences harmoniques précises. Sans elle, le champ de distorsions ne peut parvenir à la cohérence quantique.\n[img=utility/warning_icon][color=yellow]Cet artéfact est extrêmement instable : s'il n'est pas fixé au vaisseau de téléportation à temps, il pourrait exploser.[/color]
wdm_phase_lattice_injector=[color=purple]Artéfact de vaisseau :[/color] Ce maillage complexe et entrelacé, composé d'un alliage inconnu, régule l'alignement de phase dimensionnelle lors du déclenchement des distorsions. Sa conception suggère l'intervention d'une intelligence non humaine.\n[img=utility/warning_icon][color=yellow]Cet artéfact est extrêmement instable : s'il n'est pas fixé au vaisseau de téléportation à temps, il pourrait exploser.[/color]
wdm_subspace_compression_coil=[color=purple]Artéfact de vaisseau :[/color] Génère la compression de champ initiale nécessaire à l'entrée en téléportation. Émet un léger bourdonnement qui résonne même dans le vide.\n[img=utility/warning_icon][color=yellow]Cet artéfact est extrêmement instable : s'il n'est pas fixé au vaisseau de téléportation à temps, il pourrait exploser.[/color]
wdm_chrono_field_stabilizer=[color=purple]Artéfact de vaisseau :[/color] Stabilise la dilatation du temps à l'intérieur du tunnel de distorsions. Sans cela, le cisaillement temporel déchirerait le vaisseau pendant la téléportation.\n[img=utility/warning_icon][color=yellow]Cet artéfact est extrêmement instable : s'il n'est pas fixé au vaisseau de téléportation à temps, il pourrait exploser.[/color]
wdm_warp_singularity_anchor=[color=purple]Artéfact de vaisseau :[/color] La dernière pierre angulaire du réassemblage. Elle fixe les coordonnées du vaisseau pendant la traversée du non-espace. Sans elle, aucune destination n'est jamais certaine.\n[img=utility/warning_icon][color=yellow]Cet artéfact est extrêmement instable : s'il n'est pas fixé au vaisseau de téléportation à temps, il pourrait exploser.[/color]
warp_electric_mining_drill=Cette foreuse ne peut être construite que sur le vaisseau spatial, afin d'exploiter les ressources aspirées par l'[entity=wdm_warp_resource_sucker_1].

