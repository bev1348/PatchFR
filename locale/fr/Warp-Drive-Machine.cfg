bt_delete_home_tt=Cela supprimera votre planète d'origine.\n[color=red][font=default-bold][img=utility/warning_icon]ALERTE ! Cela détruira la surface de votre planète d'origine ainsi que tout ce qui y restera lors de votre prochaine téléportation ![/font][/color]\nVotre équipage pourra choisir une autre planète comme foyer.
