learn_about_ancient_runes_tt=Ouvre la salle d'épreuve des runes anciennes, où vous pouvez comparer deux runes différentes que vous possédez et découvrir le symbole commun entre elles. [color=red]Assurez-vous d'avoir au moins deux runes différentes ![/color]\n
prove_rune_knowledge=Démontrer sa connaissance des [color=purple]runes[/color]
prove_rune_knowledge_tt=Vous disposerez d'un temps limité pour démontrer vos connaissances sur les [color=purple]runes anciennes factoriennes[/color] dans la salle d'épreuve. Placez la rune appropriée sur les 3 autels affichant les symboles correspondants. Assurez-vous d'avoir au moins une rune de chacun des 8 types, car vous pourriez en avoir besoin de n'importe laquelle !\n
prove_rune_knowledge_tt2=[color=red][font=default-bold][img=utility/warning_icon]Quiconque commet une erreur dans l'ancienne salle d'épreuve s'expose à une sanction sévère ![/font][/color]
ancient_rune_deduction_grid=Grille de déduction des [color=purple]runes anciennes[/color]
factorian_ancient_runes_knowledge=Connaissance des [color=purple]runes anciennes factoriennes[/color]
ancient_runes_rules=Chaque rune[img=item/wdm_rune_1] correspond exactement à 1 tablette de potion ancienne[img=wdm_rune_chemical_1]. Une tablette comporte 3 aspects de potion : un rouge, un vert et un bleu. Ceux-ci peuvent être positifs ou négatifs. Lorsque deux runes sont combinées sur les autels de la chambre, l'aspect correspondant s'amplifie, et cette potion apparaît au centre de la pièce. C'est le résultat de la comparaison entre la partie grande d'une rune et la partie petite de l'autre rune, toutes deux de même couleur et de même signe. Si deux tablettes n'ont aucun aspect correspondant, elles se neutralisent mutuellement pour former une potion neutre[img=wdm_rune_potion_gui_N]. Lorsque vous obtenez un résultat de potion, vous pouvez en tirer des conclusions pour aider à déchiffrer le mystère. Exemple : lorsque deux runes comparées indiquent une potion bleue positive[img=wdm_rune_potion_gui_BP], vous pouvez en déduire que ces runes n'ont PAS de symbole bleu négatif, ce qui vous permet d'éliminer certaines possibilités de la liste des tablettes.\nPour prouver vos connaissances sur les runes anciennes, 3 tablettes de potions anciennes aléatoires sont affichées sur 3 autels. Vous disposez d'un temps limité pour ajouter la rune correcte à chaque autel. À la fin du temps imparti, si les 3 runes correspondent correctement à chaque tablette, le mystère est résolu et vous apprendrez à maîtriser la Machine à distorsions, débloquant ainsi la [technology=wdm_ship_win].
rune_mystery_solved=Hourra ! Félicitations ! Vous avez résolu le [color=purple]mystère des runes anciennes factoriennes[/color]. Vous disposez désormais des connaissances nécessaires pour maîtriser la Machine à distorsions, et vous avez débloqué la [technology=wdm_ship_win].
rune_mystery_wrong=Non !! Il y a un problème ! Les [color=purple]Anciens Gardiens factoriens[/color] vont te punir maintenant !
