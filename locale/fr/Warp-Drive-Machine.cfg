wdm-warp-vote-required=Par défaut, 50 % des joueurs connectés doivent voter en faveur de la téléportation
wdm-invert_ship_size_increment=Par défaut, le navire est plus grand à l'extérieur et les étages intérieurs sont plus petits. Vous pouvez inverser cette règle en cochant cette option.
