crystal_overgrowth_started=[font=heading-1][color=orange]Attention ! Des formations de cristaux exocines dangereux ont été détectées [item=crystal] ! Ceux-ci peuvent être récoltés et transformés, mais chaque cristal extrait renforce les formes de vie biologiques sur toutes les planètes. À chaque téléportation, le réacteur à distorsion du vaisseau dissipe progressivement cet effet, réduisant ainsi leur puissance.[/color][/font]
