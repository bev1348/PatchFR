event_laser_boss_detected=[font=heading-1][color=orange]Attention ! Une activité suspecte de pirates mécaniques a été détectée sur la planète[/color][/font]
event_laser_boss_spawned=[font=heading-1][color=orange]Attention ! Les pirates ont fabriqué leur arme à l'emplacement __1__[/color][/font]
event_pirate_base=[font=heading-1][color=orange]Attention ! Des pirates ont établi un campement à l'emplacement __1__[/color][/font]
earthquake_started=[font=heading-1][color=orange]Attention ! Il semblerait que le vaisseau soit entré dans une anomalie temporelle pendant la téléportation, ce qui a réduit sa vitesse de déplacement.[/color][/font]
earthquake_ended=[font=heading-1][color=orange]L'anomalie temporelle est en train de se dissiper...[/color][/font]
emergency_recall_no_ship=[font=heading-1][color=red]Erreur ! Vaisseau introuvable. Échec de la procédure de rappel d'urgence.[/color][/font]
emergency_recall_success=[font=heading-1][color=green]Rappel d'urgence réussi ! Vous avez été téléporté à bord du vaisseau. 50 % de votre inventaire a été perdu.[/color][/font]
emergency_recall_success_quality=[font=heading-1][color=green]Rappel d'urgence réussi ! Vous avez été téléporté à bord du vaisseau. __1__% de votre inventaire a été perdu.[/color][/font]
lost_deck_started=[font=heading-1][color=orange]Attention ! Le pont __1__ du vaisseau s'est égaré entre les dimensions et sera indisponible pendant __2__ minutes ![/color][/font]
lost_deck_teleported=[font=heading-1][color=red]Vous avez été téléporté hors du pont perdu du vaisseau.[/color][/font]
lost_deck_restored=[font=heading-1][color=green]Le pont __1__ du vaisseau a été restauré. L'accès est rétabli.[/color][/font]
crystal_overgrowth_started=[font=heading-1][color=orange]Attention ! Des formations de cristaux exocines dangereux ont été détectées [item=crystal] ! Ceux-ci peuvent être récoltés et transformés, mais chaque cristal extrait renforce les formes de vie biologiques sur toutes les planètes. À chaque téléportation, le réacteur à distorsion du vaisseau dissipe progressivement cet effet, réduisant ainsi leur puissance.[/color][/font]
crystal_initial_ping=[font=heading-1][color=orange]Cristal exocine initial détecté à __1__[/color][/font]
crystal_mined=[font=heading-1][color=red]CRYSTAL RÉCOLTÉ ! Niveau de menace ennemie : __1__ %[/color][/font]
electromagnetic_storm_started=[font=heading-1][color=orange]Attention ! Les scanners du vaisseau ont détecté une puissante tempête magnétique. Les équipements électriques risquent de tomber en panne.[/color][/font]
electromagnetic_storm_ended=[font=heading-1][color=orange]La tempête magnétique s'apaise.[/color][/font]
turret_red_concrete_bonus_short=+__1__% Dégâts  +__2__% CdT
turret_red_concrete_variant_desc=[color=255,120,120]Bonus du béton armé rouge : +5 % de dégâts et +5 % de cadence de tir.[/color]

