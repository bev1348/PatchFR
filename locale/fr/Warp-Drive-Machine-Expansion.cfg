[technology-description]
pamk3-esmk3=À insérer dans une armure pour absorber une quantité énorme de dégâts.
pamk3-se=À insérer dans une armure pour alimenter d'autres équipements ou transformé pour servir de source de carburant.
pamk3-pdd=À insérer dans une armure pour infliger des dégâts, repousser et étourdir automatiquement les ennemis proches.
kj_laser=Une tourelle compacte assemblée à partir de plans restaurés d'origine inconnue. Sa conception offre un équilibre parfait entre fiabilité et efficacité. Le châssis est fabriqué à partir de matériaux faciles à trouver, mais soigneusement travaillé.
emergency-return=Un dispositif de poche permettant de regagner le vaisseau en cas d'urgence. Lorsqu'on l'utilise, il vous téléporte instantanément vers le vaisseau. L'instabilité quantique qui survient pendant le processus entraîne le perte de jusqu'à 40 % de votre inventaire !
exoskeleton-mk2-equipment=Un exosquelette utilisant du warponium pour augmenter la vitesse de déplacement.
linked-heat-pipe=Permet de créer des conduites de chaleur reliées entre elles qui partagent la même température, quelle que soit la distance qui les sépare.
crystal-processing=Débloque le traitement de base des cristaux exocines, permettant ainsi l'extraction de ressources précieuses à partir de ces formations anormales.
crystal-processing-t2=Débloque une technologie avancée de traitement des cristaux exocines. Améliore l'efficacité de l'extraction et le rendement du produit.
wdm-red-refined-concrete-bonus=Les tourelles placées sur cette surface bénéficient d'un bonus de +5 % pour les dégâts et leur cadence de tir.
warponium-solar-panel=Débloque le panneau solaire en warponium : un panneau solaire de pointe qui exploite les réactions photochimiques du warponium pour produire de l'énergie même en cas de très faible luminosité.
wdm_warp_drive_tech=À chaque niveau technologique, le coût nécessaire pour maintenir la stabilité du noyau d'énergie de distorsion augmente.
warponium-hypercube=Une ressource unique constituée d'un cube compact de warponium pur. Ses propriétés énergétiques sont si puissantes et instables qu'il peut servir à la fois de source d'énergie incroyablement efficace et d'arme dangereuse.
ancient-drill=Débloque une foreuse géante spécialement conçue pour extraire le warponium. Un complexe monumental conçu pour les environnements extrêmes, où même les mesures les plus radicales ne suffisent plus à percer la roche.
wdm-ship-abilities-console=Débloque la construction d'une sous-console de capacités de vaisseau supplémentaire permettant d'utiliser les nouvelles capacités de l'extension WDM.\nSe connecte à un [item=warponium-storage-tank] pour recevoir du carburant.
wdm-ship-ability-cloak=Rend toutes les structures de votre vaisseau temporairement invisibles aux yeux des ennemis.
wdm-ship-ability-resource-collector=Récupère automatiquement tout le butin présent à la surface de la planète.
wdm-ship-ability-reactor-boost=Augmente considérablement le rendement des réacteurs en les chauffant à la température optimale.
wdm-ship-ability-cryo-freeze=Protège les joueurs contre les dégâts, mais les empêche temporairement de se déplacer.
wdm-ship-ability-ammo-distributor=Réapprovisionne automatiquement les munitions de toutes les tourelles du vaisseau, en utilisant les ressources disponibles.
wdm-ship-ability-waste-recycler=Transforme les déchets accumulés en énergie propre.

