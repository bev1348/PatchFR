[technology-description]
kj_laser=Une tourelle compacte assemblée à partir de plans restaurés d'origine inconnue. Sa conception offre un équilibre parfait entre fiabilité et efficacité. Le châssis est fabriqué à partir de matériaux faciles à trouver, mais soigneusement travaillé.
emergency-return=Un dispositif de poche permettant de regagner le vaisseau en cas d'urgence. Lorsqu'on l'utilise, il vous téléporte instantanément vers le vaisseau. L'instabilité quantique qui survient pendant le processus entraîne le perte de jusqu'à 40 % de votre inventaire !
exoskeleton-mk2-equipment=Un exosquelette utilisant du warponium pour augmenter la vitesse de déplacement.
linked-heat-pipe=Permet de créer des conduites de chaleur reliées entre elles qui partagent la même température, quelle que soit la distance qui les sépare.
crystal-processing=Débloque le traitement de base des cristaux exocines, permettant ainsi l'extraction de ressources précieuses à partir de ces formations anormales.
crystal-processing-t2=Débloque une technologie avancée de traitement des cristaux exocines. Améliore l'efficacité de l'extraction et le rendement du produit.
wdm-red-refined-concrete-bonus=Les tourelles placées sur cette surface bénéficient d'un bonus de +5 % pour les dégâts et leur cadence de tir.

