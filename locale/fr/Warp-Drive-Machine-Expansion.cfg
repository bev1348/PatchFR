[entity-description]
kj_electric_laser_t1=Un canon encombrant, assemblé à la hâte. Son châssis est constitué de boîtiers grossièrement soudés provenant de condensateurs de vaisseaux volés et de fragments de blindage. Avant de tirer, l'ensemble de la structure vibre, émettant un bourdonnement agaçant et une forte odeur d'ozone.
