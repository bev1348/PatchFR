kj_electric_laser_t8=Un canon encombrant, assemblé à la hâte. Son châssis est constitué de boîtiers grossièrement soudés provenant de condensateurs de vaisseaux volés et de fragments de blindage. Avant de tirer, l'ensemble de la structure vibre, émettant un bourdonnement agaçant et une forte odeur d'ozone.
kj_electric_laser_t9=Un canon encombrant, assemblé à la hâte. Son châssis est constitué de boîtiers grossièrement soudés provenant de condensateurs de vaisseaux volés et de fragments de blindage. Avant de tirer, l'ensemble de la structure vibre, émettant un bourdonnement agaçant et une forte odeur d'ozone.
kj_electric_laser_t10=Un canon encombrant, assemblé à la hâte. Son châssis est constitué de boîtiers grossièrement soudés provenant de condensateurs de vaisseaux volés et de fragments de blindage. Avant de tirer, l'ensemble de la structure vibre, émettant un bourdonnement agaçant et une forte odeur d'ozone.
kj_electric_laser_player=Une tourelle compacte assemblée à partir de plans restaurés d'origine inconnue. Sa conception offre un équilibre parfait entre fiabilité et efficacité. Le châssis est fabriqué à partir de matériaux faciles à trouver, mais soigneusement travaillé.
kj_electric_laser_mini=Une sorte de "moignon" compact et légèrement bourdonnant provenant d'un véritable canon laser. Pour éviter que le générateur standard du vaisseau pirate ne grille dès la première salve, les ingénieurs autoproclamés ont brutalement raccourci l'émetteur et se sont débarrassés du lourd système de refroidissement. Le boîtier du canon est constitué de caisses soudées de travers, fabriquées à partir de condensateurs volés et de morceaux de blindage, qui retiennent à peine les composants internes bourdonnants.
linked-heat-pipe=Permet le transfert de chaleur entre toutes les conduites de chaleur reliées de même type, quelle que soit la distance. Toutes les conduites de chaleur de même type ont la même température.
entity-crystal=Une formation cristalline extraterrestre anormale dotée de propriétés énergétiques et chimiques uniques.
big-crystal=Un cristal extraterrestre monumental qui génère d'immenses quantités d'énergie pure, capable d'alimenter les mécanismes planétaires les plus complexes.
conversion-plant=Une installation industrielle multifonctionnelle conçue pour la transformation en profondeur du [font=default-bold][color=purple]warponium[/color][/font]. Elle utilise des procédés thermochimiques et des réactions d'oxydation contrôlées pour transformer les matières premières en produits industriels.
warponium-solar-panel=Une version améliorée du panneau solaire, imprégnée de warponium. Lorsqu'il est exposé à la lumière, le warponium subit une réaction photochimique qui libère l'énergie qu'il a emmagasinée. Grâce aux propriétés uniques de cette substance, le panneau produit une puissance suffisante même en cas de très faible luminosité.
mind-control-unit=Un drone pirate biomécanique doté d'une intelligence supérieure qui s'est retourné contre ses créateurs à bord de leurs propres vaisseaux. Il détruit ses cibles à distance à l'aide d'un rayon et les neutralise de près grâce à ses armes embarquées.\n\nSa principale menace réside dans le piratage mental et numérique. En émettant des protocoles psi, le drone prend le contrôle des êtres vivants et des machines ennemies, forçant la victime à détruire ses propres installations et ses alliés...

