[mod-setting-description]
wdm-expansion-event-enable=Ajoute de nouveaux événements et rencontres pour Warp Drive Machine.\n[font=default-bold][color=purple]Les scanners de vaisseaux signalent que cette fonctionnalité est encore en cours de développement ! Elle peut entraîner des latences ou des plantages du jeu.[/color][/font]
wdm-expansion-debug=Active le mode développeur
wdm-expansion-zombie=Optimise la faction des zombies en réduisant le nombre maximal d'unités par nid et en diminuant leur taux d'apparition, tout en augmentant proportionnellement leurs statistiques.
wdm-expansion-disable-friendly-fire=Les tirs amis sont désactivés pour les factions pirates et ennemies : optimise légèrement le jeu et améliore les performances des mécanismes du mod.
wdm-expansion-show-turret-buff-text=Affiche un texte flottant lorsque la tourelle bénéficie du bonus "Béton armé rouge".
wdm-expansion-pirate-event-boost=Ce paramètre envoie une série d'insultes au capitaine des pirates, transformant votre secteur en zone de guerre et augmentant considérablement la densité des flottes pirates. Les vaisseaux spatiaux attaqueront vague après vague, transformant l'espace en un barrage de tirs incessant ! À utiliser uniquement à des fins de test

[modifier-description]
wdm-red-concrete-buffed-gun-turret-attack-bonus=Bonus de dégâts pour les tourelles mitrailleuses améliorées

