[entity-description]
debris-a=Un grand débris extraterrestre provenant de l'une des lunes de Navuis. Contient des traces d'une technologie ancienne. A une probabilité élevée de donner des objets encore plus précieux lorsqu'il est extrait à la main.
debris-b=Un débris moyen extraterrestre provenant de l'une des lunes de Navuis. Contient des traces d'une technologie ancienne. A une probabilité élevée de donner des objets encore plus précieux lorsqu'il est extrait à la main.
debris-c=Un petit débris extraterrestre provenant de l'une des lunes de Navuis. Contient des traces d'une technologie ancienne. A une probabilité élevée de donner des objets encore plus précieux lorsqu'il est extrait à la main.
eneas-vent=Il y a des quantités quasi infinies de déchets et de pollution piégées sous la surface d'Énéas [planet=eneas]. De temps à autre, cette cheminée émet des fumées toxiques qui perturbent Unité 05.\n\n Bloquer ou détruire la cheminée ne sert à rien, car les gaz trouveront toujours un moyen de remonter à la surface.
auto-deconstruct-radar=Radar avancé doté d'un rayon de vision permanent nettement plus large. S'il est connecté au réseau logique, il ordonnera la déconstruction automatique des entités en fonction du signal.\n\nVous pouvez également lui ordonner de récupérer des objets au sol à l'aide du signal [virtual-signal=signal-mining].
eneas-lift=Transporte les ressources depuis les installations de fabrication souterraines d'Énéas jusqu'à la surface. La quantité produite par cycle dépend du niveau de pollution local sur Énéas.\n\nLe rendement peut être encore amélioré en menant des recherches sur les technologies [entity=eneas-lift] liées à l'ascenseur.
eneas-generator=Les bâtiments conçus selon cette ancienne technologie sont construits pour s'alimenter eux-mêmes, rendant ainsi superflues les grandes centrales électriques.\n\n[entity=unit-05] Unité 05 a mis au point cette interface énergétique rudimentaire en prévision de votre arrivée.
unit-05=Le cortex principal de [entity=unit-05] Unité 05. Consomme des [item=ambition-science-pack] packs de mémoire pour restaurer les entrées de mémoire perdues.\nDoit être alimenté par une [item=significant-data-card] source de carburant de données.

