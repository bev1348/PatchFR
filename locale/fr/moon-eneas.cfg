[technology-description]
artifact-analysis-basic=Bien que leur véritable fonction reste inconnue, les [item=eneas-artifact] artéfacts disséminés sur Nauvis peuvent être démontés pour en tirer des ressources utiles.
artifact-analysis-expert=(Travail en cours) C'est ici que s'achève la première partie d'Énéas. Aquilo et la fin de la partie seront abordés dans la deuxième partie d'Énéas.
basic-data-management=Découvrez comment créer des outils de base basés sur les données, capables d'améliorer d'autres aspects de l'usine
planet-discovery-eneas=Une petite lune sans prétention, dont le climat est similaire à celui de Nauvis. Un examen plus approfondi révèle que c'est de là que proviennent les transmissions que nous recevons
artifact-drilling=Sur Énéas, les artefacts peuvent être extraits directement du sous-sol.
ambition-science-pack=Souvenirs d'ambition
fear-science-pack=Souvenirs de peur
anger-science-pack=Souvenirs de colère
grief-science-pack=Souvenirs de chagrin
lesser-ai=Une intelligence artificielle très rudimentaire capable d'aider [entity=unit-05] Unité 05 à exploiter ses [item=ambition-science-pack] packs de mémoire.
advanced-radar=Radar avancé doté d'un rayon de vision permanent nettement plus large. S'il est connecté au réseau logique, il ordonnera la déconstruction automatique des entités en fonction du signal.
module-tech=Grâce à l'utilisation de composants d'artéfacts, les modules peuvent être améliorés pour atteindre un niveau de qualité supérieur plus rapidement que d'habitude
module-tech-2=Grâce à ces anciens cœurs, les modules avancés peuvent être améliorés pour atteindre un niveau de qualité supérieur plus rapidement que d'habitude
engineer-assembler=Une machine d'assemblage avancée inspirée de la technologie de l'ingénieur. Elle bénéficie d'un bonus intrinsèque de productivité. Elle ne nécessite aucune alimentation électrique, mais doit être alimentée en flux continu de données pour fonctionner.
lurker-tech=Il semblerait qu'il y ait quelque chose qui se cache dans les eaux boueuses d'Énéas...
supply-tech=Permet à [entity=unit-05] Unité 05 de produire davantage de ressources par cycle sur Énéas.
codex-tech=Permet à [entity=unit-05] Unité 05 de produire des [item=notable-codex] Codex de référence, avec un rendement plus élevé lorsque la pollution est faible. Les objets seront livrés à chaque cycle à [entity=eneas-lift] l'ascenseur de ressources. \n\nCes données constituent une source de carburant plus efficace que les [item=significant-data-card] cartes de données importantes.
oil-tech=Permet à [entity=unit-05] Unité 05 de produire des [item=heavy-oil-barrel] barils de pétrole, avec un rendement plus élevé lorsque le niveau de pollution est faible. Les ressources seront livrées à chaque cycle à [entity=eneas-lift] l'ascenseur de ressources

