title_debris=[entity=debris-a] Débris
page_eneas_text_1=À tous ceux qui jouent avec ce mod
page_eneas_text_2=Merci beaucoup pour votre intérêt pour Énéas ! Si vous avez des commentaires, des idées ou des critiques, n'hésitez pas à me contacter via le portail du mod ou sur le serveur Discord de The Foundry. Bien qu'Énéas soit désormais officiellement publié, je continue à travailler activement sur le mod et à l'améliorer. Tous les éléments de contenu et les mécanismes essentiels sont en place, mais le mod a encore besoin d'être peaufiné.
page_eneas_text_3=Avertissement  
page_eneas_text_4=Certains éléments de ce mod ne sont pas encore terminés. Certains bâtiments ne disposent pas d'animations appropriées. Il y a également des pages d'Informatron incomplètes. 
page_unit_text_1=Unité 05
page_unit_text_2=Contenu à venir !
page_unit_text_3=\nUnité 05
page_unit_text_4=Contenu à venir !
page_pollution_text_1=Pollution
page_pollution_text_2=À chaque cycle (15 minutes), une quantité variable de pollution sera [entity=eneas-vent] rejetée depuis les vastes souterrains d'Énéas vers la surface. Il y a longtemps, Énéas était capable de s'autogérer, mais cette époque est révolue. Vous pouvez éliminer la pollution sur Énéas à l'aide de certains des nouveaux bâtiments. Par exemple, le [entity=clarifier] Clarificateur.\n\nLes vérifications de la pollution ont lieu avant que de nouvelles émissions ne soient ajoutées lors du cycle suivant. Si le niveau de pollution est trop élevé, [entity=unit-05] Unité 05 sera désactivé pour le reste du cycle. La réduction de la pollution permettra à Unité 05 de fonctionner à nouveau.
page_pollution_text_3=\nÉvents
page_pollution_text_4=Les évents ne sont en réalité qu'un exutoire pour la pollution. Si vous parveniez d'une manière ou d'une autre à les détruire ([color=yellow][entity=unit-05] si vous y arrivez, dites-moi comment vous avez fait ! [/color]), la pollution se diffusera alors de manière aléatoire à différents endroits de la carte. Il est donc recommandé de construire vos bâtiments absorbant la pollution à proximité des évents, car ce sont toujours ces blocs qui seront les plus pollués. Les vérifications de la pollution prennent en compte la pollution totale dans tous les blocs, et pas seulement dans certains d'entre eux
page_generator_text_1=Générateur
page_generator_text_2=Contenu à venir !
page_generator_text_3=\nGénérateur
page_generator_text_4=Contenu à venir !
page_lift_text_1=Ascenseur
page_lift_text_2=L'[entity=eneas-lift] ascenseur est l'un des derniers points d'accès restants aux installations de fabrication situées dans les entrailles d'Énéas. En utilisant cet ascenseur, [entity=unit-05] Unité 05 peut vous fournir des ressources à chaque cycle sur Énéas (15 minutes). Par défaut, il produit les ressources de base d'Énéas : [item=ancient-circuit] des anciens circuits, [item=ancient-frame] des anciens cadres et [item=ancient-material] des anciens matériaux.
page_lift_text_3=\nRendement
page_lift_text_4=Vous pouvez augmenter le rendement de ces livraisons de deux manières : tout d'abord, en réduisant les niveaux de pollution sur Énéas. Lorsque la surface est propre, Unité 05 est plus performante et peut produire davantage de ressources pour vous. Ensuite, vous pouvez mener des recherches sur de nouvelles technologies afin d'augmenter la quantité totale de ressources générées et d'ajouter de nouveaux objets à la réserve.
page_unit_07_text_1=Unité 07
page_unit_07_text_2=Contenu à venir !
page_unit_07_text_3=\nUnité 07
page_unit_07_text_4=Contenu à venir !
page_artifact_text_1=Artéfacts érodés
page_artifact_text_2=Des vestiges de technologies anciennes. Même dans leur état de délabrement, les [item=eneas-artifact] artefacts continuent de 
page_artifact_text_3=\nArtéfacts érodés
page_artifact_text_4=Contenu à venir !
page_debris_text_1=Chute de débris
page_debris_text_2=Il semblerait que la lune [planet=eneas] située au-dessus de Nauvis soit instable et perde constamment de la matière, qui s'écrase à la surface de sa voisine [planet=nauvis]. Les deux corps célestes semblent être en rotation synchrone, ce qui concentre les impacts dans une zone bien délimitée.\n
page_debris_text_3=[color=yellow][entity=unit-05] Les marqueurs cartographiques des débris peuvent être gênants. Mais ne vous inquiétez pas ! Ils seront automatiquement supprimés toutes les 15 minutes, à condition qu'il n'y ait pas de débris à proximité. [/color]
page_debris_text_4=\nTrésor
page_debris_text_5=Si les pièces d'[item=eneas-artifact] anciennes machines que l'on peut récupérer dans les débris semblent déjà précieuses, il existe des butins encore plus utiles cachés parmi celles-ci.\nPour les découvrir, il faut faire preuve d'une certaine habileté et d'une précision que seul l'ingénieur est capable de réunir. L'exploitation automatique des débris à l'aide de [item=construction-robot] robots ne permettra d'obtenir que les ressources de base, sans aucune chance de trouver un butin rare.\n
page_data_text_1=Données
page_data_text_2=Contenu à venir !
page_data_text_3=\nDonnées
page_data_text_4=Contenu à venir !
page_radar_text_1=Radar
page_radar_text_2=Ce radar avancé est capable d'automatiser la démolition d'entités. En lui envoyant un signal logique via un câble, vous pouvez définir les cibles que le radar devra démolir. Par exemple, en sélectionnant le signal correspondant à [entity=debris-a] Grand débris, vous pouvez ordonner au radar d'envoyer un ordre de déconstruction pour ces entités situées dans son rayon d'action. Il est possible de définir plusieurs cibles pour un même radar.\n\n ([color=yellow][entity=unit-05] Soyez prudent lorsque vous connectez un radar à des réseaux logiques plus importants, il pourrait démonter certaines parties de votre base ! [/color])
page_radar_text_3=Objets au sol
page_radar_text_4=Il est également possible de laisser le radar récupérer les objets au sol. Le radar n'est toutefois pas capable de distinguer les différents objets présents au sol. Il suffit de lui transmettre le signal [virtual-signal=signal-mining] pour qu'il se charge de tous les objets.
