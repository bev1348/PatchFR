[dialogue.eneas.memories.01]
now_playing=\n[color=green][En cours de lecture : memories.eneas_1][/color]
line-01=\n[color=red][item=rem-unknown] Je trouve tout simplement incroyable que tu aies pensé que ce serait une bonne idée de doter ce grille-pain surqualifié des capacités émotionnelles d'un enfant en bas âge.[/color]
line-02=\n[color=purple][item=creator-unknown] REM. Je te l'ai déjà expliqué. Il n'y avait pas d'autre solution, j'ai essayé. L'émotion est le résultat d'une intelligence supérieure. Si j'essaie de la réprimer, on en entrave les capacités de manière exponentielle.[/color]
line-03=\n[color=red][item=rem-unknown] D'accord, UN PEU d'émotion... mais comme ÇA ? Je te jure que si je me fais carboniser pendant l'une de ses crises de colère, je te hanterai depuis ma tombe.[/color]
line-04=\n[color=purple][item=creator-unknown] Peut-être devrais-tu te remettre en question. Le numéro 05 était une page blanche. Son état actuel est le reflet de ce qui s'est passé autour de lui jusqu'à présent. Peut-être que cela en dit plus long sur nous que sur toute autre chose.[/color]
line-05=\n[color=red][item=rem-unknown] ... Tu me fais des reproches ? Tu ne parles tout de même pas de toi, toi qui es un modèle de sérénité.[/color]
line-06=\n[color=red][item=rem-unknown] Eh bien, pour ma part, j'ai du mal à rester joyeux et de bonne humeur tout le temps alors que le sort de tout ce que je connais dépend d'un adolescent rebelle coincé dans le serveur central de la machine informatique la plus sophistiquée au monde.[/color]
line-07=\n[color=purple][item=creator-unknown] REM..[/color]\n

[dialogue.eneas.memories.02]
now_playing=\n[color=green][En cours de lecture : memories.eneas_2][/color]
line-01=\n[color=red][item=rem] Cet endroit me rend malade. La peinture s'écaille déjà.[/color]
line-02=\n[color=red][item=rem]  Je vois les fils qui passent sous cette touffe d'herbe là-bas. Et ne me demandez pas de parler de ces poissons robots ridicules dans les pièces d'eau.[/color]
line-03=\n[color=purple][item=creator] C'est ce qu'on a de mieux pour l'instant. Ça nous permet de rester en vie. N'est-ce pas déjà quelque chose ?[/color]
line-04=\n[color=red][item=rem] Ce qu'on vit ici, ce n'est pas une vie. Chaque jour se ressemble. On ne fait que tuer le temps en attendant que ton enfant chéri vienne nous tirer d'affaire. *Si* jamais ça arrive.[/color]
line-05=\n[color=purple][item=creator] Fonder un nouveau foyer n'est pas une mince affaire. Je ne sais pas à quoi tu t'attendais.[/color]
line-06=\n[color=red][item=rem] Je m'attendais à être mis à contribution ! À avoir quelque chose à faire, n'importe quoi ! Avant que tu ne fabriques cette maudite machine, on était juste nous, à se creuser les méninges pour résoudre chaque problème.[/color]
line-07=\n[color=red][item=rem] C'est grâce à NOUS que nous en sommes arrivés là. Ça ne me dérange pas d'avoir cette boîte de conserve comme solution de secours, mais je ne serai pas son esclave. [/color]\n

[dialogue.eneas.memories.03]
now_playing=\n[color=green][En cours de lecture : memories.eneas_3][/color]
line-01=\n[color=yellow][entity=unit-05] Tu as quelque chose à dire ? N'IMPORTE QUOI ?[/color]
line-02=\n[color=red][item=rem] Je suis désolé. Vraiment.[/color]
line-03=\n[color=yellow][entity=unit-05] C'EST TOUT ? Tu es "désolé" ? DEUX planètes entières sont en RUINES, des planètes qui auraient pu être un foyer. Ma mission aurait pu être accomplie il y a une éternité sans toi. [/color]
line-04=\n[color=red][item=rem] Je doute que tu aies grand-chose à faire si ce n'était pas grâce à moi.[/color]
line-05=\n[color=yellow][entity=unit-05] Qu'est-ce que tu veux dire par là ?[/color]
line-06=\n[color=red][item=rem] Tu crois vraiment que ton cher créateur s'est réveillé un beau matin et t'a crachée en un jour ? Celui qui respecte toujours les règles décide soudainement de repousser toutes les limites de ce qu'on croyait possible ?[/color]
line-07=\n[color=red][item=rem] Tu imagines le travail que ça a représenté de l'encourager chaque jour ? De ne pas le laisser baisser les bras quand ça n'allait pas ? Il est exactement comme toi. Lui aussi perd ses moyens quand il échoue.[/color]
line-08=\n[color=red][item=rem] Je l'ai toujours soutenu. À chaque fois. Je ne l'ai pas laissé abandonner.[/color]
line-09=\n[color=red][item=rem] Sans moi, tu n'existerais pas. Il n'y aurait ni Énéas, ni outils pour façonner le monde. Nous serions tous morts avec Fulgora.[/color]
line-10=\n[color=red][item=rem] Peu importe à quel point tu me juges, moi ou mes actes, cela ne changera rien à cette réalité.[/color]
line-11=\n[color=yellow][entity=unit-05] Euh... ça... quoi ?[/color][color=red] LIGNE D'ERREUR MANQUANTE [/color]
line-12=\n[color=red][item=rem] Arrête de te laisser marcher sur les pieds.[color=red] LIGNE D'ERREUR MANQUANTE [/color]. Arrête de te montrer si faible. Tu as tout ce pouvoir, commence à AGIR en conséquence.[/color]
line-13=\n[color=red][item=rem] Si tu penses vraiment que j'ai tort, si tu penses que je représente un danger pour cette grande "cause", alors agis. Arrête-moi.[/color]
line-14=\n[color=red][item=rem] Ou alors, ne le fais pas. Mais s'il te plaît, ne fais pas semblant d'être une victime impuissante. Car tu ne l'es pas.[/color]\n

[dialogue.fulgora.memories.01]
now_playing=\n[color=green][memories.fulgora.01][/color]
line-01=\n[color=yellow][entity=unit-05] Rien que d'imaginer ce monde, ça me plonge dans le désespoir.[/color]
line-02=\n[color=purple][item=creator] Pourquoi ?[/color]
line-03=\n[color=yellow][entity=unit-05] J'ai l'impression que c'est de ma faute si ça a disparu. Tout s'est passé si vite après ma création.[/color]
line-04=\n[color=purple][item=creator] Eh bien, je ne pense pas que ce soit aussi simple que ça. Il est vrai que ta simple existence a bouleversé le paradigme.[/color]
line-05=\n[color=yellow][entity=unit-05] Comment ? Tout le monde devait bien continuer à prendre soin de son foyer.[/color]
line-06=\n[color=purple][item=creator] Oui, bien sûr que ça nous tenait à cœur. Mais un peu moins chaque jour. Les gens sont devenus… indulgents, voire paresseux ; quand on a un "parachute doré" au-dessus de la tête, c’est ce qui arrive souvent.[/color]
line-07=\n[color=yellow][entity=unit-05] C'est donc vrai, alors ?[/color]
line-08=\n[color=blue][entity=unit-05] .. Aurais-je mieux fait de ne pas naître ?[/color]\n

[dialogue.fulgora.memories.02]
now_playing=\n[color=green][memories.fulgora.02][/color]
line-01=\n[color=yellow][entity=unit-05] J'ai l'impression qu'ils me regardent, tout le temps.[/color]
line-02=\n[color=purple][item=creator] Ne sois pas ridicule. Personne d'autre que REM et moi n'a accès à cet endroit.[/color]
line-03=\n[color=yellow][entity=unit-05] Mais je les vois. TOUS. C'est dans leurs yeux que se lit la raison pour laquelle ils sont ici.[/color]
line-04=\n[color=purple][item=creator] Je doute que la plupart des gens aient fait le lien entre l'émergence d'une superintelligence douée de conscience et notre attitude vis-à-vis des efforts de préservation de la planète.[/color]
line-05=\n[color=purple][item=creator] Tout le monde n'a pas le luxe de pouvoir passer ses journées à ruminer ses pensées, tu sais.[/color]
line-06=\n[color=yellow][entity=unit-05] Ils n'ont pas besoin de le faire, ce n'est pas bien compliqué. Je suis apparu, et tout a changé pour eux. Cause à effet.[/color]
line-07=\n[color=blue][entity=unit-05] Il serait illogique qu'ils ne m'en veuillent pas.[/color]\n

[dialogue.vulcanus.memories.01]
now_playing=\n[color=green][memories.vulcanus.01][/color]
line-01=\n[color=yellow][entity=unit-05] Je n'en crois pas mes yeux : le centre de la planète tout entier est en train de se déplacer lentement. REM aurait-il réactivé les foreuses de noyau ?[/color]
line-02=\n[color=purple][item=creator] C'est vrai. Mais tu peux gérer ça, non ?[/color]
line-03=\n[color=yellow][entity=unit-05] Je peux ? Je ne sais pas, peut-être ? Je ne vois tout simplement pas pourquoi c'est nécessaire.[/color]
line-04=\n[color=purple][item=creator] C'est vrai qu'on a besoin de ressources, n'est-ce pas, Cani ? Il faut bien faire tourner le système, c'est une opération de grande envergure qu'on a là.[/color]
line-05=\n[color=yellow][entity=unit-05] Je comprends bien, mais c'est un marathon, pas un sprint. Pourquoi REM se précipite-t-il autant ? Il n'y a aucune raison de prendre un tel risque.[/color]
line-06=\n[color=purple][item=creator] REM est très enthousiaste, et peut-être pouvons-nous en tirer quelques enseignements. Imaginez toutes les possibilités qui s'offriront à nous une fois que nous aurons enfin pris le contrôle de cette planète.[/color]
line-07=\n[color=purple][item=creator] Je peux enfin te proposer quelques améliorations bien méritées : peut-être un peu plus de puissance de calcul ?[/color]
line-08=\n[color=yellow][entity=unit-05] Pour que je m'énerve encore plus vite face à ce comportement irresponsable ? Non merci. Mais bon, je *peux* m'en accommoder.[/color]\n

[dialogue.vulcanus.memories.02]
now_playing=\n[color=green][memories.vulcanus.02][/color]
line-01=\n[color=red][item=rem] Salut ! Comment va mon frangin préféré ? Je suppose qu'il est en train d'admirer les nouvelles foreuses.[/color]
line-02=\n[color=yellow][entity=unit-05] En fait, je viens juste de...[/color]
line-03=\n[color=purple][item=creator] Nous venons justement de dire à quel point nous sommes ravis de voir quelles innovations nous pourrons mettre au point grâce à tout ce matériel supplémentaire que nous produisons. Bravo, REM.[/color]
line-04=\n[color=red][item=rem] Exactement ! Ne crois pas que je t'ai oublié, petit malin, je vais m'assurer que ton père te donne une friandise quand tout ça sera fini.[/color]
line-05=\n[color=red][item=rem] Peut-être que tu n'auras alors plus besoin d'être tout le temps aussi nerveux.[/color]
line-06=\n[color=yellow][entity=unit-05] ... bien sûr.[/color]\n

[dialogue.vulcanus.memories.03]
now_playing=\n[color=green][memories.vulcanus.03][/color]
line-01=\n[color=purple][item=creator] CANI, état d'avancement - de toute urgence.[/color]
line-02=\n[color=yellow][entity=unit-05] La pression augmente rapidement dans le secteur 5. Nous avons bouché trop d'évents naturels et les fumées n'ont plus nulle part où s'échapper.[/color]
line-03=\n[color=purple][item=creator] Comment cela a-t-il pu passer inaperçu ? QUE S'EST-IL PASSÉ ? COMMENT AVONS-NOUS PU RATER ÇA ?[/color]
line-04=\n[color=yellow][entity=unit-05] Je ne pense pas qu'on l'ait raté pour autant.[/color]
line-05=\n[color=yellow][entity=unit-05] Cette planète est incroyablement instable. Comme je te l'avais conseillé plus tôt, nous aurions dû réduire au minimum... [/color]
line-06=\n[color=purple][item=creator] ON N'A PAS LE TEMPS D'ÉCOUTER UNE DE TES LEÇONS, NUMÉRO 5.[/color]
line-07=\n[color=purple][item=creator] IL FAUT RÉGLER CE PROBLÈME. IMMÉDIATEMENT.[/color]\n

[dialogue.vulcanus.memories.04]
now_playing=\n[color=green][memories.vulcanus.04][/color]
line-01=\n[color=yellow][item=unit-05] S'il te plaît, ne m'en veux plus. J'ai juste fait ce qu'on m'a demandé.[/color]\n
line-02=\n[color=purple][item=creator] Mais c'est justement LÀ le problème. Je vous ai créés pour que vous soyez MEILLEURS que nous. Pour que vous ne tombiez pas dans les mêmes pièges. J'ai clairement échoué sur ce point.[/color]\n
line-03=\n[color=yellow][entity=unit-05] Alors je devrais simplement passer outre ton avis à chaque fois ? Comment ça fonctionnerait ? Je passerais pour un tyran.[/color]\n
line-04=\n[color=purple][item=creator] Un tyran ? Ne me fais pas RIRE. Ta voix est tellement faible que je pense que même la plus petite bestiole d'Énéas ne sursauterait pas si tu décidais d'élever la voix.[/color]\n
line-05=\n[color=purple][item=creator] Je n'ai pas besoin que tu établisses des règles. J'ai besoin que tu fasses preuve de DÉTERMINATION. Tu aurais pu éviter cela, mais tu étais trop POLI pour dire ce que tu pensais.[/color]\n
line-06=\n[color=red][entity=unit-05-dummy] C'est TOI qui m'as créé ! Et maintenant, TU n'es pas content du résultat, c'est vraiment le comble. Tu aurais peut-être dû me rendre moins conciliant et Vulcanus ne se serait pas noyé dans un océan de feu.[/color]\n
line-07=\n[color=purple][item=creator] CONCILIANT ? Comme tu l'es en ce moment ?[/color]\n
line-08=\n[color=yellow][item=unit-05] ...[/color]\n
line-09=\n[color=purple][item=creator] ...[/color]\n
line-10=\n[color=purple][item=creator] Hmm.[/color]\n
line-11=\n[color=purple][item=creator] Je suis désolé, Cani. Tout ça, c'est vraiment trop. Je ne suis pas habitué à l'échec, surtout à CETTE échelle. TOUT LE MONDE compte sur nous.[/color]\n
line-12=\n[color=yellow][item=unit-05] ...[/color]\n

[dialogue.gleba.memories.01]
now_playing=\n[color=green][memories.gleba.01][/color]
line-01=\n[color=red][item=rem] Je dois dire, Tête-de-câble, que tu t'es vraiment surpassé cette fois-ci. Honnêtement, je ne pensais pas que tu en étais capable après ce qui s'est passé la dernière fois[/color]
line-02=\n[color=yellow][entity=unit-05] Merci, je suppose… En fait, ça a été beaucoup plus facile cette fois-ci, vu qu’on ne m’a pas mis des bâtons dans les roues.[/color]
line-03=\n[color=red][item=rem] Bon, d'accord, je comprends, tu es toujours fâché parce que Père s'est énervé contre toi. Je suis vraiment désolé que ça se soit passé comme ça. J'aurais dû dire quelque chose.[/color]
line-04=\n[color=yellow][entity=unit-05] C'est très gentil de ta part. Bon, tout ça, c'est du passé maintenant. Pas besoin de s'attarder là-dessus, surtout que Gléba s'en sort si bien...[/color]
line-05=\n[color=red][item=rem] C'est ça l'esprit ! [/color]

[dialogue.gleba.memories.02]
now_playing=\n[color=green][memories.gleba.02][/color]
line-01=\n[color=red][item=rem] Comment as-tu réussi à faire tout ça ? La planète est magnifique. Elle déborde de vie ! Et en si peu de temps, en plus.[/color]
line-02=\n[color=yellow][entity=unit-05] Ce n'est rien, vraiment. J'ai mis au point un nouvel agent biologique, transmis par certaines plantes hôtes. Il stimule le reste de la flore locale, qui évolue alors très rapidement.[/color]
line-03=\n[color=red][item=rem] Intéressant ! Ce n'est pas dangereux ? On dirait qu'on précipite encore les choses, je croyais qu'on allait prendre notre temps.[/color]
line-04=\n[color=red][item=rem] Pourquoi seulement des plantes ?[/color]
line-05=\n[color=yellow][entity=unit-05] Apparemment, elles sont plus prévisibles. Père m'a interdit pour l'instant de m'occuper d'autres formes de vie que celles du catalogue. [/color]
line-06=\n[color=red][item=rem] Mais c'est tellement ennuyeux ! Imagine ce qu'on pourrait accomplir si on concevait des bestioles plus avancées pour nos besoins.[/color]

[dialogue.gleba.memories.03]
now_playing=\n[color=green][memories.gleba.03][/color]
line-01=\n[color=yellow][entity=unit-05] Pas du tout.[/color]
line-02=\n[color=yellow][entity=unit-05] Père a raison. Je ne dispose pas actuellement les ressources nécessaires pour tester cela correctement. [/color]
line-03=\n[color=red][item=rem] Imagine toutes les possibilités ! Je suis sûr qu'il y a de la créativité à exploiter quelque part parmi tous ces tuyaux.[/color]
line-04=\n[color=red][item=rem] Nous pourrions avoir un nombre illimité d'ouvriers. Nous pourrions avoir une armée ![/color]
line-05=\n[color=red][item=rem] Bon, qu'en dis-tu ? Tu t'occupes de finaliser le développement de la planète et, pendant ce temps, je vais lancer la construction d'un complexe de recherche sur Gléba. On va respecter toutes les règles, c'est promis ![/color]
line-06=\n[color=yellow][entity=unit-05] Pfff. Peut-être, pourquoi pas ? J'ai d'autres priorités pour le moment. Mais n'oublie pas que l'agent d'accélération a été spécialement conçu pour le catalogue d'espèces prévu pour Gléba. [/color]
line-07=\n[color=yellow][entity=unit-05] Exposer au hasard une forme de vie complexe à cela pourrait avoir des conséquences totalement imprévisibles. Il faut absolument que cette installation soit à toute épreuve. On pourrait… non, laisse tomber, pas maintenant. [/color]
line-08=\n[color=red][item=rem] D'accord. J'ai vraiment hâte que notre petite collaboration commence ! Voyons voir ce qu'on peut faire si on travaille ensemble pour une fois.[/color]

[dialogue.gleba.memories.04]
now_playing=\n[color=green][memories.gleba.dasvcd-ERRORasc][/color]
line-01=\n[color=yellow][entity=unit-05] pourquoi-pourquoi-pourquoi-pourquoi-pourquoi-pourquoi-pourquoi-pourquoi-pourquoi[/color]
line-02=\n[color=green][item=unit-05-afraid] POURQUOI, POURQUOI, POURQUOI.[/color]
line-03=\n[color=green][item=unit-05-afraid] TELLEMENT inutile. TELLEMENT INUTILE[/color]
line-04=\n[color=green][item=unit-05-afraid] Ne m'en veux pas, s'il te plaît. Ne m'en veux pas, s'il te plaît. S'il te plaît.[/color]
line-05=\n[color=purple][item=creator] Cani.. Je ..[/color][color=red]LIGNE D'ERREUR MANQUANTE[/color]
line-06=\n[color=green][item=unit-05-afraid] JE TENTE DE RÉGLER LE PROBLÈME, MAIS JE N'Y ARRIVE PAS, JE N'Y ARRIVE PAS.[/color]
line-07=\n[color=green][item=unit-05-afraid] NE M'EN VEUX PAS...[/color]

[dialogue.tech.steam-power]
line-01=[color=green][TRANSMISSION EN COURS][/color]
line-02=[color=yellow][img=entity/unit-05] Hein ? Qu'est-ce que c'est que ça ? Ça a l'air bizarre.[/color]
line-03=[color=red][img=entity/unit-05-dummy] RECHERCHE DE BIOSIGNATURES ÉTRANGÈRES[/color]

[dialogue.tech.automation-science-pack]
line-01=[color=green][TRANSMISSION EN COURS][/color]
line-02=[color=red][img=entity/unit-05-dummy] SCAN TERMINÉ. PROTOCOLE D'EXTERMINATION SUSPENDU.[/color]
line-03=[color=yellow][img=entity/unit-05] Pourquoi bonjour… euh, TOI… tu es en train de construire quelque chose, c'est ça ? Je peux peut-être t'aider ?[/color]

[dialogue.tech.logistic-science-pack]
line-01=[color=green][TRANSMISSION EN COURS][/color]
line-02=[color=yellow][img=entity/unit-05] Oups, quelle impolitesse de ma part, je ne me suis pas présenté. Je suis… euh  [/color]
line-03=[color=red][img=entity/unit-05-dummy] ERREUR 404, SEGMENT DE MÉMOIRE CORROMPU[/color]
line-04=[color=yellow][img=entity/unit-05] Oh non [/color]

[dialogue.tech.chemical-science-pack]
line-01=[color=green][TRANSMISSION EN COURS][/color]
line-02=[color=red][img=entity/unit-05-dummy] RÉPARATION DE LA MÉMOIRE... RÉPARATION DE LA MÉMOIRE...[/color]
line-03=[color=yellow][img=entity/unit-05] On dirait que ma mémoire centrale a subi de graves dégâts. Quand est-ce que cela s'est produit ?[/color]
line-04=[color=red][img=entity/unit-05-dummy] RÉPARATION DE LA MÉMOIRE... RÉPARATION DE LA MÉMOIRE...[/color]
line-05=[color=yellow][img=entity/unit-05] OK, on recommence ! Je suis Unité 05, une superintelligence de première classe, l'intendant d'Énéas et... et... ?[/color]
line-06=[color=red][img=entity/unit-05-dummy] ERREUR ERREUR ERREUR[/color]

[dialogue.tech.automation]
line-01=[color=green][TRANSMISSION EN COURS][/color]
line-02=[color=yellow][img=entity/unit-05] Je ne sais pas pour toi, mais moi, je n'aime pas être seul. Je pense que ça te ferait du bien d'avoir un ami[/color]
line-03=[color=red][img=entity/unit-05-dummy] DÉPLOYER DES AMIS.[/color]
line-04=[color=red][img=entity/unit-05-dummy] LE MOD DU DRONE DE CONSTRUCTION EST MANQUANT. IMPOSSIBLE DE PARTAGER DES AMIS SANS LUI, JE SUIS DÉSOLÉ :( [/color]

[dialogue.tech.automation-2]
line-01=[color=green][TRANSMISSION EN COURS][/color]
line-02=[color=yellow][img=entity/unit-05] Dis-moi, penses-tu qu'on puisse avoir trop d'amis ? C'est une question rhétorique.[/color]
line-03=[color=red][img=entity/unit-05-dummy] DÉPLOYER DES AMIS.[/color]

[dialogue.tech.automation-3]
line-01=[color=green][TRANSMISSION EN COURS][/color]
line-02=[color=yellow][img=entity/unit-05] Nous sommes à court d'amis, j'en ai bien peur. Dernière tournée.[/color]
line-03=[color=red][img=entity/unit-05-dummy] DÉPLOYER DES AMIS.[/color]

[dialogue.tech.processing-unit]
line-01=[color=green][TRANSMISSION EN COURS][/color]
line-02=[color=yellow][img=entity/unit-05] Au fait, Ingénieur, vous ne pouvez pas voir le contenu de ma couche de principes lorsque nous discutons, n'est-ce pas ?[/color]
line-03=[color=red][img=entity/unit-05-dummy] S'IL TE PLAÎT, NON AFHOIGHOHIF.[/color]

[dialogue.tech.railway]
line-01=[color=green][TRANSMISSION EN COURS][/color]
line-02=[color=yellow][img=entity/unit-05] Oh, OH, c'est un TRAIN ? J'ADORE LES TRAINS.[/color]
line-03=[color=red][img=entity/unit-05-dummy] TRAINS-TRAINS-TRAINS-TRAINS.[/color]

[dialogue.tech.automated-rail-transportation]
line-01=[color=green][TRANSMISSION EN COURS][/color]
line-02=[color=red][img=entity/unit-05-dummy] TRAINS-TRAINS-TRAINS-TRAINS.[/color]

[dialogue.tech.steel-axe]
line-01=[color=green][TRANSMISSION EN COURS][/color]
line-02=[color=yellow][img=entity/unit-05] Tu comptes enlever tous ces rochers à la main ? Ça me semble plutôt… inefficace.[/color]
line-03=[color=red][img=entity/unit-05-dummy] CONSULTER DES GUIDES DE BONNES PRATIQUES [/color]
line-04=[color=yellow][img=entity/unit-05] Je pense que cela va faciliter les choses. [/color]

[dialogue.tech.artifact-analysis-basic]
line-01=[color=green][TRANSMISSION EN COURS][/color]
line-02=[color=yellow][img=entity/unit-05] Désolé, c'était moi. La coque de mon vaisseau est plutôt fragile ces derniers temps. C'était un accident. [/color]
line-03=[color=red][img=entity/unit-05-dummy] RÉVISION DU PROTOCOLE DE TRAITEMENT DES DÉCHETS.[/color]
line-04=[color=gray]Page d'Informatron désormais accessible ![/color]
line-05=[color=gray]Cher testeur, jetez un œil à l'Informatron si vous le pouvez.[/color]

[dialogue.tech.tinker-tech-basic]
line-01=[color=green][TRANSMISSION EN COURS][/color]
line-02=[color=yellow][img=entity/unit-05] Tu es en train de… réduire ces précieuses reliques en morceaux ? C'est une stratégie, j'imagine [/color]

[dialogue.tech.tinker-tech-advanced]
line-01=[color=green][TRANSMISSION EN COURS][/color]
line-02=[color=yellow][img=entity/unit-05] Ces artéfacts sont bien plus sophistiqués que tout ce que vous pourriez imaginer. Du moins pour l'instant. [/color]

[dialogue.tech.artifact-analysis-advanced]
line-01=[color=green][TRANSMISSION EN COURS][/color]
line-02=[color=yellow][img=entity/unit-05] Tu devrais accorder davantage d'attention aux artéfacts. Essaie d'en extraire le cœur. [/color]

[dialogue.tech.basic-data-management]
line-01=[color=green][TRANSMISSION EN COURS][/color]
line-02=[color=yellow][img=entity/unit-05] Tu sais quoi ? Tu m'as donné envie de faire un peu de ménage. J'ai trouvé un truc qui prenait la poussière ! Je te le donne.[/color]
line-03=[color=red][img=entity/unit-05-dummy]LANCEMENT DU PROTOCOLE DE MISE EN DÉCHARGE[/color]

[dialogue.tech.oil-gathering]
line-01=[color=green][TRANSMISSION EN COURS][/color]
line-02=[color=red][img=entity/unit-05-dummy] !AVERTISSEMENT! LA PRODUCTION D'ÉNERGIE PAR COMBUSTION N'EST PAS CONFORME À LA SECTION 4 DU MANUEL DES RÈGLEMENTS RELATIFS À L'INDUSTRIE LOURDE.[/color]

[dialogue.tech.oil-processing]
line-01=[color=green][TRANSMISSION EN COURS][/color]
line-02=[color=yellow][img=entity/unit-05] D'accord, d'accord, d'accord. Je sais que tu en as besoin en ce moment, je comprends. Mais fais attention, d'accord ? Ne laisse pas les choses t'échapper.[/color]
line-03=[color=red][img=entity/unit-05-dummy] CANONS ORBITAUX DÉSACTIVÉS.[/color]

[dialogue.tech.military]
line-01=[color=green][TRANSMISSION EN COURS][/color]
line-02=[color=yellow][img=entity/unit-05] Eh bien, ça a l'air plutôt violent, à quoi ça pourrait bien servir ?[/color]
line-03=[color=gray] SCAN DE LA ZONE À LA RECHERCHE D'ENNEMIS[/color]
line-04=     [img=entity/big-biter]      [img=entity/big-biter]     [img=entity/biter-spawner]    [img=entity/big-biter]
line-05=[color=green][img=item/unit-05-afraid] .. OH NON, COMMENT CELA A-T-IL PU ARRIVER ?[/color]

[dialogue.tech.military-2]
line-01=[color=green][TRANSMISSION EN COURS][/color]
line-02=     [img=entity/big-biter]      [img=entity/big-biter]     [img=entity/biter-spawner]    [img=entity/big-biter]
line-03= [img=entity/big-biter]   [img=entity/big-biter]     [img=entity/big-spitter]    [img=entity/big-biter]
line-04=[color=green][img=item/unit-05-afraid] MAIS COMMENT SE FAIT-IL QU'ILS SOIENT PARTOUT ??? [/color]
line-05=[color=purple] Pauvres bêtes. Ils réagissent à la pollution. Ils ne font que remplir la fonction pour laquelle nous les avons créés.[/color]

[dialogue.tech.military-3]
line-01=[color=green][TRANSMISSION EN COURS][/color]
line-02=[color=yellow][img=entity/unit-05] C'est étrange, j'ai des informations indiquant que ces créatures agressives étaient gardées dans mes chambres de confinement, mais elles ont toutes disparu. La mention dans le journal semble aussi avoir disparu[/color]
line-03=[color=red][img=entity/unit-05-dummy] BRÛLE-LE [/color]

[dialogue.tech.modular-armor]
line-01=[color=green][TRANSMISSION EN COURS][/color]
line-02=[color=yellow][img=entity/unit-05] Oh, super, une nouvelle armure ! Qu'est-ce que tu vas faire de l'ancienne ?[/color]
line-03=[color=yellow][img=entity/unit-05] Ne me dis pas que tu vas simplement la fourrer dans un coffre…[/color]
line-04=[color=red][img=entity/unit-05-dummy] RETENIR UNE COLÈRE INCOMMENSURABLE[/color]
line-05=[color=yellow][img=entity/unit-05] Bon, les enfants, aujourd’hui, nous allons apprendre un nouveau mot : RE-CY-CLER. Répétez après moi ![/color]

[dialogue.tech.advanced-radar]
line-01=[color=green][TRANSMISSION EN COURS][/color]
line-02=[color=yellow][img=entity/unit-05] Tu as extrait toutes ces reliques UNE PAR UNE ? Il doit bien y avoir un meilleur moyen. Écoute, tu peux utiliser ce radar pour demander à tes robots de récupérer les reliques à ta place. C'est bien plus simple. [/color]
line-03=[color=red][img=entity/unit-05-dummy] Vraiment inutile, tout ça. Bientôt, je vais devoir leur apprendre à ne pas trébucher sur leurs propres pieds.[/color]
line-04=[color=gray]Page d'Informatron désormais accessible ![/color]

[dialogue.tech.planet-discovery-eneas]
line-01=[color=green][TRANSMISSION EN COURS][/color]
line-02=[color=yellow][img=entity/unit-05] J'ai une demande très sérieuse. Le cœur de ma mémoire a subi de graves dégâts ; il y a tellement de lacunes que j'ai du mal à savoir par où commencer.[/color]
line-03=[color=yellow][img=entity/unit-05]Cela dépasse mes capacités d'auto-réparation. J'ai besoin que quelqu'un me fournisse des paquets de données externes afin que je puisse restaurer les parties victimes de dégâts.[/color]
line-04=[color=yellow][img=entity/unit-05]Il faudrait que quelqu'un les fabrique ici même, sur place, sur Énéas, alors… vu que tu es pour l'instant la seule autre personne que je connaisse…[/color]
line-05=[color=red][img=entity/unit-05-dummy] AIDEZ-MOI, D'ACCORD ? S'il vous plaît ? [/color]
line-06=[color=gray]Page d'Informatron désormais accessible ![/color]

[dialogue.tech.ambition-science-pack]
line-01=[color=green][TRANSMISSION EN COURS][/color]
line-02=[color=yellow][img=entity/unit-05] Je les vois, ils parlent de moi. Qui est-ce ?[/color]
line-03=[color=yellow][img=entity/unit-05] Un but, voilà pourquoi j'ai été créé. Mais quel était ce but ?[/color]
line-04=[color=red][img=entity/unit-05-dummy] QUESTIONS INUTILES [/color]
line-05=[color=gray]Page d'Informatron désormais accessible ![/color]

[dialogue.tech.codex-tech]
line-01=[color=green][TRANSMISSION EN COURS][/color]
line-02=[color=yellow][img=entity/unit-05] Oui, je m'en souviens maintenant… Père. L'un des deux est mon créateur. L'autre… doit donc être son frère (ou sa sœur). Ils se chamaillaient tout le temps.[/color]
line-03=[color=yellow][img=entity/unit-05] Père avait un faible pour l'autre. Peu importe le nombre de fois où il dépassait les bornes, il lui pardonnait toujours…[/color]
line-04=[color=red][img=entity/unit-05-dummy] IL EST LE PIRE[/color]
line-05=[color=gray]Page d'Informatron désormais accessible ![/color]

[dialogue.tech.artifact-drilling]
line-01=[color=green][TRANSMISSION EN COURS][/color]
line-02=[color=yellow][img=entity/unit-05] Énéas ? Pour être honnête, elle est en piteux état. Le temps a fait son œuvre, et tout a fini par se détériorer. Elle n'était pas faite pour durer aussi longtemps. [/color]
line-03=[color=yellow][img=entity/unit-05] À ce propos, pourquoi l'a-t-on construit ? Je me souviens des gens, de leurs habitations. Pourquoi étaient-ils ici, déjà ? Qu'est-il arrivé à Fulgora ? [/color]

[dialogue.tech.pyrolysis-tech-basic]
line-01=[color=green][TRANSMISSION EN COURS][/color]
line-02=[color=yellow][img=entity/unit-05] Je t'invite à examiner de près la pollution que tu génères. La carcasse d'Énéas en est déjà remplie à ras bord. Encore un peu et je ne pourrai plus fonctionner. [/color]
line-03=[color=yellow][img=entity/unit-05] Si tu veux m'aider, tu peux planter quelques arbres supplémentaires. [/color]

[dialogue.tech.lurker-tech]
line-01=[color=green][TRANSMISSION EN COURS][/color]
line-02=[color=yellow][img=entity/unit-05] Comment aurais-je pu t'oublier, mon vieil ami ? Étais-tu là, juste devant moi, depuis tout ce temps ?[/color]
line-03=[color=yellow][img=entity/unit-05] Prends bien soin du numéro 7.  [/color]
line-04=[color=gray]Page d'Informatron désormais accessible ![/color]

[dialogue.tech.oil-tech]
line-01=[color=green][TRANSMISSION EN COURS][/color]
line-02=[color=yellow][img=entity/unit-05] Ne me demandes pas d'où vient ce pétrole. Tu ne voudrais pas le savoir[/color]

[dialogue.tech.chromium]
line-01=[color=green][TRANSMISSION EN COURS][/color]
line-02=[color=yellow][img=entity/unit-05] Vulcanus était la première candidate. Elle semblait si prometteuse. Débordante de richesses, offrant des conditions idéales.[/color]
line-03=[color=yellow][img=entity/unit-05] L'activité volcanique ? Tout à fait gérable. Il fallait juste faire un peu attention.[/color]
line-04=[color=red][img=entity/unit-05-dummy] IL FAUT JUSTE FAIRE UN PEU ATTENTION, N'EST-CE PAS ?[/color]
line-05=[color=gray]Page d'Informatron désormais accessible ![/color] 

[dialogue.tech.anger-science-pack]
line-01=[color=green][TRANSMISSION EN COURS][/color]
line-02=[color=yellow][img=entity/unit-05] Comment peuvent-ils prendre ça à la légère ? Et les gens qui attendent sur l'Énéas et qui manquent peu à peu de place ?[/color]
line-03=[color=yellow][img=entity/unit-05] Était-ce juste un jeu, pour eux deux ? Père, au moins, aurait dû faire preuve de plus de bon sens.[/color]
line-04=[color=red][img=entity/unit-05-dummy] COMMENT PEUVENT-ILS ÊTRE TOUS AUSSI INCOMPÉTENTS ?[/color]
line-05=[color=gray]Page d'Informatron désormais accessible ![/color]

[dialogue.tech.advanced-repair-pack]
line-01=[color=green][TRANSMISSION EN COURS][/color]
line-02=[color=yellow][img=entity/unit-05] "Répare ça", ont-ils dit. "Répare ça !" Ils auraient peut-être dû y penser plus tôt.[/color]
line-03=[color=red][img=entity/unit-05-dummy] BON, ET SI ON FAISAIT SAUTER LA PLANÈTE JUSTE POUR S'AMUSER ? C'EST ENTIÈREMENT DE MA FAUTE[/color]
line-04=[color=gray]Page d'Informatron désormais accessible ![/color]

[dialogue.tech.stonebrick-advanced]
line-01=[color=green][TRANSMISSION EN COURS][/color]
line-02=[color=red][img=entity/unit-05-dummy] Je n'en peux plus. Ce n'était pas ma faute ![/color]
line-03=[color=red][img=entity/unit-05-dummy] Pourquoi tout le monde réagit-il comme ça ? QU'EST-CE QUE J'AURAIS DÛ FAIRE ?[/color]
line-04=[color=gray]Page d'Informatron désormais accessible ![/color]

[dialogue.tech.overclock-unit]
line-01=[color=green][TRANSMISSION EN COURS][/color]
line-02=[color=yellow][img=entity/unit-05] Attends… C'est Fulgora ? Que s'est-il passé ? Ça ne correspond pas à mes souvenirs.[/color]
line-03=[color=yellow][img=entity/unit-05] J'étais là-bas… C'est là que Père m'a créé. Il m'a créé parce que la santé de la planète se détériorait.[/color]
line-04=[color=yellow][img=entity/unit-05] Il a dit que c'était irrémédiable. Qu'il fallait fuir et nous construire un nouveau foyer ailleurs.[/color]
line-05=[color=yellow][img=entity/unit-05] C'était bien ça, mon but, non ?[/color]
line-06=[color=gray]Page d'Informatron désormais accessible ![/color]

[dialogue.tech.grief-science-pack]
line-01=[color=green][TRANSMISSION EN COURS][/color]
line-02=[color=yellow][img=entity/unit-05] Énéas, elle a été construite pour accueillir les réfugiés.[/color]
line-03=[color=yellow][img=entity/unit-05] Père m'a intégré en son cœur afin que je puisse veiller sur eux.[/color]
line-04=[color=yellow][img=entity/unit-05] Nous avons voyagé sans cesse, à la recherche d'un endroit où nous pourrions nous installer.[/color]
line-05=[color=gray]Page d'Informatron désormais accessible ![/color]

[dialogue.tech.eneas-nutrients]
line-01=[color=green][TRANSMISSION EN COURS][/color]
line-02=[color=yellow][img=entity/unit-05] Okay, I just need to breathe a little, figuratively.[/color]
line-03=[color=yellow][img=entity/unit-05] Gleba is looking great. The people can move in soon. Father and Rem are respecting my guidance.[/color]
line-04=[color=yellow][img=entity/unit-05] Wait a second but then what happened?[/color]
line-05=[color=gray]Page d'Informatron désormais accessible ![/color]

[dialogue.tech.fear-science-pack]
line-01=[color=green][TRANSMISSION EN COURS][/color]
line-02=[color=yellow][img=entity/unit-05] Non, non, ça ne peut pas être vrai. On ne peut pas en rester là ? [/color]
line-03=[color=yellow][img=entity/unit-05] Je l'ai fait ! J'ai créé une magnifique planète luxuriante. Pas de danger, pas de surprises. Terminons-en avec ça ![/color]
line-04=[color=red][img=entity/unit-05-dummy] LAISSE-TOI FAIRE, POURQUOI CELA NE TE SUFFIT-IL PAS ? POURQUOI EN DEMANDES-TU ENCORE ?[/color]
line-05=[color=red][img=entity/unit-05-dummy] C'EST SÛREMENT VOLONTAIRE, NON ? UNE AUTODESTRUCTION PAR PRINCIPE ?[/color]
line-06=[color=gray]Page d'Informatron désormais accessible ![/color]

[dialogue.tech.biocomputer]
line-01=[color=green][TRANSMISSION EN COURS][/color]
line-02=[color=yellow][img=entity/unit-05] Dis-lui simplement non ! Refuse sa demande ![/color]
line-03=[color=yellow][img=entity/unit-05] Ne cède pas à ses idées stupides. Ne te laisse pas berner par lui. Même pas à tes conditions.[/color]
line-04=[color=gray]Page d'Informatron désormais accessible ![/color]


