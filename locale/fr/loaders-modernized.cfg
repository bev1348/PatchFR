mdrn-use-electricity=Utilise de l'électricité
mdrn-double-recipe=Recette double
mdrn-chute-mode=Mode de chute
mdrn-chute-direction=Direction de chute
mdrn-enable-stack-loader=Activer l'entité chargeur empileur
mdrn-enable-stacking=Mode d'empilage sur les convoyeurs
mdrn-cheap-stacking=Chargeurs empileurs moins chers
mdrn-use-aai-graphics=Utiliser les graphismes d'AAI Loaders
mdrn-use-aai-recipes=Utiliser les recettes d'AAI Industry
mdrn-keep-5d-loaders=Conserver les chargeurs de 5Dim
mdrn-keep-turbo-loader=Conserver les chargeurs turbo
mdrn-unlock-technology=Mode de débloquage
mdrn-embiggen-assemblers=Machines d'assemblages plus grandes
mdrn-oplp=Ancienne consommation électrique
mdrn-default-respect-insert-limits=Respecter les limites des bras (par défaut)
mdrn-default-wait-for-full-stack=Attendre que la pile soit complète (par défaut)

[mod-setting-description]
mdrn-use-electricity=Si activé, les chargeurs auront besoin d'électricité pour fonctionner.
mdrn-double-recipe=Doubler le coût de la recette et produire deux chargeurs à la fois afin que les souterrains soient consommés par paires.
mdrn-chute-mode=Détermine si le chargeur à chute est disponible et s'il prend en charge le filtrage.
mdrn-chute-direction=Détermine si la chute est limitée au chargement d'objets dans des conteneurs ou si elle permet également le déchargement sur des convoyeurs. Cela ne s'applique que si le mode de la chute est réglé sur "Basique".
mdrn-enable-stack-loader=Permet à une recette de créer une entité de chargeur empileur distincte fonctionnant à la vitesse du chargeur turbo. À utiliser lorsque l'empilage est désactivé pour tous les autres chargeurs.
mdrn-enable-stacking=Activer les chargeurs permettant l'empilage sur les convoyeurs.
mdrn-cheap-stacking=Lorsque l'empilage des convoyeurs est défini sur "Tous" : utilisez les recettes non-empilables, moins coûteuses, pour les chargeurs.
mdrn-use-aai-graphics=AAI Loaders a été détecté.\nUtiliser le jeu de graphismes d'AAI Loaders pour Loaders Modernized.\n\nCette option est destinée à être utilisée lorsque le "Mode de fonctionnement" d'AAI Loaders est réglé sur "Graphismes uniquement".
mdrn-use-aai-recipes=AAI Industry a été détecté.\nUtiliser les recettes basées sur AAI Industry pour Loaders Modernized.
mdrn-keep-5d-loaders=Conserver les chargeurs fournis par le mod 5Dim's Transport en plus de ceux de Loaders Modernized.
mdrn-keep-turbo-loader=Conserver les chargeurs turbo dans le jeu. Ils ont la même vitesse que les chargeurs MK4, mais sont plus chers.
mdrn-unlock-technology=Vous pouvez choisir de débloquer les chargeurs avec une technologie distincte, ou en même temps que les autres éléments logistiques du même niveau.
mdrn-embiggen-assemblers=Agrandir les machines d'assemblage afin que les chargeurs situés aux angles semblent un peu plus proches pour se connecter.
mdrn-oplp=Utiliser la "energy-per-item" d'origine (que certains jugent disproportionnée). Cela n'a aucun effet si l'option "Utilise de l'électricité" est désactivée.
mdrn-default-respect-insert-limits=Comportement par défaut des chargeurs lors du remplissage des machines.
mdrn-default-wait-for-full-stack=Comportement par défaut des chargeurs pouvant s'empiler.

