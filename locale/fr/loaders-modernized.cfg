[mod-name]
loaders-modernized=Loaders modernized (Chargeurs modernisés)

[mod-description]
loaders-modernized=Chargeur compact 1x1 nécessitant de l'électricité pour fonctionner. Il existe des options permettant d'activer ou de modifier certaines fonctionnalités, telles que l'empilage, la désactivation de la consommation d'énergie ou le coût des recettes.

[entity-name]
mdrn-loader=Chargeur
mdrn-fast-loader=Chargeur rapide
mdrn-express-loader=Chargeur express
mdrn-turbo-loader=Chargeur surbo
mdrn-stack-loader=Chargeur empileur
mdrn-chute-loader=Chute

[entity-description]
mdrn-chute-loader=Sert à déverser lentement des objets dans un conteneur
common=Sert à charger des objets dans des conteneurs ou à les en décharger à la vitesse du convoyeur.
stack=\n\nCe chargeur peut empiler des objets sur des convoyeurs en plusieurs couches.

[technology-name]
mdrn-loader=__ENTITY__mdrn-loader__
mdrn-fast-loader=__ENTITY__mdrn-fast-loader__
mdrn-express-loader=__ENTITY__mdrn-express-loader__
mdrn-turbo-loader=__ENTITY__mdrn-turbo-loader__
mdrn-stack-loader=__ENTITY__mdrn-stack-loader__

[technology-description]
common=Permettre un chargement rapide sur et depuis des convoyeurs.

