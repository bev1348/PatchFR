mdrn-enable-stacking-stack-tier=Chargeur empileur séparé
mdrn-keep-5d-loaders-none=Aucun
mdrn-keep-5d-loaders-all=Tous
mdrn-keep-5d-loaders-1x2=Uniquement 1x2
mdrn-unlock-technology-separate=Technologie distincte
mdrn-unlock-technology-belt=Avec les convoyeurs
mdrn-embiggen-assemblers-zero=Aucun
mdrn-embiggen-assemblers-eight=8%
mdrn-embiggen-assemblers-sixteen=16%


[string-mod-setting-description]
mdrn-chute-mode-none=Aucune chute ne sera créée.
mdrn-chute-mode-basic=Des chutes de base seront créées.
mdrn-chute-mode-filtered=Les chutes avancées permettent d'utiliser des filtres et des filtres à lignes séparées, et peuvent être configurées pour le surremplissage des machines.
mdrn-chute-direction-input=La chute ne peut charger que des objets provenant d'un convoyeur vers un conteneur.
mdrn-chute-direction-input-output=La chute peut charger un conteneur à partir d'un convoyeur ou décharger un conteneur sur un convoyeur.
mdrn-enable-stacking-none=Les chargeurs ne pourront pas empiler les objets sur les convoyeurs.
mdrn-enable-stacking-turbo-and-above=Seuls les chargeurs plus rapide que express pourront empiler des objets sur les convoyeurs.\n\nLe nombre de bras de la recette sera supérieur au cas "Aucun".
mdrn-enable-stacking-all=Tous les chargeurs pourront empiler les objets sur les convoyeurs en fonction de votre niveau de technologie d'empilage.\n\nLe nombre de bras de la recette sera supérieur au cas "Aucun".
mdrn-enable-stacking-stack-tier=Créez un chargeur empileur distinct, doté de sa propre recette et de sa propre technologie. Ce chargeur nécessite des bras empileurs et sera capable d'alimenter votre convoyeur le plus rapide.
mdrn-keep-5d-loaders-none=Retirer les chargeurs 1x2 et 1x1 de 5Dim. N'utiliser que les chargeurs de Loaders Modernized.
mdrn-keep-5d-loaders-all=Conserver les chargeurs 1x2 et 1x1 issus des mods de 5Dim, en plus de ceux de Loaders Modernized.
mdrn-keep-5d-loaders-1x2=Ne conserver que les chargeurs 1x2 issus du mod de 5Dim, en plus de ceux de Loaders Modernized.
mdrn-unlock-technology-separate=Les chargeurs disposeront de leur propre technologie pour débloquer la recette.
mdrn-unlock-technology-belt=Les recettes des chargeurs seront débloquées au même niveau technologique que les autres objets logistiques de la même catégorie.
mdrn-embiggen-assemblers-zero=Ne pas modifier la taille des machines d'assemblage.
mdrn-embiggen-assemblers-eight=Agrandir les machines d'assemblage de 8%
mdrn-embiggen-assemblers-sixteen=Agrandir les machines d'assemblage de 16%

[strings]
mdrn-use-split-lanes=Répartir les filtres par ligne
mdrn-use-wfs=Attendre que la pile soit complète
mdrn-use-fill=Remplir les emplacements de la machine
mdrn-split-suffix=(Diviser)
mdrn-wfs-suffix=(Attendre la pile)
mdrn-fill-suffix=(Remplir)
mdrn-add-loader-variants-tooltip=Ajouter des correspondances de mise à niveau pour toutes les variantes de chargeurs qui correspondent aux paires de mise à niveau de chargeurs de base existantes dans ce planificateur.
mdrn-remove-loader-variants-tooltip=Supprimer les correspondances de mise à niveau des variantes de chargeur dont la paire de niveaux de base figure également dans ce planificateur.
mdrn-compatibility-change=[color=yellow]Loaders Modernized[/color] : La manière dont la compatibilité avec des mods supplémentaires est assurée a changé. Les auteurs de mods peuvent ajouter cette prise en charge directement depuis leur mod ou via un mod complémentaire.
mdrn-compatibility-removed=[color=yellow]Loaders Modernized[/color] : Il semblerait que certains chargeurs aient été supprimés dans la foulée. Tous les mods précédemment pris en charge disposent désormais d'un mod d'extension. Veuillez signaler tout problème sur la page de discussion de Loaders Modernized.
mdrn-power-change=[color=yellow]Loaders Modernized[/color] : La consommation électrique a augmenté. Les chargeurs consommeront désormais au moins un ordre de grandeur de plus lorsqu'ils sont actifs. Une option est disponible dans les paramètres du mod pour revenir à la consommation d'énergie réduite si vous le souhaitez.
mdrn-chute-direction-change=[color=yellow]Loaders Modernized[/color] : Les chutes étaient initialement destinées à servir uniquement au chargement d'objets dans des conteneurs. Dans cette sauvegarde, des chutes déchargeant des conteneurs sur des convoyeurs ont été détectées. Le paramètre de la carte a été modifié pour autoriser les chutes à décharger sur les convoyeurs afin d'éviter toute perte de fonctionnalité, mais vous souhaiterez peut-être adapter votre configuration pour éviter cela si vous souhaitez utiliser les chutes conformément à leur usage prévu.
mdrn-compatibility-removed-2=[color=yellow]Loaders Modernized[/color] : [color=red]NE SAUVEGARDEZ PAS[/color] Il semble que certains de vos anciens chargeurs n'aient pas été remplacés par les nouvelles versions. Cela signifie probablement que le mod de compatibilité n'a pas été chargé, ou qu'un mod ajoutant des niveaux de convoyeur qui incluait également des chargeurs issus de [color=yellow]Loaders Modernized[/color] doit être mis à jour.

