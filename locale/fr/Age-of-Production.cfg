[technology-description]
aop-arc-furnace=Un four géant permettant une fusion rapide et efficace.
aop-atomic-enricher=[entity=centrifuge] améliorée, capable de traiter des processus nucléaires plus complexes.
aop-greenhouse=Champ artificiel permettant une culture des arbres et des plantes plus compacte, moins coûteuse et plus rapide.
aop-hydraulic-plant=Machine capable d'exécuter efficacement des opérations hydrauliques.
aop-petrochemical-facility=[entity=oil-refinery] améliorée, capable de prendre en charge divers procédés pétrochimiques.
aop-quantum-machinery=Les dernières avancées en matière de recherche, de fabrication et de transmission des effets.
aop-lumber-mill=Une machine à faible consommation d'énergie qui permet d'accélérer le travail du bois.
aop-agriculture-productivity=Augmentation du rendement des plantes en serre.
aop-advanced-recycling=Grâce à une nouvelle technologie de modules, de nouvelles techniques de recyclage peuvent être atteintes.
aop-automation=Machines d'assemblage capables de traiter des ingrédients fluides, avec une plus grande vitesse, une meilleure productivité et des emplacements pour modules supplémentaires.
aop-core-mining=La dernière avancée en matière d'exploitation minière qui permet d'extraire des ressources pratiquement inépuisables des grandes planètes dotées d'une surface stable.
aop-core-mining-productivity=Augmentation du rendement des foreuses minières des profondeurs.
aop-deep-mineral-refining-productivity=Utiliser de meilleures techniques pour le traitement des minerais issus des profondeurs afin de permettre l'extraction d'une plus grande quantité de minerais.
aop-armory=Les nouvelles technologies militaires nous permettent de produire des munitions à des débits sans précédent.
aop-synthesis=Utilisez les [item=aop-metallic-traces] obtenues en tamisant l'[tile=ammoniacal-ocean] d'[planet=aquilo] pour synthétiser des minerais sur ce monde gelé et désertique.
aop-biomass-reactor=Accédez à une alternative plus efficace aux [item=nutrients] et à une source d'énergie issue de la fusion de biomasse.
aop-smaller-beacons=Des diffuseurs de modules compacts et peu encombrants. Ils ne peuvent accueillir qu'un seul module, mais offrent une meilleure efficacité de diffusion lorsqu'ils sont placés à proximité les uns des autres.
aop-bitumen-processing=Transformez le [fluid=heavy-oil] et la [item=stone] pour fabriquer une substance isolante dense.
aop-petrochemical-science-pack=Permet de mener des recherches plus poussées dans le domaine de la pétrochimie.
aop-thermal-science-pack=Permet des applications thermiques plus avancées.
aop-fission-science-pack=Permet la recherche sur les processus nucléaires.
aop-forestry-science-pack=Permet des applications forestières plus avancées
aop-quantistic-science-pack=Permet d'accéder aux secrets des particules quantiques.
aop-radiation-cladding=Un blindage épais qui protège contre les rayonnements intenses.
aop-uranium-233-breeding=Permet la production d'un isotope plus instable de [item=uranium-ore].
aop-quicklime-explosives=Permet de fabriquer des [item=explosives] à partir de [item=aop-quicklime].
aop-biocircuits=Utilisez des bactéries et du [item=bioflux] pour fabriquer des composants électroniques entièrement biologiques.
aop-asphalt=Un revêtement routier à base de [fluid=aop-bitumen] qui permet une circulation plus fluide des véhicules.
aop-tritium-synthesis=Synthétiser du [fluid=aop-tritium] par fusion nucléaire contrôlée.
aop-water-rectification=Séparer le [fluid=aop-deuterium] et, plus rarement, le [fluid=aop-tritium] de l'eau lourde provenant de sources d'[fluid=water].

