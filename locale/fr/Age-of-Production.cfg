[recipe-description]
aop-charcoal=Brûler du [item=wood] pour obtenir du [item=carbon].
aop-wood-rotting=Processus de décomposition du [item=wood] en [item=spoilage]. Utilise une petite quantité de [item=spoilage] comme catalyseur.
aop-uranium-sifting=Tamisez la [item=stone] pour trouver de l'uranium.
aop-solid-fuel-melting=Faites fondre le [item=solid-fuel] pour le retransformer en [fluid=crude-oil].
aop-carbon-liquefaction=Une technique alternative à la liquéfaction du charbon.
aop-petroleum-gas-dehydrogenation=Retirez les 4 atomes d'hydrogène du [fluid=petroleum-gas], ne laissant que le [item=carbon].
aop-nutrients-from-biomass=Transformez la [item=aop-biomass] en [item=nutrients] détériorés à 75 %.
aop-core-mining=Creusez profondément sous la surface des planètes pour obtenir des ressources pures.
aop-mineral-slurry=Transformez les minéraux issus des profondeurs en boue pour les traiter.
aop-mineral-slurry-processing=Nettoyez la boue pour éliminer les impuretés et obtenir des [item=aop-refined-mineral].
aop-explosives-from-quicklime=Autre source pour les [item=explosives].
aop-uranium-233-breeding=Fabriquez de l'[item=aop-uranium-233] à partir d'[item=uranium-235] et de [item=stone] dans de l'[fluid=sulfuric-acid].
aop-tungsten-plate-heating=Chauffez des [item=tungsten-plate] pour des traitements de précision.
aop-tritium-synthesis=Synthétiser du [fluid=aop-tritium] par fusion nucléaire contrôlée.
aop-water-rectification=Séparer les isotopes rares de l'hydrogène de l'[fluid=water] en utilisant la chaleur dégagée par la [fluid=fluoroketone-hot].
aop-ammoniacal-solution-sifting=Filtrez les [item=aop-metallic-traces] à partir de [fluid=ammoniacal-solution].
aop-copper-ore-from-metallic-traces=Synthétisez des [item=copper-ore] à partir de [item=aop-metallic-traces] en utilisant un autre [item=copper-ore] comme catalyseur.
aop-iron-ore-from-metallic-traces=Synthétisez des [item=iron-ore] à partir de [item=aop-metallic-traces] en utilisant un autre [item=iron-ore] comme catalyseur.
aop-thermal-science-pack-heating=Chauffez le [item=aop-thermal-science-pack] jusqu'à ce qu'il soit prêt à l'emploi.

