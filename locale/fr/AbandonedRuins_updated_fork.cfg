[mod-setting-description]
ruins-enemy-not-cease-fire=Si désactivé, les tourelles et autres défenses dans les ruines n'attaqueront pas le joueur.
ruins-enable-debug-log=Active __de nombreux__ messages de débogage. Veuillez les activer lorsque vous souhaitez aider au débogage de ce mod.
ruins-enable-debug-utils=Active beaucoup de messages de debug pour la bibliothèque « utilities ». Cette option est extrêmement peu utilisée, veuillez la laisser désactivée en général.
ruins-enable-debug-on-tick=Active __un très grand nombre__ de messages de débogage pour l'événement `on_tick`. Cette option est très peu utilisée, veuillez la laisser désactivée en général.
ruins-min-distance-from-spawn=Distance minimale en tuiles par rapport au point d'apparition (également appelé "tuile zéro").
ruins-spawn-tick-seconds=Secondes entre deux tentatives de génération de ruines dans une tuile de carte nouvellement générée. Des valeurs trop faibles peuvent affecter les performances, tandis que des valeurs trop élevées retardent l'apparition.
ruins-large-ruin-chance=Probabilité de faire apparaître une grande ruine dans un bloc généré, valeur flottante de 0 à 1, par exemple 0.1 correspond à 10 % de chances.
ruins-medium-ruin-chance=Probabilité de faire apparaître une ruine moyenne dans un bloc généré, valeur flottante de 0 à 1, par exemple 0.1 correspond à 10 % de chances.
ruins-small-ruin-chance=Probabilité de faire apparaître une petite ruine dans un bloc généré, valeur flottante de 0 à 1, par exemple 0.1 correspond à 10 % de chances.
ruins-enable-spawn-ruins-all-planets=Ce paramètre n'affecte le jeu qu'une seule fois au début. Une fois la partie sauvegardée, il n'aura plus d'effet (pour chaque sauvegarde). Si activé, des ruines apparaîtront sur n'importe quelle planète selon les paramètres du mod. Si désactivé, les ruines n'apparaîtront que sur Nauvis et les planètes par défaut de l'Ére spatiale.
ruins-expensive-sanity-checks=Effectue une validation supplémentaire lors de la génération des ruines afin de détecter les ensembles de ruines, les planètes et les surfaces non valides. Recommandé pour les parties de petite taille ou fortement modifiées ; ne le désactivez que si vous avez besoin de performances supplémentaires. Toujours actif lorsque le journal de débogage est activé.
current-ruin-set=La collection de ruines utilisée. Des mods peuvent ajouter leurs propres collections de ruines.

