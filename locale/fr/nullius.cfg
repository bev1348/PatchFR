nullius-solar-panel-1=Énergie renouvelable cyclique de 70kW en moyenne. Construire ou équiper.
nullius-solar-panel-2=Énergie renouvelable cyclique de 140kW en moyenne. Construire ou équiper.
nullius-solar-panel-3=Énergie renouvelable cyclique de 350kW en moyenne. Construire ou équiper.
nullius-solar-panel-4=Énergie renouvelable cyclique de 560kW en moyenne. Construire ou équiper.
nullius-night-vision-1=Visibilité correcte dans l'obscurité.
nullius-night-vision-2=Bonne visibilité dans l'obscurité.
nullius-night-vision-3=Visibilité parfaite dans l'obscurité.
nullius-levitation-field=Se déplacer sur des convoyeurs sans être emporté.
nullius-shield=Champ de force de défense personnelle.
nullius-leg-augmentation=Augmente la vitesse de déplacement. Empilables.
nullius-hangar=Stockage pour les robots entre deux tâches. Construire ou équiper.\nLe mode construction seul peut être basculé en utilisant __CONTROL__nullius-prioritize__.
nullius-charger=Recharge supplémentaire pour les robots actifs. Construire ou équiper.
nullius-relay=Augmente le champ d'action des robots. Construire ou équiper.\nLe mode construction seul peut être basculé en utilisant __CONTROL__nullius-prioritize__.
nullius-battery=Équipement de stockage d'énergie ou de carburant pour véhicules.
nullius-jetpack-1=[font=default-bold][color=#f5cb48]Poussée : 1[/color][/font]\nAppuyez sur __CONTROL__jetpack__ pour l'activer.\nVous permet de voler au-dessus des structures et de l'eau. Plusieurs jetpacks vous permettent de voler plus vite. Le vol consomme du carburant pour fusée ou des barils de méthanol de votre inventaire.
nullius-jetpack-2=[font=default-bold][color=#f5cb48]Poussée : 2[/color][/font]\nAppuyez sur __CONTROL__jetpack__ pour l'activer.\nVous permet de voler au-dessus des structures et de l'eau. Plusieurs jetpacks vous permettent de voler plus vite. Le vol consomme du carburant pour fusée ou des barils de méthanol de votre inventaire.
nullius-jetpack-3=[font=default-bold][color=#f5cb48]Poussée : 3[/color][/font]\nAppuyez sur __CONTROL__jetpack__ pour l'activer.\nVous permet de voler au-dessus des structures et de l'eau. Plusieurs jetpacks vous permettent de voler plus vite. Le vol consomme du carburant pour fusée ou des barils de méthanol de votre inventaire.
nullius-jetpack-4=[font=default-bold][color=#f5cb48]Poussée : 4[/color][/font]\nAppuyez sur __CONTROL__jetpack__ pour l'activer.\nVous permet de voler au-dessus des structures et de l'eau. Plusieurs jetpacks vous permettent de voler plus vite. Le vol consomme du carburant pour fusée ou des barils de méthanol de votre inventaire.
nullius-portable-generator=Brûle le carburant du véhicule pour alimenter les équipements androïdes.
nullius-portable-generator-backup=Brûle le carburant du véhicule pour alimenter les équipements androïdes. Priorité inférieure à celle des batteries. Peut être utile en complément du solaire, en utilisant le carburant en dernier recours.
nullius-portable-reactor=Brûle du combustible nucléaire pour alimenter les équipements androïdes.
nullius-refueler=Recharge automatiquement les générateurs et les réacteurs portables avec du carburant provenant de l'inventaire. Ne charge que le combustible de même type que celui déjà utilisé par cet équipement.
nullius-jump-boots=Sacrifie la capacité de transport au profit de la vitesse de déplacement.
nullius-deactivated-coprocessor=Ce coprocesseur a été désactivé après avoir dépassé la limite pour les coprocesseurs de niveau __1__.
nullius-coprocessor-quantum=Permet d'installer jusqu'à 2 coprocesseurs de types différents pour chaque niveau.
nullius-coprocessor-speed=Augmente la vitesse de déplacement et de fabrication. Multiplie la vitesse et la consommation d'énergie des autres outils de fabrication.\n[font=default-semibold][color=1,0.9,0.75]Multiplicateur de vitesse de fabrication :[/color][/font] __1__%\n[font=default-semibold][color=1,0.9,0.75]Pénalité d'énergie pour la fabrication :[/color][/font] __2__%\n[font=default-semibold][color=1,0.9,0.75]Énergie par seconde de recette :[/color][/font] __3__kJ
nullius-coprocessor-efficiency=Optimise la consommation électrique de base de l'androïde et la consommation énergétique de l'outil de fabrication.\n[font=default-semibold][color=1,0.9,0.75]Excédent d'énergie :[/color][/font] __1__kW\n[font=default-semibold][color=1,0.9,0.75]Remise sur l'énergie de fabrication :[/color][/font] __2__%
nullius-coprocessor-productivity=Crée plus de rendement à partir du même matériau lors de la fabrication manuelle, au détriment de la vitesse. Organise la cargaison pour une meilleure utilisation du stockage auxiliaire.\n[font=default-semibold][color=1,0.9,0.75]Bonus de productivité :[/color][/font] __1__%\n[font=default-semibold][color=1,0.9,0.75]Pénalité pour la vitesse de fabrication :[/color][/font] __2__%\n[font=default-semibold][color=1,0.9,0.75]Énergie par seconde de recette :[/color][/font] __3__kJ\n[font=default-semibold][color=1,0.9,0.75]Capacité du compartiment à bagages :[/color][/font] __4__%
nullius-coprocessor-tier-1=Peut installer jusqu'à 2 coprocesseurs de niveau 1 de types différents.
nullius-coprocessor-tier-2=Peut installer un coprocesseur de niveau 2 en plus du niveau 1.
nullius-coprocessor-tier-3=Peut installer un coprocesseur de niveau 3 et des niveaux inférieurs.

