[item-description]
nullius-geology-pack=Échantillon de minerais, étudié en laboratoire, afin d'adapter la technologie aux minerais locaux.
nullius-climatology-pack=Échantillon de climat, étudié en laboratoire, pour adapter la technologie au climat local.
nullius-mechanical-pack=Prototype mécanique, étudié en laboratoire, pour calibrer la production de dispositifs mécaniques.
nullius-electrical-pack=Prototype électrique, étudié en laboratoire, pour calibrer la production d'appareils électroniques.
nullius-chemical-pack=Échantillon chimique, étudié en laboratoire, pour calibrer la synthèse des substances chimiques.
nullius-physics-pack=Appareil, utilisé dans un laboratoire, pour réaliser des expériences de physique expérimentale.
nullius-astronomy-pack=Signal interstellaire, décrypté dans un laboratoire, pour accéder à des connaissances avancées sur les progéniteurs.
nullius-biochemistry-pack=Échantillon chimique, étudié en laboratoire de biologie, pour calibrer la synthèse biochimique.
nullius-microbiology-pack=Échantillon microbien, étudié en laboratoire de biologie, pour adapter la microflore à la planète.
nullius-botany-pack=Spécimen botanique, étudié en laboratoire de biologie, pour adapter les plantes au climat local.
nullius-dendrology-pack=Échantillon de matière d'arbre, étudié en laboratoire de biologie, pour adapter les arbres à l'environnement.
nullius-nematology-pack=Échantillon de ver, étudié en laboratoire de biologie, pour adapter les vers au sol local.
nullius-ichthyology-pack=Echantillon de poisson, étudié en laboratoire de biologie, pour adapter les poissons aux eaux locales.
nullius-zoology-pack=Echantillon d'arthropode, étudié en laboratoire de biologie, pour adapter les arthropodes à l'environnement.
nullius-self-repair-pack=À activer pour réparer les dégâts subis par votre avatar physique.
