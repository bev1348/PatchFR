nullius-algae=Remplir les plans d'eau d'algues grâce aux drones aquaculteurs.
nullius-grass=Remplir les terres côtières d'herbe à l'aide de drones horticoles.
nullius-tree=Planter des arbres près des vers et loin des fumerolles, en utilisant des drones arboriculteurs.
nullius-worm=Relâcher des vers à proximité de l'herbe ou des arbres, en utilisant des drones entomologistes.\nNécessite plus de 30% d'oxygène.
nullius-fish=Relâcher des poissons près des algues, en utilisant des drones piscicoles.\nNécessite plus de 60% d'oxygène..
nullius-arthropod=Relâcher les arthropodes sur terre, près des arbres et des poissons.\nNécessite plus de 80% d'oxygène.
nullius-oxygen=Augmenter le niveau d'oxygène dans l'atmosphère. Les plantes que vous semez dans la nature le feront progressivement au fil du temps. Le rejet d'oxygène y contribue également. L'évacuation d'hydrogène, de méthane ou d'autres agents réducteurs neutralisera une partie de l'oxygène.
nullius-probe=Lancer 10 sondes dans des fusées.
nullius-terraform=Remodeler des paysages extraterrestres exotiques tels que les terrains noirs, violets ou volcaniques, en utilisant des drones de terraformation ou d'excavation.
nullius-copper=Déposer 20 drones guides d'astéroïdes en cuivre.
nullius-uranium=Déposer 12 drones guides d'astéroïdes d'uranium.
nullius-coal=Créer des gisements totalisant 3 millions de charbon à l'aide de drones de séquestration.
nullius-petroleum=Créer des gisements totalisant 12 millions de pétrole à l'aide de drones de séquestration.
