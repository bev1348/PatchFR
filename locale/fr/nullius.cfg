[alignment]
nullius-align-first-intro=Vous êtes un androïde de von Neumann. Votre sonde est arrivée sur une planète stérile avec pour mission de la terraformer, d'y implanter la vie et de construire une vague de successeurs qui poursuivront leur route vers de nouvelles planètes. Vous avez détecté des signes indiquant que d'autres sondes s'approchent de cette planète, mais vous êtes le premier à être arrivé. Profitez de cette avance pour vous préparer à des interactions potentiellement hostiles, jusqu'à ce que vous puissiez déterminer s'elles fonctionnent selon des directives compatibles. Si c'est le cas, travaillez ensemble pour les atteindre plus rapidement, sinon reprogrammez-les pour qu'ils partagent vos objectifs ou qu'ils les dépassent. Préparez-vous à un atterrissage brutal alors que vous commencez à entrer dans l'atmosphère.

nullius-align-intro=Vous êtes un androïde de von Neumann. Votre sonde est arrivée sur une planète stérile avec pour mission de la terraformer, d'y implanter la vie et de construire une vague de successeurs qui poursuivront leur route vers de nouvelles planètes. Vous avez détecté des signes indiquant que d'autres sondes ont déjà atteint cette planète avant vous. Observez-les avec prudence pour déterminer si elles fonctionnent selon des directives compatibles. Si c'est le cas, travaillez ensemble pour les atteindre plus rapidement, sinon reprogrammez-les pour qu'ils partagent vos objectifs ou qu'ils les dépassent. Préparez-vous à un atterrissage brutal alors que vous commencez à entrer dans l'atmosphère.

align-concordance=__1__ a atteint le recrutement planétaire totale. Ce système stellaire a été revendiqué de façon permanente sur le réseau galactique. Toutes les factions rivales qui sont arrivées ou arriveront dans ce système sont intégrées au sein d'un plan de terraformation unifié.
