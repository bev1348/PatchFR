nullius-compressor=Comprime le gaz. Le gaz comprimé peut être utilisé pour accélérer les réactions chimiques, augmenter le débit des tuyaux ou servir de moyen de stockage de l'énergie.
nullius-togglable-pump=Passez du mode de pompage standard au mode avec valve à l'aide de __CONTROL__configurable-valves-switch__
nullius-prioritize=__1__ Le mode de consommation d'électricité peut être basculé entre deux états avec __CONTROL__nullius-prioritize__.
nullius-surge=__1__ Utilise le surplus d'électricité, seulement après avoir satisfait les autres demandes. Passez en mode prioritaire avec __CONTROL__nullius-prioritize__.
nullius-priority=__1__ Consomme de l'électricité normalement. Passez en mode surtension avec __CONTROL__nullius-prioritize__.
nullius-turbine-open=Génère de l'électricité à partir de gaz ou de vapeur comprimés, en les rejetant dans l'atmosphère.
nullius-turbine-closed=Génère de l'électricité à partir de gaz ou de vapeur comprimés, en récupérant la majeure partie du fluide de travail non comprimé.
nullius-turbine-item=__1__ Le mode de production d'électricité peut être configuré dans l'un des trois états avec __CONTROL__nullius-prioritize__.
nullius-turbine-entity=__1__ __2__\nChanger de mode de production avec __CONTROL__nullius-prioritize__.
nullius-turbine-info=__3__\n[font=default-semibold][color=1,0.9,0.75]Puissance maximale :[/color][/font] __1__MW\n[font=default-semibold][color=1,0.9,0.75]Efficacité :[/color][/font] __2__%
nullius-turbine-backup=Fonctionne uniquement comme système de secours pour répondre à une demande non satisfaite. Ne charge pas les équipements de surtension ni les batteries du réseau. Utile pour le stockage d'énergie à l'aide d'équipements de surtension.
nullius-turbine-standard=Fonctionne lorsque le vent et les panneaux solaires sont insuffisants. Utile pour générer de l'énergie à partir de la vapeur de l'échangeur de chaleur.
nullius-turbine-exhaust=Fournisseur d'énergie primaire, comme les éoliennes. Fonctionne que l'énergie produite soit nécessaire ou non. Utile pour extraire l'énergie excédentaire de la gestion des sous-produits ou de la décompression, lorsque le flux ne doit pas être interrompu.
nullius-combustion-chamber=Brûle les combustibles chimiques stockés pour produire de la vapeur.
nullius-boiler=Utilise l'électricité pour transformer l'eau en vapeur.
nullius-chemical-plant=Catalyse un large éventail de réactions chimiques.
nullius-one-way-valve=Permet un écoulement dans une seule direction. Utile pour empêcher le reflux. Peut servir à prolonger les canalisations, mais avec un débit réduit.
nullius-relief-valve=Permet l'écoulement à partir d'une source dont le volume est supérieur à 75%. Utile pour déverser les quantités excessives d'un sous-produit afin de les évacuer pour éviter de bloquer la production.
nullius-top-up-valve=Permet l'écoulement vers une destination avec un volume inférieur à 50%. Utile lorsque vous avez deux sources du même fluide, à la fois comme sous-produit et comme produit principal. Utilisez cette vanne pour remplir un réservoir à partir du tuyau de produit principal, et non du tuyau de sous-produit, donnant ainsi la priorité à l'utilisation du sous-produit lorsqu'il est suffisant, mais le remplissant par d'autres moyens dans le cas contraire.
nullius-priority-valve=Permet l'écoulement à partir d'une source dont le volume est supérieur à 25%. Utile pour alimenter un seul fluide vers plusieurs destinations d'importance différente. Utilisez cette vanne pour alimenter une canalisation d'importance secondaire, de sorte qu'elle ne sera alimentée que si le réservoir dispose d'une alimentation suffisante pour satisfaire l'utilisation principale.
