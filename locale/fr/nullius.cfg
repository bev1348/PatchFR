nullius-heat-pipe-2=Transfère jusqu'à 80MW d'énergie thermique.\n[font=default-semibold][color=1,0.9,0.75]Capacité calorifique :[/color][/font] 250kJ par °C.\n[font=default-semibold][color=1,0.9,0.75]Température maximale :[/color][/font] 500°C
nullius-heat-pipe-3=Transfère jusqu'à 200MW d'énergie thermique.\n[font=default-semibold][color=1,0.9,0.75]Capacité calorifique :[/color][/font] 500kJ par °C.\n[font=default-semibold][color=1,0.9,0.75]Température maximale :[/color][/font] 1500°C
nullius-stirling-engine-1=Convertit la chaleur avec un rendement de 80% pour produire jusqu'à 800kW d'électricité.\n[font=default-semibold][color=1,0.9,0.75]Plage optimale :[/color][/font] de 180°C à 250°C\n[font=default-semibold][color=1,0.9,0.75]Température minimale de fonctionnement :[/color][/font] 120°C
nullius-stirling-build-1=Convertit la chaleur avec un rendement de 80% pour produire jusqu'à 800kW d'électricité.\n[font=default-semibold][color=1,0.9,0.75]Plage optimale :[/color][/font] de 180°C à 250°C\n[font=default-semibold][color=1,0.9,0.75]Température minimale de fonctionnement :[/color][/font] 120°C
nullius-stirling-engine-2=Convertit la chaleur avec un rendement de 90% pour produire jusqu'à 2,5MW d'électricité.\n[font=default-semibold][color=1,0.9,0.75]Plage optimale :[/color][/font] de 200°C à 500°C\n[font=default-semibold][color=1,0.9,0.75]Température minimale de fonctionnement :[/color][/font] 100°C
nullius-stirling-build-2=Convertit la chaleur avec un rendement de 90% pour produire jusqu'à 2,5MW d'électricité.\n[font=default-semibold][color=1,0.9,0.75]Plage optimale :[/color][/font] de 200°C à 500°C\n[font=default-semibold][color=1,0.9,0.75]Température minimale de fonctionnement :[/color][/font] 100°C
nullius-stirling-engine-3=Convertit la chaleur avec un rendement de 95% pour produire jusqu'à 8MW d'électricité.\n[font=default-semibold][color=1,0.9,0.75]Plage optimale :[/color][/font] de 240°C à 1500°C\n[font=default-semibold][color=1,0.9,0.75]Température minimale de fonctionnement :[/color][/font] 80°C
nullius-stirling-build-3=Convertit la chaleur avec un rendement de 95% pour produire jusqu'à 8MW d'électricité.\n[font=default-semibold][color=1,0.9,0.75]Plage optimale :[/color][/font] de 240°C à 1500°C\n[font=default-semibold][color=1,0.9,0.75]Température minimale de fonctionnement :[/color][/font] 80°C
nullius-thermal-tank-1=Stocke 4MJ par °C d'énergie thermique pour une consommation ultérieure.\n[font=default-semibold][color=1,0.9,0.75]Taux de transfert :[/color][/font] 25MW\n[font=default-semibold][color=1,0.9,0.75]Température maximale :[/color][/font] 250°C
nullius-thermal-tank-2=Stocke 8MJ par °C d'énergie thermique pour une consommation ultérieure.\n[font=default-semibold][color=1,0.9,0.75]Taux de transfert :[/color][/font] 60MW\n[font=default-semibold][color=1,0.9,0.75]Température maximale :[/color][/font] 500°C
nullius-thermal-tank-3=Stocke 20MJ par °C d'énergie thermique pour une consommation ultérieure.\n[font=default-semibold][color=1,0.9,0.75]Taux de transfert :[/color][/font] 200MW\n[font=default-semibold][color=1,0.9,0.75]Température maximale :[/color][/font] 1500°C
nullius-lab-1=Étudie des échantillons pour mettre en place des processus technologiques plus avancés.
nullius-lab-2=Étudie des échantillons pour mettre en place des processus technologiques plus avancés.
nullius-lab-3=Étudie des échantillons pour mettre en place des processus technologiques plus avancés.
nullius-biology-lab=Étudie des échantillons pour étudier les organismes vivants.
nullius-sensor-node-1=Point d'observation pour surveiller l'usine à distance.\nVision à distance : 7x7 secteurs\nRévélation de la carte : 11x11 secteurs
nullius-sensor-node-2=Point d'observation pour surveiller l'usine à distance.\nVision à distance : 9x9 secteurs\nRévélation de la carte : 15x15 secteurs
nullius-sensor-node-3=Point d'observation pour surveiller l'usine à distance.\nVision à distance : 13x13 secteurs\nRévélation de la carte : 21x21 secteurs
nullius-beacon-1=Transmet 50% de l'effet de 1 module aux machines voisines.
nullius-beacon-2=Transmet 40% de l'effet de 2 modules aux machines voisines (80% au total).
nullius-beacon-3=Transmet 50% de l'effet de 2 modules aux machines voisines (100% au total).
nullius-large-beacon-1=Transmet l'effet de 1 module jusqu'à 12 tuiles de distance. Ne peut être placé à portée d'autres grands diffuseurs. Réduit l'effet des petits diffuseurs à portée.
nullius-large-beacon-2=Transmet l'effet de 2 modules jusqu'à 12 tuiles de distance. Ne peut être placé à portée d'autres grands diffuseurs. Réduit l'effet des petits diffuseurs à portée.
nullius-beacon-1-1=Transmet 45% de l'effet de 1 module aux machines voisines. Effet réduit par 1 champ de grand diffuseur.
nullius-beacon-1-2=Transmet 40% de l'effet de 1 module aux machines voisines. Effet réduit par 2 champs de grands diffuseurs.
nullius-beacon-1-3=Transmet 30% de l'effet de 1 module aux machines voisines. Effet réduit par 3 champs de grands diffuseurs.
nullius-beacon-1-4=Transmet 15% de l'effet de 1 module aux machines voisines. Effet réduit par 4 champs de grands diffuseurs.
nullius-beacon-2-1=Transmet 36% de l'effet de 2 modules aux machines voisines (72% au total). Effet réduit par 1 champ de grand diffuseur.
nullius-beacon-2-2=Transmet 32% de l'effet de 2 modules aux machines voisines (64% au total). Effet réduit par 2 champs de grands diffuseurs.
nullius-beacon-2-3=Transmet 24% de l'effet de 2 modules aux machines voisines (48% au total). Effet réduit par 3 champs de grands diffuseurs.
nullius-beacon-2-4=Transmet 12% de l'effet de 2 modules aux machines voisines (24% au total). Effet réduit par 4 champs de grands diffuseurs.
nullius-beacon-3-1=Transmet 45% de l'effet de 2 modules aux machines voisines (90% au total). Effet réduit par 1 champ de grand diffuseur.
nullius-beacon-3-2=Transmet 40% de l'effet de 2 modules aux machines voisines (80% au total). Effet réduit par 2 champs de grands diffuseurs.
nullius-beacon-3-3=Transmet 30% de l'effet de 2 modules aux machines voisines (60% au total). Effet réduit par 2 champs de grands diffuseurs.
nullius-beacon-3-4=Transmet 15% de l'effet de 2 modules aux machines voisines (30% au total). Effet réduit par 2 champs de grands diffuseurs.
nullius-lamp-1=Améliore la visibilité de nuit dans un rayon d'environ 9 tuiles.
nullius-lamp-2=Améliore la visibilité de nuit dans un rayon d'environ 15 tuiles.
nullius-antenna=Diffuse les alertes du réseau logique.
nullius-storage-chest=Stockage générique pour le réseau logistique.
nullius-supply-chest=Fournit des contenus pour répondre aux demandes du réseau logistique.
nullius-demand-chest=Réceptionne des objets spécifiques livrés par le réseau logistique..
nullius-buffer-chest=Met à disposition et redistribue des objets du réseau logistique.
nullius-dispatch-chest=Rejette son contenu dans les stocks du réseau logistique.
nullius-wall=Garde ce qui est à l'extérieur à l'extérieur et ce qui est à l'intérieur à l'intérieur.
nullius-gate=Permet aux entités autorisées de passer à travers les murs.
nullius-locomotive-1=Tire les wagons le long des itinéraires prévus. Embarquez-y avec __CONTROL__toggle-driving__. Ouvrez le menu avec __CONTROL__build__.
nullius-locomotive-2=Tire les wagons le long des itinéraires prévus. Embarquez-y avec __CONTROL__toggle-driving__. Ouvrez le menu avec __CONTROL__build__.
nullius-locomotive-3=Tire les wagons le long des itinéraires prévus. Embarquez-y avec __CONTROL__toggle-driving__. Ouvrez le menu avec __CONTROL__build__.
nullius-solar-locomotive=Tire les wagons le long des itinéraires prévus. Embarquez-y avec __CONTROL__toggle-driving__. Ouvrez le menu avec __CONTROL__build__.
nullius-drone-launcher-1=Envoie des drones pour cartographier des endroits ciblés grâce à des télécommandes.
nullius-drone-launcher-2=Envoie des drones pour cartographier des endroits ciblés grâce à des télécommandes.
nullius-drone-carrier-1=Envoie des drones pour cartographier des endroits ciblés grâce à des télécommandes.
nullius-drone-carrier-2=Envoie des drones pour cartographier des endroits ciblés grâce à des télécommandes.
nullius-nanofabricator=Synthétise des matériaux avancés de manière atomique, couche par couche.
nullius-reactor=Transforme le combustible nucléaire en énergie thermique.\nCapacité calorifique : 10MJ par °C.\nTempérature maximale : 1500°C
nullius-silo=Lance des fusées dans l'espace.
nullius-turret=Enseigne aux formes de vie organiques mobiles de rester dans leur habitat désigné.
nullius-minable=[font=default-semibold][color=1,0.9,0.75]Exploitable pour :[/color][/font] __1__
nullius-landing-pod-1=[font=default-semibold][color=1,0.9,0.75]Exploitable pour :[/color][/font] 1x[item=nullius-large-chest-1]
nullius-landing-pod-2=[font=default-semibold][color=1,0.9,0.75]Exploitable pour :[/color][/font] 1x[item=nullius-large-chest-1]
nullius-landing-main=[font=default-semibold][color=1,0.9,0.75]Exploitable pour :[/color][/font] 2x[item=nullius-large-chest-1] 40x[item=nullius-steel-ingot] 15x[item=copper-cable]
nullius-android=__CONTROL__nullius-upload-mind__ pour prendre le contrôle de ce corps.\n__CONTROL__nullius-previous-body__ pour revenir dans le corps précédent.\n__CONTROL__nullius-next-body__ pour passer au corps suivant dans la file d'attente.
nullius-boxer=Unité compacte qui met en boîte ou déballe rapidement.
nullius-request-slots=__1__\n[font=default-semibold][color=1,0.9,0.75]Emplacements de demande :[/color][/font] __2__
nullius-power-switch= Se connecte au réseau électrique grâce à __1__ ([item=__2__]).
nullius-fumarole=Site volcanique propice à l'installation d'une centrale géothermique ou à l'extraction de gaz volcanique. L'installation géothermique n'est pas affectée par la richesse et n'épuise pas la ressource. L'extraction illimitée de gaz volcanique permet d'atteindre un minimum de 25 % de la production initiale.
nullius-fumarole-finite=Site volcanique propice à l'installation d'une centrale géothermique ou à l'extraction de gaz volcanique. L'installation géothermique n'est pas affectée par la richesse et n'épuise pas la ressource. La source de gaz volcanique est limitée et disparaît lorsqu'elle est entièrement épuisée.
nullius-hydrothermal-vent=Source de gaz volcanique en haute mer exploitable par un extracteur en haute mer. Le gaz volcanique illimité s'épuise jusqu'à un minimum de 25 % de la production initiale.
nullius-offshore-extractor=Plateforme flottante d'extraction des cheminées hydrothermales (fumerolles). Comprend un générateur thermique qui fournit l'énergie nécessaire à son fonctionnement et aux pompes qui y sont rattachées.
or_pole=Puissance d'extraction au large
nullius-loader=Déplace des objets vers ou depuis un conteneur ou une machine à la vitesse du convoyeur correspondant.
nullius-align-conscription-turret=Installation défensive qui tire automatiquement des rayons de recrutement sur les factions rivales.
nullius-align-concordance-transmitter=Les androïdes nouvellement arrivés commenceront dans une faction avec un émetteur actif au lieu de commencer leur propre faction. Protège tous les joueurs et les bâtiments contre le recrutement tant qu'il est actif. Révèle progressivement les secteurs éloignés.
inserterToggleInfo=Utilisez Maj+L pour basculer entre le mode de bras long et le mode normal (disponible lorsque la recherche sur l'extension est débloquée)
nullius-cargo-drone-mooring=Une tour d'amarrage. Nécessite un espace aérien libre de toute obstruction, notamment de parcs éoliens et d'autres amarrages.

