nullius-productivity-module-2=Augmente la production des usines de manière efficace.
nullius-productivity-module-3=Augmente la production des usines de manière efficace.
nullius-chassis-1=Placé dans un emplacement d'armure, il permet d'augmenter la capacité de votre équipement et votre défense.
nullius-chassis-2=Placé dans un emplacement d'armure, il permet d'augmenter la capacité de votre équipement, la taille de votre inventaire et votre défense.
nullius-chassis-3=Placé dans un emplacement d'armure, il permet d'augmenter la capacité de votre équipement, la taille de votre inventaire et votre défense.
nullius-chassis-4=Placé dans un emplacement d'armure, il permet d'augmenter la capacité de votre équipement, la taille de votre inventaire et votre défense.
nullius-chassis-5=Placé dans un emplacement d'armure, il permet d'augmenter la capacité de votre équipement, la taille de votre inventaire, votre défense et votre panache.
nullius-gun=Démolit des cibles individuelles. Utilise des chargeurs.
nullius-rifle=Vaporisez la destruction en une rafale serrée. Utilise des chargeurs.
nullius-missile-launcher=Démolit des zones à distance grâce à des missiles.
nullius-mecha-drone-launcher=Déploie des drones à proximité.
nullius-mecha-remote=Se lie à un mécha et l'invoque à distance.
nullius-magazine=Démolit des cibles individuelles. Tiré par un pistolet ou une carabine.
nullius-magazine-2=Anéantit tout. Tiré par un pistolet ou une carabine.
nullius-missile-1=Démolit les entités dans un rayon raisonnable, y compris les falaises.
nullius-missile-2=Détruit tout dans un large rayon, laissant un lac en forme de cratère.
nullius-explosive=Une explosion contrôlée qui détruit les falaises en toute sécurité.
nullius-scout-drone-1=Révèle une région de 7x7 secteurs de la carte.
nullius-scout-drone-2=Révèle une région de 13x13 secteurs de la carte.
nullius-scout-remote=Désigne un emplacement sur la carte pour lancer un drone éclaireur, révélant une section de la carte. Depuis la vue de la carte, vous pouvez désigner des lieux inexplorés, éloignés et à portée d'un lanceur de drones.
nullius-demolition-drone=Détruit tout, sauf les gisements de ressources, dans une zone de 4x4 secteurs.
nullius-demolition-remote=Désigne un emplacement sur la carte pour lancer un drone de démolition, détruisant tout sauf les gisements de ressources dans une zone de 4x4 secteurs.
nullius-shallow-excavation-drone=Remplace les terres inoccupées par de l'eau peu profonde dans une zone de 4x4 secteurs. Peut augmenter l'indice de terraformation de la planète de la même manière que les drones de terraformation (0,5x l'efficacité de la terraformation).
nullius-shallow-excavation-remote=Désigne un emplacement sur la carte pour lancer un drone d'excavation, remplaçant les terres inoccupées par de l'eau peu profonde dans une zone de 4x4 secteurs.
nullius-excavation-drone=Remplace la terre par des eaux profondes dans une zone de 4x4 secteurs. Élimine tout ce qui s'y trouve, y compris les ressources. Peut augmenter l'indice de terraformation de la planète de la même manière que les drones de terraformation.
nullius-excavation-remote=Désigne un emplacement sur la carte pour lancer le drone d'excavation, remplaçant la terre par de l'eau profonde dans une zone de 4x4 secteurs.
nullius-terraforming-drone-grey=Remplace le paysage par un sol gris dans une zone d'environ 4x4 secteurs. Élimine les rochers, les falaises, l'eau et les débris. Augmente l'indice de terraformation de la planète quand on remplace un terrain exotique comme le violet, le volcanique ou le noir.
nullius-terraforming-remote-grey=Désigne à distance un emplacement sur la carte pour lancer un drone de terraformation (gris) pour remplacer le sol.
nullius-terraforming-drone-tan=Remplace le paysage par un sol roux dans une zone d'environ 4x4 secteurs. Élimine les rochers, les falaises, l'eau et les débris. Augmente l'indice de terraformation de la planète quand on remplace un terrain exotique comme le violet, le volcanique ou le noir (1,25x l'efficacité de terraformation).
nullius-terraforming-remote-tan=Désigne à distance un emplacement sur la carte pour lancer un drone de terraformation (roux) pour remplacer le sol.
nullius-terraforming-drone-brown=Remplace le paysage par un sol brun dans une zone d'environ 4x4 secteurs. Élimine les rochers, les falaises, l'eau et les débris. Augmente l'indice de terraformation de la planète quand on remplace un terrain exotique comme le violet, le volcanique ou le noir (1,5x l'efficacité de terraformation).
nullius-terraforming-remote-brown=Désigne à distance un emplacement sur la carte pour lancer un drone de terraformation (brun) pour remplacer le sol.
nullius-terraforming-drone-red=Remplace le paysage par un sol rouge dans une zone d'environ 4x4 secteurs. Élimine les rochers, les falaises, l'eau et les débris. Augmente l'indice de terraformation de la planète quand on remplace un terrain exotique comme le violet, le volcanique ou le noir (1,25x l'efficacité de terraformation).
nullius-terraforming-remote-red=Désigne à distance un emplacement sur la carte pour lancer un drone de terraformation (rouge) pour remplacer le sol.
nullius-terraforming-drone-beige=Remplace le paysage par un sol beige dans une zone d'environ 4x4 secteurs. Élimine les rochers, les falaises, l'eau et les débris. Augmente l'indice de terraformation de la planète quand on remplace un terrain exotique comme le violet, le volcanique ou le noir.
nullius-terraforming-remote-beige=Désigne à distance un emplacement sur la carte pour lancer un drone de terraformation (beige) pour remplacer le sol.
nullius-paving-drone-grey=Pave le paysage avec du béton armé. Élimine les rochers, les falaises, l'eau et les débris.
nullius-paving-remote-grey=Désigne à distance un emplacement sur la carte pour lancer un drone de pavage (gris).
nullius-paving-drone-white=Pave le paysage avec du béton armé blanc. Élimine les rochers, les falaises, l'eau et les débris.
nullius-paving-remote-white=Désigne à distance un emplacement sur la carte pour lancer un drone de pavage (blanc).
nullius-paving-drone-red=Pave le paysage avec du béton armé rouge. Élimine les rochers, les falaises, l'eau et les débris.
nullius-paving-remote-red=Désigne à distance un emplacement sur la carte pour lancer un drone de pavage (rouge).
nullius-paving-drone-blue=Pave le paysage avec du béton armé bleu. Élimine les rochers, les falaises, l'eau et les débris.
nullius-paving-remote-blue=Désigne à distance un emplacement sur la carte pour lancer un drone de pavage (bleu).
nullius-paving-drone-yellow=Pave le paysage avec du béton armé jaune. Élimine les rochers, les falaises, l'eau et les débris.
nullius-paving-remote-yellow=Désigne à distance un emplacement sur la carte pour lancer un drone de pavage (jaune).
nullius-paving-drone-green=Pave le paysage avec du béton armé vert. Élimine les rochers, les falaises, l'eau et les débris.
nullius-paving-remote-green=Désigne à distance un emplacement sur la carte pour lancer un drone de pavage (vert).
nullius-paving-drone-purple=Pave le paysage avec du béton armé violet. Élimine les rochers, les falaises, l'eau et les débris.
nullius-paving-remote-purple=Désigne à distance un emplacement sur la carte pour lancer un drone de pavage (violet).
nullius-paving-drone-brown=Pave le paysage avec du béton armé brun. Élimine les rochers, les falaises, l'eau et les débris.
nullius-paving-remote-brown=Désigne à distance un emplacement sur la carte pour lancer un drone de pavage (brun).
nullius-paving-drone-black=Pave le paysage avec du béton armé noir. Élimine les rochers, les falaises, l'eau et les débris.
nullius-paving-remote-black=Désigne à distance un emplacement sur la carte pour lancer un drone de pavage (noir).
nullius-paving-drone-hazard=Pave le paysage avec du béton armé de danger. Élimine les rochers, les falaises, l'eau et les débris.
nullius-paving-remote-hazard=Désigne à distance un emplacement sur la carte pour lancer un drone de pavage (de danger).
nullius-rocket=Met en orbite des satellites ou d'autres matériels.
nullius-satellite=Enregistre des données astronomiques depuis l'orbite.
nullius-asteroid-miner-1=Lancé dans l'espace pour trouver de nouvelles ressources.\nPeut revenir avec un ou plusieurs drones guides de minéraux.
nullius-asteroid-miner-2=Lancé dans l'espace pour trouver de nouvelles ressources.\nRevient généralement avec plusieurs drones guides de minéraux.
nullius-guide-drone-iron-1=Guide la météorite depuis son orbite pour créer un petit gisement de fer.
nullius-guide-drone-iron-2=Guide la pluie de météorites depuis l'orbite pour créer un grand gisement de fer.
nullius-guide-remote-iron=Désigne l'emplacement pour les drones guides de fer.
nullius-guide-drone-sandstone-1=Guide la météorite depuis son orbite pour créer un petit gisement de grès.
nullius-guide-drone-sandstone-2=Guide la pluie de météorites depuis l'orbite pour créer un grand gisement de grès.
nullius-guide-remote-sandstone=Désigne l'emplacement pour les drones guides de grès.
nullius-guide-drone-bauxite-1=Guide la météorite depuis son orbite pour créer un petit gisement de bauxite.
nullius-guide-drone-bauxite-2=Guide la pluie de météorites depuis l'orbite pour créer un grand gisement de bauxite.
nullius-guide-remote-bauxite=Désigne l'emplacement pour les drones guides de bauxite.
nullius-guide-drone-limestone-1=Guide la météorite depuis son orbite pour créer un petit gisement de calcite.
nullius-guide-drone-limestone-2=Guide la pluie de météorites depuis l'orbite pour créer un grand gisement de calcite.
nullius-guide-remote-limestone=Désigne l'emplacement pour les drones guides de calcite.
nullius-guide-drone-copper-1=Guide la météorite depuis son orbite pour créer un petit gisement de cuivre.
nullius-guide-drone-copper-2=Guide la pluie de météorites depuis l'orbite pour créer un grand gisement de cuivre.
nullius-guide-remote-copper=Désigne l'emplacement pour les drones guides de cuivre.
nullius-guide-drone-uranium-1=Guide la météorite depuis son orbite pour créer un petit gisement d'uranium.
nullius-guide-drone-uranium-2=Guide la pluie de météorites depuis l'orbite pour créer un grand gisement d'uranium.
nullius-guide-remote-uranium=Désigne l'emplacement pour les drones guides d'uranium.
nullius-sequestration-coal-drone=Création d'un gisement de charbon, emprisonnant le surplus de carbone extrait de l'atmosphère.
nullius-sequestration-coal-remote=Désigne l'emplacement pour les drones de séquestration de charbon.
nullius-sequestration-petroleum-drone=Il crée un gisement de pétrole, emprisonnant le carbone et l'hydrogène excédentaires pour en dégager l'oxygène.
nullius-sequestration-petroleum-remote=Désigne l'emplacement pour les drones de séquestration de pétrole brut.
nullius-algaculture-drone=Ensemence l'eau avec des algues. Pour de meilleurs résultats, choisissez des eaux côtières moins profondes et éloignez-vous des autres algues.
nullius-algaculture-remote=Désigne à distance un emplacement où les drones aquaculteurs ensemenceront l'eau avec des algues. Pour de meilleurs résultats, choisissez des eaux côtières moins profondes et éloignez-vous des autres algues.
nullius-horticulture-drone=Plante de l'herbe. L'herbe se développe dans des zones proches de l'eau ou avec des précipitations abondantes, avec des températures modérées et un terrain plat.
nullius-horticulture-remote=Désigne à distance un emplacement pour que les drones horticoles y plantent de l'herbe. L'herbe se développe dans des zones proches de l'eau ou avec des précipitations abondantes, avec des températures modérées et un terrain plat.
nullius-arboriculture-drone=Plante des arbres. Pour de meilleurs résultats, choisissez des terrains situés à une distance modérée des vers et éloignez-vous des fumerolles. Les arbres se développent bien dans les zones où le sol est riche, où les précipitations sont suffisantes et les températures modérées.
nullius-arboriculture-remote=Désigne à distance un emplacement pour les drones arboriculteurs y plantent des arbres. Pour de meilleurs résultats, choisissez des terrains situés à une distance modérée des vers et éloignez-vous des fumerolles. Les arbres se développent bien dans les zones où le sol est riche, où les précipitations sont suffisantes et les températures modérées.
nullius-entomology-drone=Fait éclore des vers. Pour de meilleurs résultats, choisissez des terrains près des herbes ou des arbres, et éloignez-vous des autres vers. Préfère un niveau d'oxygène de plus de 30%.
nullius-entomology-remote=Désigne à distance un emplacement où les drones entomologistes feront éclore des vers. Pour de meilleurs résultats, choisissez des terrains près des herbes ou des arbres, et éloignez-vous des autres vers. Préfère un niveau d'oxygène de plus de 30%.
nullius-aquaculture-drone=Fait éclore des poissons. Pour de meilleurs résultats, choisissez une eau proche d'algues et éloignée des autres poissons. Préfère un niveau d'oxygène de plus de 60%.
nullius-aquaculture-remote=Désigne à distance un emplacement où les drones de pisciculture feront éclore des poissons. Pour de meilleurs résultats, choisissez une eau proche d'algues et éloignée des autres poissons. Préfère un niveau d'oxygène de plus de 60%.
nullius-husbandry-drone=Élève un nid d'arthropodes et fait évoluer le patrimoine génétique des arthropodes. Pour de meilleurs résultats, choisissez un terrain à distance modérée des arbres et des poissons, loin des autres nids ou des fumerolles. Préfère un niveau d'oxygène de plus de 80%.
nullius-husbandry-remote=Désigne à distance un emplacement où les drones d'élevage vont élever un nid d'arthropodes. Pour de meilleurs résultats, choisissez un terrain à distance modérée des arbres et des poissons, loin des autres nids ou des fumerolles. Préfère un niveau d'oxygène de plus de 80%.
nullius-sugar=Blocs de construction biologiques de base utilisés pour fournir de l'énergie et renforcer les structures.\n[font=default-semibold][color=1,0.9,0.75]Formule :[/color][/font] C[font=default-tiny-bold]6[/font]H[font=default-tiny-bold]12[/font]O[font=default-tiny-bold]6[/font] [font=default-semibold][color=1,0.9,0.75]État :[/color][/font] solide (s'évacue par 1)
nullius-cellulose=Une fibre glucidique essentielle à la structure des plantes.\n[font=default-semibold][color=1,0.9,0.75]État :[/color][/font] Solide (s'évacue par 2)
nullius-bacteria-genome=Profil génétique d'une souche bactérienne téléchargé à partir d'une transmission par vos créateurs et modifié pour correspondre aux conditions locales.
nullius-algae=Un organisme simple, photosynthétique et vivant dans l'eau salée.
nullius-algae-genome=Profil génétique d'une souche d'algues téléchargé à partir d'une transmission par vos créateurs et modifié pour correspondre aux conditions locales.
nullius-algae-progenitor=Spores d'algue artificiels fabriqués pour produire une progéniture naturelle diversifiée génétiquement.
nullius-algae-spore=Nécessaire à la croissance des algues.
nullius-fertilizer=Éléments nutritifs du sol pour la croissance des plantes, riches en azote fixe.
nullius-grass=Une petite plante terrestre polyvalente.
nullius-grass-genome=Profil génétique d'une variété d'herbes téléchargé à partir d'une transmission par vos créateurs et modifié pour correspondre aux conditions locales.
nullius-grass-progenitor=Semences pour gazon artificielles fabriquées pour produire une progéniture naturelle diversifiée génétiquement.
nullius-grass-seed=Nécessaire pour faire pousser l'herbe.
nullius-tree=Une grande plante terrestre composée principalement de bois.
nullius-tree-genome=Profil génétique d'une variété d'arbres téléchargé à partir d'une transmission par vos créateurs et modifié pour correspondre aux conditions locales.
nullius-tree-progenitor=Semences d'arbres artificielles fabriquées pour produire une progéniture naturelle diversifiée génétiquement.
nullius-tree-seed=Nécessaire pour faire pousser les arbres.
nullius-wood=Une matière ferme et fibreuse récoltée à partir d'arbres.\n[font=default-semibold][color=1,0.9,0.75]État :[/color][/font] Solide (s'évacue par 2)
nullius-worm=Petit animal souterrain qui favorise la décomposition et enrichit le sol.
nullius-worm-genome=Profil génétique d'une souche de ver téléchargé à partir d'une transmission par vos créateurs et modifié pour correspondre aux conditions locales.
nullius-worm-progenitor=Œuf de ver artificiel fabriqué pour produire une progéniture naturelle diversifiée génétiquement.
nullius-worm-egg=Nécessaire pour faire grandir des vers.
nullius-fish=Animal aquatique, riche en huile.
nullius-fish-genome=Profil génétique d'une population de poissons téléchargé à partir d'une transmission par vos créateurs et modifié pour correspondre aux conditions locales.
nullius-fish-progenitor=Œuf de poisson artificiel fabriqué pour produire une progéniture naturelle diversifiée génétiquement.
nullius-fish-egg=Nécessaire pour élever des poissons.
nullius-arthropod=Un omnivore terrestre à carapace dure.
nullius-arthropod-genome=Profil génétique d'une population d'arthropodes téléchargé à partir d'une transmission par vos créateurs et modifié pour correspondre aux conditions locales.
nullius-arthropod-progenitor=Œuf artificiel d'arthropode fabriqué pour produire une progéniture naturelle diversifiée génétiquement.
nullius-arthropod-egg=Nécessaire à la croissance des arthropodes.
nullius-antimatter=Un carburant pour véhicule extrêmement dense et puissant, collecté par un piège à antimatière. ([item=nullius-antimatter-trap]).
nullius-antimatter-trap=Utilisé dans un réacteur pour collecter du combustible d'antimatière. ([item=nullius-antimatter]).
nullius-fusion-cell=Un combustible nucléaire de base pour alimenter les réacteurs nucléaires ([item=nullius-reactor]). Efficace, mais consomme une quantité importante de tritium, un isotope rare. ([fluid=nullius-tritium]).
nullius-aneutronic-cell=Combustible alternatif pour la fusion nucléaire. Moins énergétique que les cellules de fusion au tritium ([item=nullius-fusion-cell]), mais fabriqué avec des matériaux plus abondants.
nullius-spent-fusion-cell=Le résultat de la consommation d'une cellule de fusion ([item=nullius-fusion-cell] ou [item=nullius-aneutronic-cell]) dans un réacteur nucléaire ([item=nullius-reactor]). Contient de l'hélium fondu ([fluid=nullius-helium]).
nullius-breeder-cell=Une cellule de fusion plus avancée, moins énergique que la cellule de base ([item=nullius-fusion-cell]), mais qui convertit le surplus de deuterium ([fluid=nullius-deuterium]) en tritium, plus précieux ([fluid=nullius-tritium]).
nullius-spent-breeder-cell=Le résultat de la consommation d'une cellule de surgénérateur ([item=nullius-breeder-cell]), qui contient du tritium ([fluid=nullius-tritium]).
nullius-fission-cell=Une façon techniquement plus simple que la fusion pour exploiter le combustible nucléaire, mais qui repose sur l'uranium, un élément exotique ([item=nullius-uranium]), que l'on ne trouve pas normalement à la surface de cette planète.
nullius-spent-fission-cell=Le résultat de la consommation d'une cellule de fission ([item=nullius-fission-cell]), qui peut être retraité pour en extraire de l'uranium non réagi ([item=nullius-yellowcake]).
nullius-android=Un successeur modelé d'après votre forme originale. Vous pouvez le placer et y transférer votre conscience pour vous permettre de passer rapidement d'un corps à l'autre dans différentes parties de votre usine.
nullius-probe=Vaisseau spatial interstellaire pour envoyer une descendance afin de faire avancer votre mission de diffusion de la vie dans la galaxie.
nullius-surface-two-way-junction=Raccorde une canalisation de surface à une canalisation souterraine dans n'importe quelle direction.
nullius-surface-three-way-junction=Raccorde une canalisation de surface à des canalisations souterraines dans deux directions quelconques.
nullius-surface-four-way-junction=Raccorde une canalisation de surface à des canalisations souterraines dans trois directions quelconques.
nullius-surface-five-way-junction=Raccorde une canalisation de surface à des canalisations souterraines dans toutes les directions.
nullius-underground-straight-junction=Prolonge une canalisation souterraine
nullius-underground-elbow-junction=Raccorde deux tuyaux souterrains perpendiculaires
nullius-underground-three-way-junction=Raccorde trois conduites souterraines
nullius-underground-four-way-junction=Raccorde quatre conduites souterraines
nullius-underground-ctrl-r=\nAppuyez sur Ctrl+R pour faire pivoter les tuyaux souterrains.
nullius-underground-pump=Pompe directement entre les tuyaux souterrains.
nullius-adjustable-top-up-valve=Permet l'écoulement vers une destination dont le volume est inférieur à un seuil configurable.\nAppuyez sur +/- pour régler le seuil par paliers de 10%.
nullius-adjustable-relief-valve=Permet l'écoulement à partir d'une source dont le volume est supérieur à un seuil configurable.\nAppuyez sur +/- pour régler le seuil par paliers de 10%.
nullius-companion-fuel=Capsule de carburant pour robot compagnon.
nullius-land-fill-gravel=Peut être placé sur l'eau pour créer un terrain sur lequel vous pouvez construire. Résultat : un mélange gris de terre et de sable, avec un rivage en terre.
nullius-land-fill-sand=Peut être placé sur l'eau pour créer un terrain sur lequel vous pouvez construire. Résultat : un terrain entièrement constitué de sable roux.
nullius-land-fill-bauxite=Peut être placé sur l'eau pour créer un terrain sur lequel vous pouvez construire. Résultat : un terrain entièrement en terre brune.
nullius-land-fill-iron=Peut être placé sur l'eau pour créer un terrain sur lequel vous pouvez construire. Résultat : un terrain principalement en terre rougeâtre, avec un rivage de sable.
nullius-land-fill-limestone=Peut être placé sur l'eau pour créer un terrain sur lequel vous pouvez construire. Résultat : un terrain de terre beige, avec un rivage de sable.
nullius-rock-picker=Tenez cet outil en main et appuyez sur __CONTROL__select-for-blueprint__ pour sélectionner une zone à débarrasser des petits rochers, débris, objets perdus et petites imperfections du paysage. Les gros rochers seront planifiés en vue d'une élimination par les robots, tout comme les falaises si les recherches sur les explosifs ont été recherchées. Appuyez sur __CONTROL__select-for-cancel-deconstruct__ pour exclure les objets, les gros rochers et les falaises.
nullius-wood-chip=Petits fragments de bois. [font=default-semibold][color=1,0.9,0.75]État :[/color][/font] Solide (s'évacue par 2)
nullius-align-identification-card=Activez-la sur un membre d'une autre faction pour accepter son invitation à la rejoindre. Le fait de la porter empêchera le recrutement forcé. Les cartes ne sont efficaces que si elles sont développées indépendamment par votre faction actuelle.\nSi vous rejoignez une autre faction et qu'il ne reste plus aucun joueur dans votre faction actuelle, celle-ci sera complètement absorbée par la nouvelle. Tous les bâtiments appartiendront à la nouvelle faction combinée, toutes les technologies qui progresseront seront fusionnées, et toute recherche redondante sera remboursée pour accélérer les recherches futures.
nullius-align-invitation-card=Activez-la sur un membre d'une autre faction pour l'inviter à rejoindre votre faction. Les cartes ne sont efficaces que si elles sont développées indépendamment par votre faction actuelle.
nullius-align-transponder=Activez-le pour révéler votre position actuelle à toutes les factions disposant d'un nœud de détection actif.
nullius-align-conscription-charge=Munitions pour rayon de recrutement ou pour tourelle.
nullius-align-conscription-ray=Arme à énergie portative qui ralliera un androïde non identifié à votre faction. Elle inflige des dégâts électriques mineurs. Si aucun androïde d'une faction n'est actif pour défendre son usine, vous pouvez utiliser cette arme pour réquisitionner ses bâtiments. Si vous vous emparez de tous leurs laboratoires, toute la faction sera convertie.
nullius-align-concordance-satellite=La première faction à le mettre en orbite dominera toutes les autres factions, remportant définitivement la course pour les faire adhérer aux objectifs de votre mission.

