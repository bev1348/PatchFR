nullius-intro=Vous êtes un androïde de von Neumann. Après des centaines d'années de voyage relativiste, votre sonde est arrivée sur sa planète cible, et vous avez été activé avec un petit stock d'équipements essentiels. Cette planète sans vie est relativement pauvre en éléments lourds et ne possède pas d'atmosphère respirable. Malgré ces déficiences mineures, elle est classée comme un superbe candidat à la terraformation. Votre mission consiste à développer la capacité industrielle nécessaire pour terraformer cette planète, y implanter la vie, et construire une vague de successeurs pour continuer vers de nouvelles planètes.

nullius-mission=Vous avez achevé la première phase de votre mission en établissant un avant-poste industriel important et avancé sur cette planète isolée et stérile. La phase suivante consiste à tirer parti de cette capacité pour terraformer la planète. Vous avez accès à un panneau de suivi de la progression de chaque objectif restant, ainsi qu'à un nouveau bouton pour gérer ce panneau. Votre mission sera considérée comme un succès quand toutes les tâches auront été accomplies.\n\nVous devez ensemencer 3 espèces végétales et 3 espèces animales. Les génomes peuvent être téléchargés une fois que vous aurez établi un contact satellite avec le réseau interstellaire. Libérez-les dans la nature à l'aide de drones, qui vous indiqueront l'environnement optimal pour chaque espèce. Les animaux ont besoin d'oxygène atmosphérique.\n\nL'augmentation du niveau global d'oxygène est un autre objectif. Les plantes introduites dans la nature augmenteront progressivement le niveau d'oxygène au fil du temps. L'oxygène (ou l'oxygène comprimé) que vous évacuez contribuera également à l'atmosphère. L'hydrogène ou d'autres gaz réducteurs que vous rejetterez annuleront une partie de la teneur en oxygène. Vous devez également réduire le dioxyde de carbone atmosphérique en le séquestrant sous forme de charbon et de pétrole.\n\nCette planète manque d'éléments lourds, ce à quoi vous devrez remédier en exploitant des astéroïdes. Deux objectifs consistent à créer de nouveaux gisements de minéraux rares. Vous devez également remodeler ce paysage extraterrestre à l'aide de drones de terraformation pour remplacer ce terrain exotique par un sol mieux adapté à une nouvelle vie.\n\nEnfin, vous devrez propager cette vague de terraformation à travers la galaxie en créant des doubles de vous-même et en les lançant dans des vaisseaux vers d'autres planètes potentiellement propices à la terraformation.

[mod-name]
nullius=Nullius

[mod-description]
nullius=Dans ce préquel de Factorio, vous êtes un androïde qui terraforme des planètes et les ensemence de vie. Remplace toutes les recettes et technologies. L'absence de vie signifie l'absence de charbon, de pétrole, de bois, de biters ou d'oxygène libre, ce qui nécessite des sources d'énergie renouvelables variées. Pour la commodité, vous vous concentrerez sur les éléments abondants provenant de l'air, de la mer ou de minéraux courants tels que le minerai de fer, la bauxite, le grès et la calcite. Une technologie avancée vous permettra d'extraire des éléments plus rares à partir d'astéroïdes. Visitez le portail des mods pour une description plus complète et une liste des mods compatibles.

