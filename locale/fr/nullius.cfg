align-transponder-other=__1__ a diffusé leur position actuelle à (__2__, __3__).
align-no-identification=Vous ne pouvez pas utiliser une carte d'alignement qui n'a pas été développée indépendamment par votre faction actuelle.
align-protected-transmitter=Faction cible protégée par un transmetteur de concordance.
align-protected-identity=Joueur cible protégé par sa carte d'identification.
align-guarded-identity=Bâtiment cible gardé par un membre de la faction avec identification.

