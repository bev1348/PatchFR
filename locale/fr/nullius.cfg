[nullius]
menu_nullius=Nullius
title_nullius=Nullius : Un préquel de Factorio

page_nullius_text_1=Dans ce préquel de Factorio, vous incarnez un androïde envoyé pour terraformer des planètes stériles et y introduire la vie. Des éons plus tard, vos efforts aboutiront à une galaxie pleine de planètes sur lesquelles les ingénieurs pourront s'écraser. Ce mod est une refonte complète qui remplace toutes les recettes et technologies. L'absence de vie signifie l'absence de charbon, de pétrole, de bois, de biters ou d'oxygène libre dans l'atmosphère. De plus, comme de nombreuses planètes sont pauvres en éléments lourds rares comme le cuivre ou l'uranium, votre technologie se concentrera sur les éléments les plus abondants et les plus légers.

page_nullius_text_2=Les ressources naturelles fondamentales sont le minerai de fer, le grès, la bauxite, la calcite, l'air, l'eau de mer et le gaz volcanique. Les ressources avancées comme le cuivre et l'uranium seront disponibles plus tard grâce à la technologie d'extraction des astéroïdes. La bauxite est un minerai d'aluminium, un conducteur électrique et un matériau structurel utile. La calcite est une source de calcium, utile dans le ciment, le verre et la métallurgie, et est également une source de soufre à l'état de traces. Le grès fournit du silicium, essentiel pour l'électronique et le verre, ainsi que des traces de minerai de titane. L'air est principalement constitué d'azote et de dioxyde de carbone (une matière première essentielle pour les produits de la chimie organique comme le plastique), mais il contient des traces d'autres gaz importants, notamment des gaz nobles comme l'argon et l'hélium. L'eau de mer est une source d'hydrogène, d'oxygène, de chlore, de sodium et de quantités infimes de deutérium, de tritium, de lithium et d'autres minéraux. Le gaz volcanique est une source de soufre, de monoxyde de carbone et de traces de bore.

page_nullius_text_3=Une fois que vous aurez établi une base industrielle suffisamment importante pour lancer des fusées, vos objectifs finaux seront de semer la vie sur cette planète et de créer des copies de vous-même pour répéter ce processus sur d'autres planètes à travers la galaxie. Vous devrez augmenter le niveau d'oxygène de l'atmosphère et implanter un écosystème génétiquement diversifié composé de multiples espèces végétales et animales ayant chacune leurs propres critères de survie. Vous devez rétablir les communications avec vos pères pour télécharger les génomes de ces espèces, et assembler des matériaux biologiques à partir de zéro jusqu'à ce que vous disposiez d'un stock suffisant pour assurer leur reproduction naturelle. Beaucoup de ces espèces produisent des matériaux utiles à un prix plus bas que celui auquel vous les fabriquez. Vous souhaiterez peut-être intégrer certains de ces organismes dans les chaînes de production de vos usines.

menu_mods=Mods
title_mods=Mods
page_mods_text_1=Ce mod utilise des ressources, des technologies et des recettes différentes, il n'interagit donc pas bien avec les autres mods qui ont leurs propres technologies et recettes, à moins qu'ils n'aient été spécifiquement adaptés pour fonctionner avec Nullius. Les mods de qualité de vie ne disposant pas de leurs propres technologies et recettes devraient fonctionner normalement. Certaines caractéristiques de jeu communes aux mods sont déjà intégrées à Nullius sous une forme ou une autre, notamment les remblais, l'empilement d'objets et les minerais infinis. Un certain nombre de mods avec technologies ont déjà été adaptés pour fonctionner avec Nullius. D'autres devraient être ajoutés. Cette compatibilité peut être ajoutée soit par Nullius, soit via l'autre mod. 
page_mods_text_2=Les mods connus pour être déjà compatibles sont les suivants : Miniloader, Transport Drones, Jetpack, Factorissimo2, LTN - Logistic Train Network, LTN Combinator Modernized, Bob's Adjustable Inserters, Safe Waterfill, Teleporters, Advanced Fluid Handling, Warehousing, Robot Replacer, AAI Signal Transmission, Train Supply Manager (TSM), Induction Charging, Stack Combinator, Text Plates, Resource Spawner Overhaul (RSO), et I,Robot.

menu_research=Recherches
title_research=Recherches
page_research_text_1=Nullius a 7 packs de science. Les 2 premiers sont débloqués très tôt, et les 5 suivants sont progressivement de plus en plus avancés et exponentiellement plus chers. Ainsi, l'arbre des technologies peut être divisé en 6 niveaux distincts.
page_research_text_2=Nullius remplace toutes les technologies traditionnelles, donc les noms et la progression sont très différents de ceux auxquels vous êtes habitués. Presque tout ce que vous pouvez faire dans le jeu de base, vous pouvez le faire dans Nullius, à l'exception de quelques technologies militaires ou énergétiques, mais elles peuvent se présenter sous une autre forme. Nullius tente de rationaliser certains intermédiaires inutiles et utilise plutôt des produits finis comme intermédiaires ou utilise plus les objets à usages multiples.
page_research_text_3=Quelques exemples : les explosifs de falaise et les explosifs ne sont pas des objets distincts ; les explosifs de Nullius sont un produit intermédiaire qui permet également de faire exploser des falaises. La batterie personnelle n'est pas un objet à part ; la batterie ordinaire est à la fois un équipement, un produit intermédiaire et du carburant pour véhicules rechargeables. Les radars sont appelés Nœuds de détection, et la principale différence est qu'ils ont un rayon beaucoup plus petit lorsqu'il s'agit de balayer des secteurs éloignés (un aspect qui est plus utile en présence de biters), mais un rayon plus grand lorsqu'il s'agit de visualiser votre usine à distance depuis la vue cartographique. Au lieu de cela, Nullius fournit une méthode différente pour scanner les secteurs très éloignés grâce à la technologie d'exploration.

menu_early=Début de partie
title_early=Début de partie
page_early_header_1=Niveau 1 : recherches en géologie et climatologie
page_early_text_1=Vous commencez sans aucune recette, mais la première technologie débloque les échantillons géologiques et ne nécessite pas de packs de science, seulement du temps dans le laboratoire. Celui-ci est disponible quelque part dans l'épave de votre vaisseau. Vous commencerez en ayant accès uniquement à suffisamment de bâtiments pour pouvoir progresser et commencer à fabriquer vous-même tous ces bâtiments.
page_early_text_2=Les technologies de géologie et de climatologie sont simples et peu coûteuses à produire. Ces technologies ont un coût très faible et sont destinées à être recherchées rapidement. Elles servent d'introduction aux processus de fabrication de matériaux essentiels pour le niveau de recherches suivant.
page_early_header_2=Niveau 2 : recherche en ingénierie mécanique
page_early_text_3=L'ingénierie mécanique n'est pas aussi simple à produire, mais les technologies de ce niveau ne consomment encore que peu de packs de science. Ces technologies vous permettent de construire vos propres copies de la plupart des structures avec lesquelles vous commencez le jeu, ce qui vous permetra d'étendre votre base de manière illimitée. À la fin de ce niveau, vous serez en mesure d'éliminer tous vos sous-produits résiduels, permettant ainsi une automatisation plus durable.
page_early_text_4=Étant donné qu'il n'est pas possible de faire évoluer vos fabrications sans ces technologies mécaniques essentielles, la plupart des technologies de ce niveau et des niveaux antérieurs ne sont pas concernées par le paramètre du multiplicateur de coût technologique.

menu_mid=Milieu de partie
title_mid=Milieu de partie
page_mid_header_1=Niveau 3 : recherche en ingénierie électrique
page_mid_text_1=Maintenant que vous pouvez construire vos propres laboratoires et une plus grande usine, les recherches commencent à devenir plus coûteuses. L'électronique permet des fonctionnalités de contrôle, d'automatisation et de personnalisation plus sophistiquées, notamment la première apparition des robots, des modules, des signaux ferroviaires, des bras longs et des circuits logiques. Elle débloque les versions de niveau 2 de la plupart des structures de production de base, ainsi que certains nouveaux types de structures.
page_mid_header_2=Niveau 4 : recherche en chimie
page_mid_text_2=La chimie ouvre la voie à de nouvelles utilisations des ressources existantes et à de nombreux nouveaux matériaux, permettant la création d'outils utiles tels que les piles et les explosifs. Elle propose également les outils nécessaires à une véritable production de masse. Les produits intermédiaires peuvent être emballés pour un meilleur débit de transport, et de nouvelles recettes permettent de produire directement des matériaux emballés à partir d'autres matériaux emballés. De même, les gaz peuvent être comprimés pour un débit plus important et une chimie plus efficace.

menu_late=Fin de partie
title_late=Fin de partie
page_late_header_1=Niveau 5 : Recherche en physique
page_late_text_1=Les recherches sont beaucoup plus complexes à produire, nécessitant presque l'utilisation de robots pour les automatiser, mais comme vous en produisez beaucoup à la fois, le coût des ressources est comparable à celui des niveaux précédents. Ce niveau vous permet de construire le troisième et dernier niveau des structures les plus basiques. Elle apporte de nouvelles fonctionnalités, telles que la terraformation à grande échelle de votre environnement à l'aide de drones et de fusées, nécessaires pour passer à la fin du jeu dans le niveau suivant.
page_late_header_2=Niveau 6 : Recherche en astronomie
page_late_text_2=C'est la fin du jeu. Au début de ce niveau, après avoir lancé votre première fusée, vous disposerez d'un panneau de mission avec un suivi de vos objectifs. Ces tâches disparaîtront au fur et à mesure qu'elles atteindront une progression de 100%, et vous gagnerez la partie lorsqu'elles seront toutes terminées. Outre la recherche, vous pouvez utiliser vos fusées pour l'extraction d'astéroïdes, ce qui vous permettra d'établir des avant-postes miniers stationnaires avec des minéraux renouvelables. La plupart des technologies de ce niveau sont infinies, mais leurs coûts exponentiels finiront par être hors de portée. Ces technologies infinies constituent une bonne motivation pour poursuivre vos fabrications à l'échelle de la mégabase, même après avoir atteint vos objectifs de base en matière de terraformation.

menu_fluids=Fluides
title_fluids=Fluides
page_fluids_text_1=La chimie et la manipulation des fluides sont des éléments essentiels du système de fabrication de Nullius, il est donc important de comprendre comment gérer les fluides. Il y a certaines zones où Nullius est différent de la manipulation classique des fluides, ce dont il faut être conscient.

page_fluids_header_1=Pression (mécanique obsolète)
page_fluids_text_2=Nullius proposait un concept de niveau de "pression" pour les tuyaux et les réservoirs. Cette fonctionnalité a été supprimée du moteur du jeu dans la version 2.0. Avec le nouveau système de fluides simplifié, l'amélioration du niveau des tuyaux augmente désormais la longueur maximale des canalisations. De plus, les pompes consomment beaucoup plus d'électricité qu'auparavant. Il est donc recommandé d'améliorer vos tuyaux. Notez que la longueur maximale des canalisations pour les réservoirs est toujours légèrement inférieure au niveau correspondant des tuyaux. Cette mesure vise à encourager l'utilisation de pompes pour remplir et vider les réservoirs.

page_fluids_header_2=Sous-produits résiduels
page_fluids_text_5=De nombreux processus chimiques de Nullius génèrent 2 produits ou plus. Chaque fois que c'est le cas, il est probable que cela crée un sous-produit indésirable, car il est peu probable que vous utilisiez tous les produits dans le même rapport qu'ils sont produits. L'élimination des fluides résiduels indésirables est essentielle pour une automatisation durable.
page_fluids_text_6=Passez la souris sur l'icône du fluide pour lire l'info-bulle. Les fluides peuvent être des gaz ou des liquides. La plupart des gaz peuvent être évacués par une cheminée et la plupart des liquides peuvent être rejetés par un déversoir. Cependant, certains sont signalés comme non jetables et ne peuvent tout simplement pas être évacués. Tous les sous-produits peuvent être détruits d'une manière ou d'une autre, mais il faut parfois passer par d'autres étapes. L'acide chlorhydrique, par exemple, doit d'abord être neutralisé par une solution caustique. Le benzène doit être brûlé en gaz qui eux peuvent être rejetés. Certains solides, tels que l'hydroxyde de sodium ou le gravier, peuvent être transformés en fluide en vue de leur élimination. La plupart des technologies clés d'élimination des déchets sont disponibles à la fin des technologies d'ingénierie mécanique. Au début du jeu, avant ce stade, vous devrez peut-être construire des coffres ou vider manuellement des réservoirs.
page_fluids_text_7=Les vannes sont essentielles pour gérer ces réseaux complexes de produits et de sous-produits. Avec la version 2.0 de Nullius, les vannes ont été en grande partie supprimées en tant qu'éléments distincts. Les pompes peuvent désormais passer d'un mode à l'autre. Les vannes de décharge sont utilisées pour évacuer les déchets si un réservoir se remplit et risque de faire déborder la production, sans pour autant les gaspiller si le réservoir n'est pas plein. Les vannes auxiliaires vous permettent d'envoyer du fluide vers une sortie secondaire uniquement s'il y en a assez pour satisfaire d'abord un consommateur plus important. Les vannes de remplissage vous permettent de remplir un réservoir uniquement s'il est presque vide, tout en laissant de la place pour que le fluide soit également obtenu comme sous-produit sans être gaspillé.
page_fluids_text_8=Il faut garder à l'esprit que la Cheminée 1 et le Déversoir 1 sont inefficaces et ne videront pas complètement le tuyau. La source doit se remplir un peu pour vaincre leur résistance avant qu'ils ne commencent à évacuer. Des pompes peuvent être utiles pour maintenir les fluides en mouvement.

menu_energy=Énergie
title_energy=Énergie
page_energy_text_1=Comme il n'y a pas de vie dans Nullius, il n'y a pas de charbon, de bois ni de pétrole, et pas d'oxygène dans l'atmosphère pour les brûler de toute façon. Il faut donc utiliser des sources d'énergie renouvelables.
page_energy_text_2=L'énergie éolienne est l'option de technologie la plus basse disponible, c'est votre seule véritable option au début du jeu. Plus tard avec l'ingénierie mécanique, vous aurez accès à l'énergie solaire thermique, qui est plus chère, mais la chaleur peut être économisée pour être utilisée la nuit ou lorsque les vents sont faibles. Dès le stade de l'ingénierie électrique, vous disposerez d'un éventail d'options avec des forces et des faiblesses spécifiques. L'énergie éolienne nécessite beaucoup de terrain et est imprévisible. Les panneaux solaires peuvent être chers et ne produisent rien la nuit. La géothermie produit une énergie constante, mais ne peut être placée que sur des fumerolles volcaniques. Le nucléaire produit une énergie constante et peut être construit n'importe où, mais consomme certaines ressources.
page_energy_text_3=Les éoliennes doivent être espacées d'exactement 32 tuiles les unes des autres, elles occupent donc beaucoup d'espace. L'utilisation de plans alignés sur une grille ou de la vue en grille via F5 peut vous aider à planifier un espacement précis. Il sera plus facile de les placer lorsque vous aurez fait la recherche sur le pylône 1, puisque celui-ci atteint exactement les 32 tuiles dont vous avez besoin pour placer une éolienne. N'ayez pas peur de construire un grand parc éolien, car il n'y a pas de biters et vous n'avez donc pas besoin de défendre ce territoire. Les robots avec lesquels vous commencez peuvent vous aider à placer des plans.

page_energy_header_1=Stockage de l'énergie
page_energy_text_4=Comme l'énergie éolienne et l'énergie solaire produisent des quantités variables d'électricité, elles nécessitent un stockage d'énergie. Le stockage par batterie n'est pas disponible avant la technologie de l'ingénierie chimique, en raison du nombre limité d'éléments disponibles pour les fabriquer. En attendant, vous pouvez construire vos propres systèmes équivalents à des "accumulateurs" en utilisant l'électrolyse ou le gaz comprimé, à l'aide d'électrolyseurs ou de compresseurs de surtension. L'électrolyseur de surtension ne fonctionne qu'avec un surplus d'énergie, tout comme un accumulateur stocke l'énergie. Vous pouvez conserver l'hydrogène et l'oxygène qu'il produit dans des réservoirs lorsque vos éoliennes ou vos panneaux solaires produisent un surplus d'énergie, puis les brûler pour produire de l'électricité lorsqu'ils ne produisent pas assez d'énergie. La turbine ne consommera de la vapeur que si le vent et le soleil ne produisent pas assez d'énergie.
page_energy_text_5=Il est intéressant d'envisager d'utiliser ces électrolyseurs de surtension même dans votre production régulière, au lieu des électrolyseurs prioritaires plus conventionnels. Les électrolyseurs de surtension ont un débit maximal élevé, ils peuvent donc remplir les réservoirs pendant les périodes d'abondance d'énergie, et le reste de votre base peut continuer à fonctionner en utilisant les produits stockés dans les réservoirs pendant les périodes où les électrolyseurs ne fonctionnent pas. L'électrolyse est l'un de vos principaux consommateurs d'énergie. En la gardant ainsi flexible, vous pouvez réduire vos besoins énergétiques minimaux et votre besoin de stockage d'énergie. L'inconvénient, c'est que si vous êtes constamment à court d'énergie, vous ne verrez peut-être pas de symptôme évident, comme des baisses de tension, mais vous constaterez plutôt que votre niveau d'hydrogène est bas.
page_energy_text_6=La température de la vapeur dans Nullius est essentiellement cosmétique. Les réactions à haute température produisent un plus grand volume de vapeur par rapport à leur entrée, et c'est le nombre d'unités qui compte. Chaque unité de vapeur a une certaine quantité d'énergie, visible dans l'info-bulle, il est donc facile de calculer la quantité d'énergie stockée dans un réservoir. Les turbines qui consomment de la vapeur consommeront également d'autres gaz comprimés, qui ont chacun une certaine quantité d'énergie indiquée par unité. L'azote comprimé est le choix le plus courant comme moyen de stockage de l'énergie, car la séparation de l'air fournit un approvisionnement régulier en azote excédentaire comme sous-produit.

