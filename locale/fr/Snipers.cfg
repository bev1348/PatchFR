[item-description]
sniper=Un fusil de haute précision à longue portée capable d'éliminer des cibles à distance. Il se caractérise par une cadence de tir faible, mais inflige des dégâts dévastateurs.
sniper-ammo=Munitions standard pour le fusil sniper. Elles offrent une excellente précision et une grande puissance d'arrêt.
piercing-sniper-ammo=Munitions de précision avancées avec une capacité de pénétration améliorée. Capables de transpercer plusieurs cibles.
uranium-sniper-ammo=Munitions de précision à l'uranium appauvri offrant une pénétration et des dégâts supérieurs. Très efficaces contre les cibles blindées.

