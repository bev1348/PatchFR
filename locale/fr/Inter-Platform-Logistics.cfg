ipl_threshold_help=Réapprovisionnement lorsque ≤ : niveau de stock à partir duquel cette plateforme commence à demander le réapprovisionnement d'un objet. Égal à (quantité demandée - seuil). La plateforme demandera le réapprovisionnement d'un objet lorsque son stock actuel est inférieur ou égal à cette valeur.
