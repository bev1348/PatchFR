ipl_reset_pods_tooltip=AVERTISSEMENT : cette action déclenche un remplacement système et réinitialise la mémoire de l'antenne de demande. Elle effacera toutes les capsules actuellement en route vers elle. Cela peut s'avérer utile lorsqu'un bug a entraîné une défaillance du suivi et que, par conséquent, des capsules sont toujours considérées comme en mouvement alors qu'elles n'existent plus. Cette opération est irréversible.
