[tooltip]
hexcoder_radar_uplink-read_comms_mode_desc=Émettre et recevoir des signaux logiques provenant d'autres radars
hexcoder_radar_uplink-read_platforms_mode_desc=Lire les plateformes spatiales
hexcoder_radar_uplink-read_status_desc=Lire l'état de la plateforme spatiale (portée illimitée)\n[virtual-signal=signal-P] : identifiant de la plateforme\n[space-location=nauvis]=1 : planète autour de laquelle elle est en orbite (vérifiez que [space-location=nauvis]>0)\n[space-location=nauvis]=-1 [space-location=gleba]=-2 : en transit de [space-location=nauvis] vers [space-location=gleba]\nProgression du trajet spatial en % : [virtual-signal=signal-T] et en km : [virtual-signal=signal-D]\nVitesse actuelle [virtual-signal=signal-V] en km/s
hexcoder_radar_uplink-read_unful_req_desc=Lire les demandes de plateformes spatiales non satisfaites\nLimité aux plateformes en orbite \nSignal supplémentaire [virtual-signal=signal-info] pour la réception\nÉquivalent à [color=#a0a0a0]la liste des demandes "en cours"[/color] | si > 0
hexcoder_radar_uplink-read_req_desc=Lire les demandes brutes dans les sections logistiques du noyau\nCelles-ci sont automatiquement filtrées en fonction de la planète actuelle
hexcoder_radar_uplink-read_otw_desc=Lire les livraisons de fusées "en route" vers le noyau de la plateforme\nDepuis l'animation du lancement jusqu'à l'atterrissage complet de la capsule
hexcoder_radar_uplink-read_inv_desc=Lire le contenu de l'inventaire du noyau
hexcoder_radar_uplink-read_inv_slots_desc=Lire le nombre total d'emplacements disponibles dans le noyau\nAstuce [virtual-signal=signal-info] : le nombre d'emplacements utilisés peut être calculé via la logique (voir la page du mod)
hexcoder_radar_uplink-tick2_suffix=(Retard de 2 ticks dû aux circuits logiques cachés)

