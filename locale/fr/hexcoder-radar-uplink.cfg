[tooltip]
hexcoder_radar_uplink-comms_mode_desc=Émettre et recevoir des signaux logiques provenant d'autres radars
hexcoder_radar_uplink-platforms_mode_desc=Lire les plateformes spatiales
hexcoder_radar_uplink-status_desc=Lire l'état de la plateforme spatiale (portée illimitée)\n[virtual-signal=signal-P] : identifiant de la plateforme\n[space-location=nauvis]=1 : planète autour de laquelle elle est en orbite (vérifiez que [space-location=nauvis]>0)\n[space-location=nauvis]=-1 [space-location=gleba]=-2 : en transit de [space-location=nauvis] vers [space-location=gleba]\nProgression du trajet spatial en % : [virtual-signal=signal-T] et en km : [virtual-signal=signal-D]\nVitesse actuelle [virtual-signal=signal-V] en km/s
hexcoder_radar_uplink-request_unful_req_desc=Lire les demandes de plateformes spatiales non satisfaites\nLimité aux plateformes en orbite - signal supplémentaire [virtual-signal=signal-info] permettant de distinguer l'absence de signal de l'absence de demandes\nÉquivalent à [color=#a0a0a0]la liste des demandes "en cours"[/color] mais n'affichant que des résultats positifs
hexcoder_radar_uplink-request_req_desc=Demandes brutes telles que configurées dans la section logistique du noyau de la plateforme\nmais filtrées automatiquement pour la planette autour de laquelle elle est en orbite
hexcoder_radar_uplink-request_otw_desc=Item deliveries 'on the way' to the platform hub via cargo pods\nLe décompte commence dès que le silo de la fusée entame l'animation de lancement et se termine lorsque la capsule a complètement atterri
hexcoder_radar_uplink-request_inv_desc=Inventaire du noyau de la plateforme spatiale
hexcoder_radar_uplink-tick2_suffix=(Retard de 2 ticks dû aux circuits logiques cachés)

