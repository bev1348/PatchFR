[mod-setting-name]
biterproof-retroactive=Affecter les entités déjà placées
biterproof-type-filters=Filtres de types résistants aux Biters
biterproof-name-filters=Filtres de noms résistants aux Biters
biterproof-belts=Tapis résistants aux Biters
biterproof-rails=Rails résistants aux Biters
biterproof-poles=Électricité résistante aux Biters

[mod-setting-description]
biterproof-retroactive=Appliquer les paramètres aux entités déjà présentes dans le monde.\n[color=red]AVERTISSEMENT :[/color] Cette opération peut prendre quelques secondes pour les mondes très volumineux. Si vous modifiez plusieurs paramètres, il est recommandé de les appliquer, de relancer le jeu, puis de définir ce paramètre.
biterproof-type-filters=Liste de types internes d'entités à rendre résistantes aux Biters. Les entrées doivent être séparées par un caractère autre qu'un tiret ou un trait de soulignement, tel qu'un espace, une virgule ou un point-virgule.
biterproof-name-filters=Liste de noms internes d'entités à rendre résistantes aux Biters. Les entrées doivent être séparées par un caractère autre qu'un tiret ou un trait de soulignement, tel qu'un espace, une virgule ou un point-virgule.
biterproof-belts=Rend les convoyeurs, les convoyeurs souterrains et les répartiteurs invincibles
biterproof-rails=Rend les rails et les signaux invincibles. En raison du grand nombre de types de rails ajoutés avec la version 2.0, ce paramètre permet de définir tous ces types sans encombrer la liste des types.
biterproof-poles=Rend tous les poteaux électriques invincibles


