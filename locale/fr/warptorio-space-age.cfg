[tips-and-tricks-item-description]
warptorio=Warptorio (Ère spatiale).
warptorio-warp-trains=Les trains peuvent être téléportés entre la [font=default-bold]surface[/font] et le [font=default-bold]sol de l'usine[/font] à l'aide de gares spéciales.\n\nPour téléporter un train, celui-ci doit être [color=yellow]complètement à l'arrêt[/color] dans une gare nommée :\n • [color=orange]WarpGround[/color] (Si vous souhaitez vous rendre au rez-de-chaussée depuis l'usine)\n • [color=orange]WarpFactory[/color] (Si vous souhaitez vous rendre à l'usine depuis le rez-de-chaussée)\n\n[color=red][font=default-bold]Important :[/font][/color]\nLes deux gares doivent avoir la [color=red]même orientation[/color] (nord, sud, est ou ouest).\n\nSi les noms des gares correspondent mais que les orientations ne correspondent pas, le train [font=default-bold]ne se téléportera pas[/font].\nLe train [font=default-bold]ne se téléportera pas[/font] non plus s'il est en mode manuel ou s'il y a quelqu'un à l'intérieur.\n\n[color=green]Conseil :[/color] copiez ou créez un plan de la gare pour vous assurer que l'orientation correspond aux deux étages. Si vous souhaitez avoir plusieurs gares par direction cardinale, désactivez toutes les gares sauf une afin de vous assurer que le train se rendra à cette gare.
warptorio-asteroids=Une fois la technologie [technology=warp-factory-platform-2] débloquée, les téléportations spatiales ne se font plus instantanément : votre usine se déplace [font=default-bold]dans l'espace[/font], et des astéroïdes apparaissent à la place des biters pendant la transition.\n\nLa taille des astéroïdes n'est [font=default-bold]pas fixe[/font] : tous les niveaux inférieurs à votre évolution actuelle apparaissent [font=default-bold]simultanément[/font]:\n • Évolution [color=orange]> 0%[/color] -> Petits astéroïdes\n • Évolution [color=orange]> 25%[/color] -> + Astéroïdes moyens\n • Évolution [color=orange]> 61%[/color] -> + Grands astéroïdes\n • Évolution [color=orange]> 81%[/color] -> + Énormes astéroïdes\n\n[color=green]Astuce :[/color] Les astéroïdes n'apparaissent pas tant que votre évolution n'est pas supérieure à 0 %, mais préparez des collecteurs d'astéroïdes avant que cela n'arrive. L'évolution augmente rapidement avec la recherche sur les plateformes.
warptorio-planet-hopping=Le jeu enregistre les [font=default-bold]2 dernières planètes[/font] que vous avez visitées.\n\nSi l'affichage [font=default-bold]Prochaine planète[/font] de votre interface utilisateur indique un nom en [color=red]rouge[/color], cela signifie que vous êtes sur le point de vous [font=default-bold]téléporter[/font] pour revenir à la planète où vous vous trouviez il y a tout juste [font=default-bold]deux téléportations[/font].\n\n[color=red][font=default-bold]Conséquence de la téléportation :[/font][/color]\nL'[font=default-bold]indice de vague[/font] et la [font=default-bold]durée de vague[/font] ne sont [font=default-bold]pas réinitialisés[/font] lors de la téléportation. Vous reprenez les vagues exactement là où vous vous étiez arrêté sur cette planète. Les ennemis seront tout aussi puissants (voire plus) qu'au moment de votre dernier départ.\n\n[color=green]Astuce :[/color] Une destination [color=red]rouge[/color] est un avertissement. Si vos défenses ne sont pas prêtes pour un combat plus difficile, utilisez le temps restant pour les renforcer avant la téléportation.
warptorio-evolution-scaling=L'évolution des ennemis dans Warptorio n'est [font=default-bold]pas basée sur le temps ou la pollution[/font]. Elle est proportionnelle à vos progrès dans les recherches clés sur les plateformes.\n\nChaque recherche importante débloquée augmente l'évolution des ennemis d'une valeur fixe :\n • [technology=warp-ground-platform-4] -> [color=orange]10%[/color]\n • [technology=warp-factory-platform-3] -> [color=orange]15%[/color]\n • [technology=warp-ground-platform-5] -> [color=orange]20%[/color]\n • [technology=warp-factory-platform-4] -> [color=orange]30%[/color]\n • [technology=warp-ground-platform-6] -> [color=orange]40%[/color]\n • [technology=warp-factory-platform-5] -> [color=orange]50%[/color]\n • [technology=warp-ground-platform-7] -> [color=orange]60%[/color]\n • [technology=warp-factory-platform-6] -> [color=orange]70%[/color]\n • [technology=warp-ground-platform-8] -> [color=orange]80%[/color]\n • [technology=warp-factory-platform-7] -> [color=orange]90%[/color]\n • [technology=warp-end-prepare] -> [color=red]100%[/color]\n\n[color=green]Astuce :[/color] si vous souhaitez retarder l'apparition d'ennemis de niveau supérieur, reportez ces recherches jusqu'à ce que votre base soit prête.

