[item-description]
molybdenum-airpump=Machine spécialisée qui permet d'isoler des molécules dans l'atmosphère locale.
molybdenum-miner=Creuse des gisements ou des bassins pour y extraire des matériaux.
molybdenum-seiver=Trie et organise les matières premières en fonction de leur taille, de leur poids et de leur composition. Nécessite des fluides pour fonctionner efficacement.
molybdenum-heater=Dégage une grande quantité de chaleur dans l'atmosphère locale. Peut brûler des amas de débris de Carna ou des Blocs de plasma concentré pour produire de la chaleur.
algite-assembler=Machine de fabrication automatisée spécialisée dans les produits de Carna.
algite-knowledge-chamber=Fabrique ou transforme des objets ou des produits complexes à partir de matières premières.
feron-airpump=Machine spécialisée avancée qui isole les molécules présentes dans l'atmosphère locale.
feron-assembler=Machine avancée automatisée pour fabriquer des objets spécialisés dans les produits de Carna.
feron-biochamber=Version améliorée de la chambre biologique qui utilise de l'eau enrichie comme source d'énergie à la place des nutriments bruts.
carnan-spire=Cette structure gigantesque émet le Signal de Carna, une pulsation énergétique à l'échelle planétaire qui alimente sans fil toutes les machines de Carna à la surface de la planète. Son fonctionnement continu nécessite une énergie colossale.
carna-cache-equipment=Augmente l'inventaire.
carna-craft-equipment=Augmente la vitesse de fabrication manuelle de 150 %.
carna-reach-equipment=Augmente l'interaction et la portée d'1 tuile.

