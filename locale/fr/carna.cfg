[technology-description]
planet-discovery-carna=Une planète où les températures sont très basses, ce qui ralentit la vitesse de traitement de toutes les machines. Nous devrons trouver des moyens de chauffer les environs.
carna-interm_1=Découvrez comment exploiter les matériaux des débris de Carna disséminés dans le paysage, notamment les méthodes rudimentaires permettant d'utiliser et de fabriquer des blocs de plasma.
molybdenum-processing=Le molybdène est la seule ressource naturelle exploitable sur cette planète. Il semblerait que la plupart, voire la totalité, des ressources naturelles aient été, d'une manière ou d'une autre, converties ou transmutées en ce matériau, ce qui amène à se demander si ce molybdène est réellement naturel ou non. Il est essentiel de pouvoir accéder de manière massive à cette ressource, car cela nous permettra d'automatiser entièrement la fabrication des cœurs en molybdène nécessaires à la création de machines plus avancées.
chunk-processing=Transformer les fluides en blocs, ce qui peut servir à quelques choses, comme produire de la vapeur.
carnalseiver=Cette structure permet d'isoler et de reconstituer des éléments chimiques qui nous sont plus familiers, en transformant essentiellement les amas de débris sur Carna en fer, en cuivre et même en molybdène, afin de nous aider à subsister jusqu'à ce que nous puissions accéder plus largement à ses ressources brutes.
carnalairprocessing=L'atmosphère de Carna est saturée d'eau, bien qu'il n'y en ait pas à sa surface. L'isolateur d'air au molybdène est capable d'utiliser son cœur en molybdène de Carna pour isoler les particules de notre choix présentes dans l'air et créer à leur place un gaz utilisable.
geyser-power=La surface présente plusieurs ouvertures d'où s'échappent des vapeurs gazeuses dans l'air. Nous pouvons exploiter ces gaz de différentes manières, par exemple pour produire de la vapeur ou les brûler dans l'air à l'aide d'une autre structure, le Pilier chauffant en molybdène. Ce pilier nous permettra de chauffer la zone environnante et d'assurer le fonctionnement de nos machines à leur vitesse optimale, ce qui constituera en quelque sorte un moyen de lutter contre l'environnement hostile de Carna.
algite-processing=L'Algite est un minéral particulier que l'on trouve à l'intérieur des machines de Carna. Cette ressource rare peut être extraite des amas de débris qui nous entourent à l'aide de cœurs spéciaux intégrés à nos tamiseuses en molybdène. Cette ressource sera indispensable pour fabriquer les puissantes machines dont nous aurons besoin.
stromatolite-carnabreed=Grâce à la matérialisation d’une variété particulière de stromatolites de fer et de cuivre de Gléba, nous pouvons cultiver en masse ces fascinants amas de bactéries métalliques pour remplacer nos filons minéraux habituels. Des tours agricoles seront nécessaires. Pour que ces stromatolites puissent se développer, elles auront besoin d’un sol fertile sur lequel se poser. Or, Carna est un monde pratiquement dépourvu de vie. Les capsules de vie de Carna sont notre réponse : lancer ces grenades créera un nuage qui transformera la zone environnante en un espace propice aux plantes spécifiques que nous matérialisons sur Carna.
carnal-oil2=Méthode avancée d'extraction de pétrole utilisant l'énergie de Carna.
algite-assembler=Une machine d'assemblage ultra-rapide fonctionnant au plasma de Carna. Pratiquement inutilisable en dehors de Carna. Il existe peut-être une meilleure solution pour une utilisation ailleurs.
carnal-science-pack=La source du savoir de Carna en flacon.
slipstack-carnabreed=La variété de Carna des Coraeux terrestres de Gléba. Cette plante se spécialisera dans la production d'eau riche en nutriments que nous pourrons utiliser pour alimenter des chambres biologiques plus avancées, une source de carburant qui ne se périme pas. Elle est également essentielle pour la culture d'Exoticia.
boompuff-carnabreed=Il n'y a pas de charbon sur Carna ; cette plante produira un équivalent pouvant être transformé en carbone.
feron-processing=Le traitement des amas de débris de Carna dotés de cœurs spéciaux permettent d'accéder à un minéral extrêmement rare, le féron. Le féron nous donnera accès à l'énergie de Carna ainsi qu'à la capacité de créer des machines avancées que nous pourrons utiliser ailleurs.
automation-feron=Des machines d'assemblage incroyablement rapides et puissantes qui utilisent l'énergie de Carna comme carburant.
biochamber-mk2=Version améliorée de la chambre biologique qui utilise de l'eau riche comme source de carburant à la place de nutriments bruts.
artificial-global-gleba-soil=Nos capsules de survie ne fonctionnent qu'à la surface de Carna, mais ces tuiles peuvent être placées n'importe où, ce qui nous permet de cultiver nos variétés de plantes de Carna sur n'importe quelle surface. Cela nous donne ainsi la possibilité de créer des gisements de carbone, de fer et de cuivre, ainsi que de l'eau nutritive où bon nous semble.
carnal-energy-crystal=Forme physique de l'énergie de Carna, adaptée au transport de masse hors de la planète. Peut également être cultivée.
feron-airpump=Une version ultra-avancée de l'isolateur d'air en molybdène. Cette machine géniale peut isoler des atomes dans l'air de nombreux mondes afin de matérialiser le gaz de notre choix.
forging-exotic-material=Un processus complexe pour cultiver et faire pousser de l'Exoticia, une plante énigmatique qui fournira de la matière exotique que nous pourrons utiliser. En lançant des fusées dans la haute atmosphère, les gaz provenant du champ électromagnétique de Carna peuvent être collectés et utilisés pour convertir des graines en graines exotiques.
breeding-exoticia=Plantes qui produisent de la matière exotique.
advanced-materialization=Matérialiser des ressources plus complexes en échange de connaissances.
carna-reach-equipment=Étend votre portée d'une tuile.
carna-craft-equipment=Augmente votre vitesse de fabrication.
carna-cache-equipment=Augmente votre inventaire.
carnan-spire=Une grande structure capable de transmettre l'énergie qui y est fournie sur toute une surface ! Cette machine est magnifique et distribue efficacement toutes sortes d'énergie, au prix d'une grande quantité d'énergie qui lui est fournie ainsi que d'un noyau de flèche. Cette machine rendra inutile tout câblage local. Cependant, si la machine cesse de brûler son noyau de flèche, la transmission sera interrompue. Il est recommandé de garder toutes les machines nécessaires au fonctionnement de la flèche connectées à un réseau électrique local au cas où la transmission s'arrêterait. De grandes quantités d'énergie seront nécessaires pour alimenter la flèche.
stingfrond-carnabreed=Les Palmiers tropicaux sont nécessaires à la création d'autres plantes de Carna. Le fruit cultivé par cette plante est riche en pétrole.
algite-bio-dome=Ce dôme spécial est capable de recréer une atmosphère locale identique à celle de Gléba, permettant la culture de fruits tels que les Yumakos et les Noix gélatineuses hors de la planète. Une fois le dôme installé, une option sera proposée pour créer l'atmosphère locale, ce qui aura pour conséquence de rendre permanente la zone où se trouve le dôme. Il n'y a aucun moyen d'inverser cet effet.

