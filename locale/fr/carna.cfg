[mod-setting-description]
carna-sciencesphere-mode=Ce mode modifie complètement la progression de Carna pour intégrer les sphères de science ! Dans ce mode, la majeure partie de l'arbre des technologies est modifiée : il faut désormais mener des recherches traditionnelles sur Carna à l'aide des nouvelles sphères de science. ATTENTION, cela allongera considérablement l'arbre de progression sur la planète, au moins trois fois plus.
carna-itemtemp=Plusieurs objets subiront une "détérioration", c'est-à-dire qu'ils passeront de l'état chaud à l'état froid. Un certain nombre de recettes nécessitent des variantes chaudes de ces objets pour pouvoir être fabriquées. Cela augmentera considérablement la difficulté de la logistique sur Carna. ACTIVÉ par défaut. Cette option est proposée afin de pouvoir être désactivée, car Carna est déjà une planète où la logistique est assez complexe. Certains pourraient trouver que les objets liés à la température sur Carna ajoutent un peu trop de difficulté.
carna-complex-atmosphere=Si activé, l'atmosphère de Carna aura un effet complexe sur les machines. Lorsque les valeurs de pollution thermique sont faibles, les machines verront leur vitesse réduite de 40 %. À une valeur plus élevée, cette réduction sera de 20 %, puis de 0, et enfin, à une valeur très élevée, leur vitesse augmentera de 10 % par bloc. Si désactivé, les machines seront simplement ralenties de 20 % si la pollution n'est pas suffisamment élevée dans le bloc. L'activation de cette option peut avoir un effet sur les performances du jeu, mais cela n'a pas été testé de manière approfondie. Il est recommandé de ne pas activer ou désactiver cette option si vous avez déjà commencé ou généré un monde sur Carna.
carna-atmosphere-check=Combien de secondes s'écoulent avant que Carna ne vérifie les blocs locaux à sa surface afin de mettre à jour les effets de la température sur les entités ou les machines ? Cette vérification s'effectue une fois toutes les X secondes. Plus la valeur est élevée, moins l'état des machines sur Carna sera mis à jour fréquemment. Plus la valeur est faible, plus la mise à jour sera fréquente.
carna-atmosphere=Simple : l'atmosphère de Carna aura un effet modéré sur les machines. Les machines qui ne sont pas réchauffées par une tour verront leur vitesse réduite.\nComplexe : l'atmosphère de Carna aura un effet complexe sur les machines. Avec de faibles valeurs de pollution thermique, les machines seront ralenties de 40 % ; à une valeur plus élevée, elles seront ralenties de 20 %, voire jusqu'à 0. Avec une valeur élevée, elles accéléreront de 10 % pour chaque bloc. Si désactivé, les machines seront simplement ralenties de 20 % si la pollution n'est pas suffisamment élevée dans le bloc.\nComplexe optimisé : identique à "Complexe", mais au lieu de vérifier les blocs individuellement (1x1), chaque bloc est vérifié en tant que groupe de 2x2, ce qui se traduit par une précision globale moindre, mais réduit la probabilité de mini-latence à mesure que la surface utilisée augmente.\nLe mode "Complexe" peut avoir un effet sur les performances du jeu, mais cela n'a pas été testé de manière approfondie. Il est fortement déconseillé de basculer entre les modes si vous avez déjà commencé ou généré un monde sur Carna.

