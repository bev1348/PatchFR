carnaEMF=Champ électromagnétique de Carna

[space-location-description]
carna=Une planète où règnent des températures extrêmement basses. Elle est entourée d’un champ électromagnétique très actif, qui provoque des éclairs occasionnels et plonge sa surface dans une obscurité perpétuelle. L’atmosphère glaciale est dangereuse pour la plupart de nos machines, les empêchant de fonctionner à pleine vitesse. Le champ électromagnétique qui enveloppe la planète semble avoir été créé artificiellement, ce qui laisse penser qu'il y avait autrefois de la vie sur cette planète enneigée et désolée. Les scans indiquent que la surface est jonchée de machines inactives et que le noyau de ce monde semble avoir été remplacé artificiellement.

