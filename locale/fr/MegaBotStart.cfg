[mod-setting-description]
starting-robot-count=Combien de robots de construction apparaîtront dans votre inventaire à votre arrivée. (entre 50 et 500, par défaut 50)
faster-robots=Niveau de recherche sur la vitesse de déplacement des robots à votre arrivée. (entre 0 et 6, par défaut 0)
mbs-quality=Commencez avec une armure et un équipement de meilleure qualité. (par défaut : normal)
shield-start=Commencez avec un équipement de bouclier
defense-start=Commencez avec un équipement de défense laser personnelle, si la taille de la grille le permet

[string-mod-setting]
mbs-quality-normal=Normal
mbs-quality-uncommon=Inhabituel
mbs-quality-rare=Rare
