[entity-description]
rift-rail-placer-entity=Installez une interface Rift permettant de téléporter des trains à travers l'espace.\nCompatible avec LTN et Cybersyn2.\n\n[Dépannage]\nSi les trains ne se téléportent pas après une collision, ou si les éléments de collision ne fonctionnent pas, rendez-vous dans [Paramètres -> Paramètres du mod -> Carte] cliquez sur "Réinitialiser tous les éléments de collision" pour résoudre le problème.
rift-rail-entity=La structure principale du portail Rift Rail. Doit être apparié à un autre portail pour permettre la téléportation des trains. Si la téléportation échoue ou si vous rencontrez des problèmes, essayez d'utiliser l'option “Réinitialiser tous les éléments de collision” dans les paramètres du mod.
rift-rail-core=The core component of the Rift Rail portal. Handles internal logic and connections.

[virtual-signal-name]
riftrail-go-to-id=RiftRail : Aller à [ID]

[virtual-signal-description]
riftrail-go-to-id=Spécifie l'identifiant (ID) du portail de destination pour la téléportation.\nUtilisation : définissez la valeur de ce signal dans la condition logique de l'horaire de train sur l'identifiant du portail de destination.\nExemple : riftrail-go-to-id = 5 signifie se téléporter vers le portail portant l'identifiant 5.

[tips]
tips-and-tricks-category=[item=rift-rail-placer] RiftRail
rift-rail-pairing-tutorial=Tutoriel sur Rift Rail
item-description-pairing=Le principe de base de Rift Rail repose sur [font=default-bold][color=green]l'appariement[/color][/font] : chaque Entrée doit être reliée à au moins une Sortie pour fonctionner correctement. Une fois l'appariement effectué, lorsqu'un train entre dans l'Entrée, il sera téléporté vers la Sortie connectée.\n\nPour apparier : cliquez sur le [font=default-bold][color=green]Noyau Rift Rail[/color][/font], puis cliquez sur la Sortie à laquelle vous souhaitez vous connecter pour finaliser l'appariement. Chaque Entrée peut être reliée à plusieurs Sorties, et chaque Sortie peut également être reliée à plusieurs Entrées.\n\nUne fois l'appariement effectué, les identifiants correspondants s'afficheront sur les Entrées et les Sorties (pour vous aider à identifier leurs connexions).
rift-rail-advanced-routing=Routage avancé avec Rift Rail
item-description-advanced=Depuis la version 0.10, Rift Rail prend en charge les réseaux complexes de type [font=default-bold][color=green]plusieurs-vers-plusieurs (N-vers-M)[/color][/font] ! Vous pouvez relier 1 Entrée à jusqu’à 5 Sorties, ou relier 5 Entrées à 1 Sortie.\n\nLorsqu’une Entrée est reliée à plusieurs Sorties, le portail détermine la destination du train en fonction de la [color=orange]priorité[/color] suivante :\n[font=default-bold]1. Signal d'horaire du train (priorité maximale) :[/font] Si l'horaire du train définit [virtual-signal=riftrail-go-to-id] = [ID cible] (le comparateur n'affecte pas le routage ; seule la valeur numérique est lue), et que cet ID correspond à une Sortie connectée valide, le train se téléporte vers cette Sortie.\n\n[font=default-bold]2. Signal logique d'Entrée :[/font] Si l'étape 1 n'aboutit pas à une Sortie valide, Rift Rail lit [virtual-signal=riftrail-go-to-id] à partir du réseau logique côté Entrée et tente de trouver une Sortie correspondante.\n\n[font=default-bold]3. Solution alternative par défaut :[/font] Si aucun des deux signaux ne correspond à une Sortie valide, Rift Rail utilise la Sortie configurée par défaut. Si celle-ci n'est pas disponible, il se rabat sur la première Sortie connectée disponible.\nPour les constructeurs de mégabases recherchant des performances maximales, Rift Rail offre un grand potentiel d'optimisation :\n\n[font=default-bold][color=orange]Placement sur le même axe[/color][/font] : tant que l'Entrée et la Sortie appariées sont [color=green]toutes deux placées verticalement, ou toutes deux horizontalement[/color], le portail contourne la logique d'apparition standard complexe et appelle directement l'API Clone d'origine pour une duplication au pixel près. Cette méthode ne consomme pratiquement pas de calculs et constitue le choix idéal pour les mégabases ![font=default-bold]Conclusion :[/font] Pour des performances de téléportation optimales, évitez les configurations à 90 degrés "une horizontale, une verticale". Veillez à ce que les portails soient [color=orange]parallèles[[/color] dans la mesure du possible.
