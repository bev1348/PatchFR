rift-rail-tech=Débloque Rift Rail, un système de portails ferroviaires inter-surfaces. Construisez des portails pour relier des réseaux ferroviaires éloignés et permettre la téléportation fluide des trains.

[mod-name]
RiftRail=Rift Rail

[mod-description]
RiftRail=Offre un système de téléportation ferroviaire asymétrique à sens unique sur plusieurs surfaces. Permet de personnaliser le changement de mode d'entrée/sortie et est entièrement compatible avec la planification logistique de Cybersyn.
rift-rail-placer=Installez une interface Rift permettant de téléporter des trains à travers l'espace.\nCompatible avec LTN et Cybersyn2.\n\n[Dépannage]\nSi les trains ne se téléportent pas après une collision, ou si les éléments de collision ne fonctionnent pas, rendez-vous dans [Paramètres -> Paramètres du mod -> Carte] cliquez sur "Réinitialiser tous les éléments de collision" pour résoudre le problème.

