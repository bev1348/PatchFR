[mod-setting-description]
rift-rail-train-gui-track=Si un joueur consulte l'interface graphique du train avant la téléportation, celle-ci sera rétablie de manière transparente après la téléportation. Cette option est désactivée pour améliorer les performances (recommandé pour les grands serveurs).
rift-rail-show-logistics-notifications=Détermine si les messages de notification s'affichent lorsque des connexions inter-surfaces Cybersyn/LTN sont établies ou interrompues. Activé par défaut.
rift-rail-cs2-fail-unhandled-cross-surface=Si activé, Rift Rail annulera les livraisons de prise en charge/dépose de CS2 lorsque CS2 a déjà interrogé Rift Rail pour un itinéraire inter-surfaces et que Rift Rail ne parvient pas à trouver un chemin de transfert valide. Cela empêche CS2 de se rabattre sur un horaire standard inter-surfaces invalide. Limitation connue : après une telle annulation forcée, le train concerné peut cesser définitivement de recevoir de nouvelles livraisons CS2 ; en pratique, la solution habituelle consiste à récupérer le train et à le replacer. Activé par défaut.
rift-rail-show-cybersyn-global=Afficher les notifications de connexion/déconnexion de Cybersyn dans la console. Option activable individuellement pour chaque joueur. Désactivez-la si vous ne souhaitez pas les voir.
rift-rail-reset-colliders=[OPÉRATION DANGEREUSE] Cette opération supprimera de force tous les éléments de collision RiftRail de la carte et les régénérera. À n'utiliser que lorsque des erreurs sur les éléments de collision ou des emplacements incorrects d'éléments de collision surviennent après une mise à jour du mod. Une fois la vérification effectuée et confirmée, le script exécutera automatiquement la logique de réparation et désactivera automatiquement cette option.
rift-rail-uninstall-cleanup=AVERTISSEMENT : Cochez cette case UNIQUEMENT si vous avez l'intention de désinstaller ce mod ou si vous souhaitez nettoyer les données de connexion entre surfaces.\nCela forcera la déconnexion de tous les portails Rift Rail des réseaux LTN et effacera les données externes afin d'éviter toute erreur.\nAssurez-vous qu'aucun train n'est en train de se téléporter avant d'activer cette option !
rift-rail-teleport-speed=Détermine la vitesse initiale du train à la sortie du portail.\nRecommandé : 1,0 (environ 216 km/h). Des valeurs plus élevées peuvent entraîner la rupture des attelages.\nDes valeurs plus faibles réduisent l'efficacité.\nUne augmentation de cette valeur peut nécessiter une réduction de l'intervalle de vérification du placement.\nMinimum : 0,1. Maximum : 8,0.
rift-rail-placement-interval=Détermine la fréquence à laquelle le script vérifie si le wagon suivant peut être placé (en ticks ; 60 ticks = 1 seconde).\nLes valeurs faibles offrent une plus grande stabilité mais sollicitent légèrement plus le processeur.\nLes valeurs élevées permettent d'économiser le processeur mais risquent de provoquer la rupture des attelages à grande vitesse.\nVous devrez peut-être réduire la vitesse du train si vous augmentez cette valeur.\nRecommandé : 1. Maximum : 10.
rift-rail-mod-integration=Choisissez le mod avec lequel Rift Rail doit s'intégrer. Ce paramètre modifie les recettes et les technologies pour les adapter au mod sélectionné. Une seule option peut être active à la fois.\n\nOptions :\n- Aucune : aucune intégration. Rift Rail utilise ses propres recettes et progression par défaut.\n- Mode facile : rend Rift Rail plus facile à construire grâce à des recettes et une progression simplifiées. \n- Ère spatiale : adapte Rift Rail pour qu'il utilise les matériaux et la progression du mod Ère spatiale.\n- Krastorio 2 : adapte Rift Rail pour utiliser les composants et l'équilibrage de Krastorio 2.\n- Space exploration: adapte Rift Rail pour utiliser les ressources et la progression spatiale de Space Exploration.\n- SE+K2 : adapte Rift Rail pour une configuration combinée de Space Exploration et Krastorio 2.

