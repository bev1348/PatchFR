[rift_rail_informatron]
# ==========================================
# Informatron Guide: Rift Rail
# ==========================================
# -- Main Page --
menu_rift_rail_informatron=Rift Rail [item=rift-rail-placer]
title_rift_rail_informatron=Guide de Rift Rail
page_main_text_1=Bienvenue sur [font=default-bold][color=193,128,255]Rift Rail[/color][/font] ! Ce mod propose une solution logistique compacte et high-tech qui vous permet de téléporter des trains en toute fluidité sur de longues distances, sur différentes surfaces et même à bord de vaisseaux spatiaux.
page_main_text_2=Contrairement aux liaisons bidirectionnelles traditionnelles, Rift Rail utilise un [font=default-bold][color=orange]système de téléportation asymétrique à sens unique[/color][/font]. Il prend parfaitement en charge les locomotives, les wagons de marchandises, les wagons-citernes et les wagons d'artillerie. Players inside the train are teleported instantly too! Veuillez consulter le menu de gauche pour obtenir des informations détaillées sur son fonctionnement.
# -- Operation & Pairing --
menu_rr_pairing=Modes et appariement
title_rr_pairing=Modes de fonctionnement et Guide sur l'appariement
page_pairing_text_1=Placez un [item=rift-rail-placer] (Placeur Rift Rail). Ouvrez son interface graphique et configurez-le comme une [color=green]Entrée[/color] ou une [color=orange]Sortie[/color].\n\n[font=default-bold]Comment les apparier :[/font]\n1. Assurez-vous d'avoir construit à la fois une Entrée et une Sortie.\n2. Ouvrez l'interface graphique d'un portail, sélectionnez l'autre portail dans le menu déroulant "Sélecteur de cible", puis cliquez sur le bouton [color=green]Apparier[/color].\n3. Une fois l'appariement effectué, les trains entrant dans l'entrée émergeront instantanément de la sortie connectée.
# -- Routing Logic --
menu_rr_routing=Routage N-vers-M
title_rr_routing=Priorités de routage N-vers-M
page_routing_text_1=Depuis la version 0.10, Rift Rail prend en charge les réseaux complexes de type [font=default-bold][color=green]Plusieurs-vers-Plusieurs (N-vers-M)[/color][/font] ! Vous pouvez connecter simultanément une Entrée à cinq Sorties maximum, ou plusieurs Entrées à une seule Sortie.\n\nLorsqu'une Entrée est reliée à plusieurs Sorties, le portail détermine la destination en fonction de l'ordre de [color=orange]priorité[/color] suivant :
page_routing_text_2=[font=default-bold]1. Signal d'horaire du train (la plus haute) :[/font] Si les conditions d'attente dans l'horaire du train incluent [virtual-signal=riftrail-go-to-id] = [ID cible] (le comparateur n'affecte pas le routage ; seule la valeur numérique est lue), et que cet ID correspond à une Sortie connectée valide, le train se téléporte vers cette Sortie.\n\n[font=default-bold]2. Signal logique d'Entrée :[/font] Si l'étape 1 n'aboutit pas à une Sortie valide, Rift Rail lit [virtual-signal=riftrail-go-to-id] à partir du réseau logique côté Entrée et tente de trouver une Sortie correspondante.\n\n[font=default-bold]3. Par défaut (Solution alternative) :[/font] Si aucun des deux signaux ne correspond à une Sortie valide, Rift Rail utilise la Sortie configurée par défaut. Si celle-ci n'est pas disponible, il se rabat sur la première Sortie connectée disponible.
# -- LTN --
menu_rr_ltn=Intégration de LTN
title_rr_ltn=Configuration LTN inter-surfaces
page_ltn_text_1=Depuis la version 0.10, la logique de configuration du réseau LTN inter-surfaces a été mise à jour. Pour établir un itinéraire LTN valide entre la surface A et la surface B, vous devez respecter strictement les règles suivantes :\n\n[font=default-bold]1. Aller-retour (condition obligatoire) :[/font]\nLe dispatcheur LTN doit calculer un chemin de retour pour pouvoir acheminer correctement les trains. Vous devez créer [color=green]Entrée A -> Sortie B[/color] (par exemple, de Nauvis à Vulcanus), ET un chemin retour [color=orange]Entrée C -> Sortie D[/color] (par exemple, de Vulcanus à Nauvis).\n\n[font=default-bold]2. Activation manuelle indépendante :[/font]\nContrairement aux versions précédentes, le commutateur n'affecte désormais QUE le bâtiment sur lequel vous avez cliqué. Vous devez ouvrir l'interface graphique pour les [color=red]4 portails[/color] concernés et [color=green]activer manuellement[/color] le commutateur "LTN" tant du côté de l'Entrée que de celui de la Sortie.\n\n[font=default-bold]3. Réseau universel (ID -1) :[/font]\nAfin de simplifier la configuration, la fonctionnalité d'ID de réseau de portail personnalisé a été supprimée. Tous les portails Rift Rail utilisent désormais de manière permanente l' [color=purple]ID de réseau -1[/color], agissant comme des ponts universels pour tous les réseaux LTN.
# -- CS2 --
menu_rr_cs2=Intégration de CS2
title_rr_cs2=Configuration Cybersyn 2 (CS2) inter-surfaces
page_cs2_text_1=Depuis la version 0.12, Rift Rail réintroduit la prise en charge native de [font=default-bold][color=cyan]Cybersyn 2 (CS2)[/color][/font] via son API de module d'itinéraire. Pour établir un itinéraire CS2 valide entre la surface A et la surface B, respectez les règles suivantes :\n\n[font=default-bold]1. Aller-retour (condition obligatoire) :[/font]\nLe dispatcheur CS2 doit calculer un chemin de retour pour pouvoir acheminer correctement les trains. Vous devez créer [color=green]Entrée A -> Sortie B[/color] (par exemple, de Nauvis à Vulcanus), ET un chemin retour [color=orange]Entrée C -> Sortie D[/color] (par exemple, de Vulcanus à Nauvis).\n\n[font=default-bold]2. Activation manuelle indépendante :[/font]\nLe commutateur n'affecte que le bâtiment sur lequel vous avez cliqué. Vous devez ouvrir l'interface graphique pour les [color=red]4 portails[/color] concernés et [color=green]activer manuellement[/color] le commutateur "CS2" tant du côté de l'Entrée que de celui de la Sortie.\n\n[font=default-bold]3. Routage global automatique optimal :[/font]\nLorsque plusieurs portails sont disponibles, Rift Rail sélectionne automatiquement le chemin globalement optimal, en minimisant la distance combinée entre l'approche du train vers le portail d'entrée et la proximité du portail de sortie par rapport à l'arrêt de destination. Aucune configuration manuelle n'est nécessaire.\n\n[font=default-bold]4. Avertissement pour les itinéraires à sens unique :[/font]\nSi l'activation de CS2 sur un portail entraîne un itinéraire à sens unique (par exemple, A→B existe mais pas B→A), [color=orange]Rift Rail vous avertira dans la console[/color]. Construisez l'itinéraire de retour pour résoudre l'avertissement.

# -- FAQ --
menu_rr_faq=FAQ et dépannage
title_rr_faq=Foire aux questions
page_faq_text_1=[font=default-bold]Q : Cybersyn est-il pris en charge ?[/font]\nR : [font=default-bold][color=green]Cybersyn 2 (CS2)[/color][/font] est pris en charge nativement depuis la version v0.12 ! Consultez la page [color=cyan]Intégration de CS2[/color] de ce guide pour plus de détails sur la configuration.\nLa prise en charge de [color=default]Classic Cybersyn (v1)[/color] a été [color=red]supprimée définitivement[/color] à partir de la version v0.10. Revenez à la version v0.10.1 (N-vers-M) ou v0.8.2 (1-vers-1) si vous en avez absolument besoin.\n\n[font=default-bold]Q :  Les trains déraillent et ne se téléportent pas, ou les éléments de collision sont défectueux ?[/font]\nR : Veuillez vous rendre dans [Paramètres -> Paramètres du mod -> Carte] et cliquer sur [color=orange]"Réinitialiser tous les éléments de collision"[/color] pour une solution d'urgence.\n\n[font=default-bold]Q : La désinstallation de ce mod va-t-elle corrompre ma sauvegarde ?[/font]\nR : Avant de désinstaller, vous DEVEZ cocher [color=red]"Nettoyage de désinstallation"[/color] dans les paramètres du mod. Cela force la déconnexion de tous les portails et nettoie les données résiduelles pour éviter toute corruption de la sauvegarde !

# -- UPS Performance & Tuning --
menu_rr_ups=Performances
title_rr_ups=Avancé : Optimisation des performances
page_ups_text_1=Pour les créateurs de mégabases en quête de performances maximales, Rift Rail propose une architecture zéro copie ultime :\n\n[font=default-bold][color=orange]Clonage natif unifié[/color][/font] Rift Rail contourne désormais complètement la logique complexe d'apparition standard. Que vos portails soient parallèles ou perpendiculaires à 90 degrés, il utilise systématiquement une prédiction mathématique ultra-rapide et sans état pour déclencher l'API native C++ Clone, garantissant une duplication au pixel près. Cette méthode ne consomme pratiquement aucun calcul en natif et constitue le choix ultime et inconditionnel pour les mégabases !
page_ups_text_2=[font=default-bold][color=orange]Astuce n° 2 : Trouver le bon équilibre entre "Vitesse de téléportation" et "Intervalle de placement"[/color][/font]\nVous pouvez régler ces paramètres essentiels dans les paramètres du mod :\n[font=default-bold]· Intervalle de placement :[/font] Augmenter cette valeur (par exemple à 2 ou 3) réduit considérablement l'utilisation du processeur par le script, mais ralentit la connexion des wagons.\n[font=default-bold]· Vitesse de téléportation :[/font] Des valeurs plus élevées augmentent le débit, mais les vitesses élevées DOIVENT être associées à un intervalle faible (comme 1), sinon les trains se désolidariseront.\n\n[font=default-bold]🏆 Préréglages recommandés :[/font]\n[color=green]Mode haut débit :[/color] Intervalle 1, Vitesse 1,0~2,4 (idéal pour la plupart des joueurs).\n[color=purple]Mode Éco ultime :[/color] Intervalle 3, Vitesse 0,5~1,0 (idéal pour les mégabases de plus de 1000 SPM, consommation du processeur extrêmement faible).



