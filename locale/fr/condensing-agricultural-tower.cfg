[mod-name]
title=Condensing agricultural tower (Tour agricole à condensation)

[mod-description]
description=Permet de récupérer des fluides à partir de plantes à l'aide d'une nouvelle tour agricole. Ces fluides sont stockés dans un réservoir situé à l'intérieur de la tour

[entity-name]
condensing-agricultural-tower=Tour agricole à condensation
hidden-condensing-agricultural-tower-tank=Réservoir de la tour agricole à condensation

[entity-description]
condensing-agricultural-tower=Plantez des graines et récoltez-les tout en récupérant un fluide et en le stockant dans un réservoir lors de chaque récolte. Une fois le réservoir plein, l'excédent ne sera pas stocké. Pour en savoir plus, consultez la Factoriopédia.
hidden-condensing-agricultural-tower-tank=Peut stocker jusqu'à 30 000 litres de fluides issus de la récolte.

[factoriopedia-description]
condensing-agricultural-tower=Plantez des graines et récoltez-les tout en récupérant un fluide et en le stockant dans un réservoir lors de chaque récolte. Une fois le réservoir plein, l'excédent ne sera pas stocké.
condensing-tree=\nRécolter un [entity=tree-plant] permet de condenser 2000 [fluid=water] (153,3/seconde)
condensing-yumako=\nRécolter un [entity=yumako-tree] permet de condenser 810 [fluid=steam] à 165 °C (62,1/seconde)
condensing-jellynut=\nRécolter un [entity=jellystem] permet de condenser 420 [fluid=lubricant] (32,2/seconde)

[mod-setting-name]
