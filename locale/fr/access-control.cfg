[mod-setting-description]
access-control-bootstrap-names=Noms de joueurs séparés par des virgules qui sont toujours autorisés à jouer (par exemple, pour les serveurs sans interface graphique lorsqu'aucun administrateur n'est connecté dans le jeu). La casse est prise en compte.
access-control-allow-revoke-admin-targets=Si activé, les administrateurs peuvent supprimer un autre administrateur de la liste des autorisations via l'interface utilisateur. Les administrateurs conservent leurs privilèges d'administrateur dans Factorio. À utiliser avec précaution.
access-control-remote-write-enabled=Si activée, d'autres mods ou scénarios peuvent modifier la liste des autorisations via l'interface à distance. Laissez désactivé sur les serveurs publics, sauf si vous faites entièrement confiance à votre liste de scénarios.
access-control-autosave-on-join=Si activé, le serveur enregistre la carte lorsqu'un joueur rejoint la partie (mode multijoueur uniquement). Il utilise un délai entre les sauvegardes et des noms de fichiers tournants pour limiter la sollicitation du disque.
access-control-autosave-debounce-minutes=Nombre minimum de minutes entre deux sauvegardes automatiques déclenchées par la connexion pour un même nom de joueur.
access-control-autosave-max-slots=Nombre d'emplacements de noms de fichiers de sauvegarde à rotation par joueur (le numéro d'emplacement change. Les anciens fichiers ne sont pas supprimés par le mod).

