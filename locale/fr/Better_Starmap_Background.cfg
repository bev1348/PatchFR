[mod-setting-name]
galaxy-background-enabled=Activer la galaxie en l'arrière-plan
universe-widget-enabled=Activer le fond plein écran avec ciel étoilé
universe-background-flicker-enabled=Activer le scintillement du ciel étoilé
asteroid-belt-1-enabled=Activer la ceinture d'astéroïdes intérieure
asteroid-belt-2-enabled=Activer la ceinture d'astéroïdes extérieure

[mod-setting-description]
galaxy-background-enabled=Indiquer s'il faut ajouter un arrière-plan pour tous les systèmes stellaires pris en charge.
universe-widget-enabled=Permet d'activer ou non le fond plein écran Ciel étoilé dans la carte stellaire.
universe-background-flicker-enabled=Déterminer s'il faut faire scintiller l'arrière-plan représentant un ciel étoilé en plein écran lors des mouvements de caméra.
asteroid-belt-1-enabled=Activer ou non la ceinture d'astéroïdes entre Fulgora et Aquilo.
asteroid-belt-2-enabled=Activer ou non la ceinture d'astéroïdes entre les confins du système solaire et la planète pulvérisée.

