[mod-name]
auto-player-control=Auto Player Control (Contrôle automatique de personnage)

[mod-description]
auto-player-control=Assistant automatique de construction de fantômes et de déconstruction. Construit des fantômes et déconstruit les entités sélectionnées à votre portée.

[mod-setting-name]
companion-auto-build-rate=Fréquence de construction automatique (en ticks)
companion-visualization-rate=Fréquence de rafraîchissement de l'affichage (en ticks)
companion-deconstruct-delay=Délai de déconstruction (en ticks)
companion-show-build-radius=Afficher le rayon de construction
companion-show-missing-indicators=Afficher les indications de matériel manquant
companion-show-flying-text=Afficher les messages volants

[mod-setting-description]
companion-auto-build-rate=Fréquence à laquelle tenter de fabriquer des fantômes. Plus la valeur est faible, plus la fabrication est rapide. Par défaut : 20 ticks (~3 fabrications/seconde)
companion-visualization-rate=Fréquence de mise à jour des indicateurs visuels. Plus la valeur est faible, plus l'affichage est fluide, mais plus la charge sur les performances est élevée. Par défaut : 60 ticks (une fois par seconde)
companion-deconstruct-delay=Délai entre la fin d'une déconstruction et le début de la suivante. Par défaut : 10 ticks
companion-show-build-radius=Afficher la zone de portée pour la construction
companion-show-missing-indicators=Mettre en évidence les éléments fantômes qui ne peuvent pas être construits en raison de matériaux manquants dans votre inventaire
companion-show-flying-text=Afficher des messages lors de la construction/déconstruction

[controls]
companion-toggle-input=Activer/Désactiver Auto Player Control

[shortcut]
companion-toggle=Auto Player Control\n\nConstruit automatiquement des fantômes et détruit les entités marquées à votre portée.\n\n[font=default-semibold][color=255,230,192]Lorsqu'il est activé :[/color][/font]\n[color=128,206,240]  •[/color]  Construit des entités fantômes à l'aide d'objets de votre inventaire\n[color=128,206,240]  •[/color]  Récupère automatiquement les entités marquées\n[color=128,206,240]  •[/color]  Affiche le rayon de construction et les indicateurs de matériaux manquants

[companion]
build-success=Construit
deconstruct-success=Récupéré

[companion-messages]
enabled=Mod Auto Player Control activé
disabled=Mod Auto Player Control désactivé
gui-created=Interface graphique créée/actualisée
reloading-mods=Rechargement de tous les mods...

[companion-commands]
companion_reload=Rechargez le mod Auto Player Control
