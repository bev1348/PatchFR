[controls]
beltThreadUpgrader-give-belt-upgrade-tool=Faire apparaître l'outil d'amélioration de convoyeurs dans la main
beltThreadUpgrader-give-belt-remove-tool=Faire apparaître l'outil de suppression de convoyeurs dans la main

[mod-setting-description]
PCPBU-bool-splitters-included-setting=Si désactivé, les répartiteurs ne seront pas mis à jour lors de la mise à niveau d'une suite de convoyeurs. Dans les deux cas, les répartiteurs servent de limites à une suite.
PCPBU-bool-sequential-upgrades-allowed-setting=Si désactivé, les entités marquées pour être mises à niveau vers le même niveau ne le seront pas une nouvelle fois lors de la mise à niveau d'une suite de convoyeurs.
PCPBU-bool-sideloading-belts-included-setting=Si désactivé, les convoyeurs en amont qui s'appuient latéralement sur un convoyeur ne seront pas pris en compte lors de la mise à niveau d'une suite de convoyeurs.
PCPBU-bool-upgrade-all-selected-threads-setting=Si désactivé, seul le premier objet d'une sélection (généralement l'entité située en haut à gauche) sera pris en compte pour la mise à niveau de sa suite de convoyeurs.

[mod-setting-name]
PCPBU-bool-splitters-included-setting=Faut-il inclure des répartiteurs lors de la mise à niveau d'une suite de convoyeurs ?
PCPBU-bool-sequential-upgrades-allowed-setting=Faut-il inclure les entités déjà marquées pour une mise à niveau vers le même niveau lors de la mise à niveau d'une suite de convoyeurs ?
PCPBU-bool-sideloading-belts-included-setting=Faut-il inclure les convoyeurs de chargement latéral en amont du même niveau lors de la mise à niveau d'une suite de convoyeurs ?
PCPBU-bool-upgrade-all-selected-threads-setting=Faut-il inclure toutes les entités dans une sélection lors de la mise à niveau d'une suite de convoyeurs ?

[shortcut-name]
beltThreadUpgrader-give-belt-upgrade-tool-shortcut=Faire apparaître l'outil d'amélioration de convoyeurs
beltThreadUpgrader-give-belt-remove-tool-shortcut=Faire apparaître l'outil de suppression de convoyeurs

[item-name]
beltThreadUpgrader-upgrade-tool=Outil d'amélioration de convoyeurs
beltThreadUpgrader-remove-tool=Outil de suppression de convoyeurs

[item-description]
beltThreadUpgrader-upgrade-tool=Sélectionnez les entités de convoyeur dont vous souhaitez améliorer la série.\n[font=default-bold]Lorsque le curseur est positionné dessus :[/font]\n[font=default-bold]  •  [/font]__CONTROL__select-for-blueprint__ pour améliorer les convoyeurs du même niveau connectés au convoyeur sélectionné, délimités par des répartiteurs.\n[font=default-bold]  •  [/font]__CONTROL__select-for-cancel-deconstruct__ pour améliorer tous les convoyeurs connectés au convoyeur sélectionné, quel que soit leur niveau.\n[font=default-bold]  •  [/font]__CONTROL__reverse-select__ pour rétrograder les convoyeurs du même niveau connectés au convoyeur sélectionné, délimité par des répartiteurs.\n[font=default-bold]  •  [/font]__CONTROL__alt-reverse-select__ pour rétrograder tous les convoyeurs connectés au convoyeur sélectionné, quel que soit leur niveau.
beltThreadUpgrader-remove-tool=Sélectionnez les entités de convoyeur dont vous souhaitez supprimer la série.\n[font=default-bold]Lorsque le curseur est positionné dessus :[/font]\n[font=default-bold]  •  [/font]__CONTROL__select-for-blueprint__ pour supprimer tous les convoyeurs reliés au convoyeur sélectionné, qui deviendraient superflues suite à la suppression de ce dernier.\n[font=default-bold]  •  [/font]__CONTROL__select-for-cancel-deconstruct__ pour supprimer tous les convoyeurs connectés au convoyeur sélectionné, quel que soit leur niveau.\n[font=default-bold]  •  [/font]__CONTROL__reverse-select__ pour supprimer les entités de type tuyau connectées aux tuyaux sélectionnés, jusqu'à la première entité de type tuyau connectée à au moins 3 autres entités de type tuyau. Ne supprime pas les bâtiments de fabrication.\n[font=default-bold]  •  [/font]__CONTROL__alt-reverse-select__ pour supprimer toutes les entités de type tuyau connectées aux tuyaux sélectionnés. Ne supprime pas les bâtiments de fabrication.

