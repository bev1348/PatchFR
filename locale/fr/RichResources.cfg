[mod-setting-description]
rich-resources-multiplier=Définit le multiplicateur pour toutes les richesses en ressources.\nS'applique aux blocs nouvellement générés.
rich-resources-randomness-factor=Ajoute une variation aléatoire au multiplicateur.\nExemple : multiplicateur 2,0 : facteur 0,2 -> le résultat varie entre 1,8 et 2,2.
richresources-apply-to-existing-ores=Si activée, le mod appliquera également les modifications aux gisements de minerai déjà découverts.
richresources-reset-processed-list=En activant<->désactivant ce paramètre, vous effacez la liste des minerais traités par ce mod et vous incrémentez la génération.\n[color=red]Si l'option "Appliquer aux gisements existants" est activée, le multiplicateur sera immédiatement réappliqué à tous les gisements dès que vous activez/désactivez ce paramètre.[/color]
rich-resources-infinite-min-base=Si une ressource infinie (pétrole, etc.) possède une quantité inférieure à cette valeur, cette quantité sert de base avant la multiplication.\nPermet de garantir que les puits de pétrole épuisés puissent être remis en état avec un rendement raisonnable. Valeur par défaut : 30 000 (10 %)
rich-resources-finite-min-base=Si une ressource finie possède une quantité inférieure à cette valeur, cette quantité sert de base avant la multiplication.
richresources-tasks-per-tick=Nombre maximal de blocs à traiter par tick.\nControle la vitesse d'application des modifications. Des valeurs plus élevées permettent une exécution plus rapide, mais peuvent entraîner une baisse des performances du jeu.\nRecommandé : 10 (configuration faible), 50 (standard), 200 (hautes performances).
rich-resources-maintenance-multiplier=Définit le multiplicateur de manière à ce qu'il s'applique UNIQUEMENT aux ressources qui ont déjà été traitées par ce mod.
richresources-apply-maintenance=L'activation<->désactivation de ce paramètre applique immédiatement le "Multiplicateur de maintenance" aux ressources déjà traitées.\n[color=yellow]Les ressources non traitées sont ignorées.[/color]
richresources-enable-distance-bonus=Si activé, un multiplicateur supplémentaire est appliqué en fonction de la distance par rapport au point de départ (0,0).\nFormule : Multiplicateur final = Multiplicateur de base * (1 + (Distance/Intervalle)*Taux)
richresources-distance-interval=La distance d'intervalle (en tuiles) à prendre en compte pour le calcul. Valeur par défaut : 1000
richresources-distance-rate=Le taux de bonus ajouté par intervalle.\nExemple : 0,5 signifie une augmentation de +50 % du multiplicateur final par intervalle.

[gui]
rich-resources-applied-message=Multiplicateur appliqué aux gisements de ressources.

[message]
rich-resources-multiplier-updated=Le multiplicateur a été mis à jour à : __1__
rich-resources-stops-applying=Il ne s'applique plus aux minerais existants
rich-resources-processed-chunks-reset=Réinitialisation de la liste des blocs traités. Génération : __1__
rich-resources-queueing-maintenance=Tâche de maintenance en attente (x__1__)...
rich-resources-started-queued-task=Lancement d'une tâche en file d'attente : __1__ x__2__
rich-resources-finished-applying=L'application aux blocs existants est terminée.
rich-resources-starting-next-job=Lancement de la tâche suivante dans la file d'attente : __1__
rich-resources-job-already-running=La tâche est déjà en cours d'exécution.
rich-resources-recalculation-started=Début du recalcul des ressources existantes : __1__ blocs

