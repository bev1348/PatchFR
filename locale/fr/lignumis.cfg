[tips-and-tricks-item-description]
lignumis-briefing=[planet=lignumis] est une lune de [planet=nauvis] vers laquelle vous devez vous échapper afin d'accéder à des technologies plus avancées. Les principales ressources sont [item=wood], [item=gold-ore], [item=peat] et [item=stone]. La lune manque de fer et de cuivre, ce qui limite considérablement vos capacités, le seul métal disponible étant le [item=gold-ore], qui ne semble pas très précieux. L'électricité n'est découverte qu'après votre évasion.\n\n[img=utility/warning_icon] Lignumis a un certain impact sur le reste du jeu en modifiant les recettes et les technologies standard. Consultez les paramètres du mod pour les modifier selon vos préférences. Ou installez la version Director's Cut depuis le portail des mods pour profiter pleinement de l'expérience.
lignumis-burner-agriculture=Alimenter les tours agricoles à la fois en graines et en carburant nécessite des solutions plus complexes que pour leur équivalent électrique plus avancé. En raison d'une limitation du moteur du jeu, les bras continueront à saisir les graines tout en ignorant le carburant s'il se trouve du mauvais côté du convoyeur. Utilisez des circuits logiques ou plusieurs bras pour éviter complètement ce type de problèmes.
lignumis-noise=Les autochtones de [planet=lignumis] sont sensibles aux bruits forts [img=airborne-pollutant/noise]. Tout ce que vous créez de mécanique est potentiellement très bruyant. Construisez une petite base et ajoutez des murs pour contenir le bruit à l'intérieur.\nVoici quelques outils permettant de réduire les niveaux sonores : [img=item/wooden-wall] murs, [img=entity/tree-01] arbres, [img=item/efficiency-module] modules d'efficacité ou [item=active-noise-cancelling-tower].
lignumis-steam=Avec la [entity=steam-assembling-machine] et le [entity=steam-inserter], vous disposez de nouveaux outils pour construire des chaînes de production plus rapides et plus compactes. En l'absence de technologies plus performantes, la combustion de [item=moist-stromatolite-remnant] dans le [entity=desiccation-furnace] est votre seule source de [fluid=steam]. Équilibrez la vapeur en brûlant les restes de stromatolite humide qui débordent dans des fours classiques.\n\n[img=utility/warning_icon] La production de [fluid=steam] ne suffira pas à alimenter toute la base. Conservez les anciens systèmes thermiques dans la mesure du possible.
lignumis-escaping=Le [entity=provisional-rocket-silo] vous permet d'emporter un inventaire généreux avec vous. Emportez principalement des entités d'infrastructure pour démarrer rapidement sur Nauvis. Laissez le carburant, l'or et les packs de science derrière vous.\n\n[img=utility/warning_icon] Même s'il n'est pas obligatoire de tout rechercher avant de partir, c'est une bonne idée de le faire. Ou au moins, assurez-vous de pouvoir continuer vos recherches après votre départ.\n[img=utility/warning_icon] Votre base continue de faire du bruit lorsque vous êtes absent. De plus, vos ennemis continuent de se développer. Assurez-vous que votre base est protégée avant de partir.

