lr-gun-turret=Tourelle mitrailleuse longue portée

[entity-description]
lr-gun-turret=Une tourelle blindée dotée d'une plus grande portée, mais dont la cadence de tir et la vitesse de rotation sont réduites. Idéale pour la défense du périmètre.
lr-gun-turret-dynamic=Portée : __1__ | Portée minimale : __2__ | Points de vie : __3__ | Dégâts : __4__× | Temps de recharge : __5__ ticks\nRotation et cadence de tir lentes. Idéal pour la défense périphérique à longue portée.

[factoriopedia-description]
lr-gun-turret=Une tourelle de niveau intermédiaire conçue comme une position de tir de précision.\\n\\nAvantages :\\n• Portée 3 fois supérieure à celle des tourelles classiques\\n• Blindage renforcé offrant une résistance au feu et aux dégâts physiques\\n• Bénéficie de toutes les recherches sur les dégâts physiques des projectiles\\n• Utilise des munitions classiques\\n\\nInconvénients :\\n• Rotation lente, vulnérable aux attaques de flanc\\n• Cadence de tir lente, peut être submergée par des raids\\n• La portée minimale crée un angle mort près de la tourelle\\n\\nAstuce : associez-la à des tourelles classiques pour couvrir la zone morte. Utilisez des murs pour ralentir les ennemis et maximiser le temps d'engagement à longue portée.\\n\\nMunitions personnalisées : la recherche débloque 3 niveaux de balles infligeant des dégâts physiques élevés — parfaites pour les engagements à longue portée de cette tourelle.

