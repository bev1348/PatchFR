[name]
cr_construction_reader=La construction de plateformes nécessite des lecteurs
cr_setting_limit=Tranches
cr_ipl_starter_pack=Kit de démarrage pour plateforme comprenant des antennes IPL et un lecteur de construction de plateforme.
cr_tech=La construction de la plateforme doit être repensée

[desc]
cr_construction_reader=Ne peut être construit que sur des plateformes spatiales. Ce circuit logique se mettra à jour périodiquement afin de synchroniser sa première section logistique avec la liste des "matériaux manquants pour la construction" de la plateforme spatiale sur laquelle il est installé.
cr_setting_limit=Nombre de tranches par lesquelles le nombre total de lecteurs de construction sera réparti pour le traitement. À chaque tick, une tranche sera traitée. Augmenter ce nombre allongera le délai de mise à jour des lecteurs de construction. La valeur par défaut est de 8 tranches, ce qui signifie que, par défaut, chaque lecteur de construction sera mis à jour au moins une fois tous les 8 ticks. Une seule tranche signifie que tous les lecteurs de construction seront mis à jour à chaque tick.
cr_tech=Vous donne accès à un nouveau circuit logique qui fournit la valeur du paramètre "Demandes de construction" du noyau de la plateforme spatiale sur laquelle celui-ci est construit.

[wiki]
cr_construction_reader=Ne peut être construit que sur des plateformes spatiales. Ce combinateur se mettra à jour périodiquement afin de synchroniser sa première section logistique avec la liste des « matériaux manquants pour la construction » de la plate-forme spatiale sur laquelle il est installé. Par défaut, cette mise à jour aura lieu en moyenne au moins une fois tous les 7,5 ticks. Ce réglage peut être modifié dans les paramètres du mod.

