[tips-and-tricks-item-description]
hm-tips-title=La ruche se souvient. Ces pages se débloquent à mesure que votre fonction évolue.
hm-tips-joining=Deux boutons se trouvent en haut de l’écran : [font=default-bold]Rejoindre la Ruche[/font] et [font=default-bold]Rejeter la Ruche[/font]. Tous deux sont un choix définitif. Il faut donc deux clics pour chacun : le premier active le bouton, le second, rouge, confirme l’action.\n\nSi vous rejoignez la Ruche, le corps de votre ingénieur disparaît. Vous devenez une présence dirigeante sans inventaire personnel : tout ce que vous pouvez construire vous est fourni par la Ruche et épinglé à votre barre d'accès rapide, qui se met automatiquement à jour à mesure que la recherche débloque de nouvelles possibilités. Si vous refusez, le choix est définitivement retirée et vous redevenez un ingénieur ordinaire.\n\nLa commande /hm-help permet d'afficher à tout moment le résumé de la Ruche.
hm-tips-anchor=Lors de votre arrivée, vous recevez une [item=hm-hive] Graine de ruche, votre seule et unique graine. En la plaçant, vous déclenchez un délai de 30 secondes ; pendant ce laps de temps, vous pouvez récupérer la graine en récupérant la ruche et choisir un autre emplacement. Une fois ce délai écoulé, la ruche devient permanente : elle ne peut plus être récupérée ni déplacée, seulement détruite.\n\nSi toutes les ruches de votre réseau sont détruites, le réseau s'effondre. Les nœuds, les diffuseurs et les laboratoires disparaissent avec lui. Mais une nouvelle graine apparaît dans votre main. La ruche n'a pas de fin, le terrain que vous avez choisi, lui, en a une.
hm-tips-nests=La ruche ne vous rapporte rien en soi. Les nids sauvages situés à l’intérieur de la zone d’une ruche ou d’un nœud vous envoient un lent filet de biters. Plus il y a de nids à portée, plus ce filet est rapide. Les arrivées sont absorbées dans la réserve commune du réseau, mesurée en pollution : chaque construction et chaque pack de science sont payés à partir de cette réserve.\n\nL'affichage en haut de l'écran indique le niveau de la réserve. Passez la souris dessus pour voir combien de nids alimentent votre réseau, et à quelle vitesse.\n\nUn terrain sans nids à portée ne rapporte rien. Posez votre ruche près de nids, ou développez des [item=hm-hive-node] nœuds de ruche en leur direction.
hm-tips-workers=Le chef ne construit jamais à la main. Que vous placiez un objet ou un fantôme, le coût est prélevé sur la réserve de pollution, et un ouvrier, une petite larve frétillante, vient de la ruche ou du nœud le plus proche pour faire pousser la structure à l’endroit où elle se trouve.\n\nLes constructions sont refusées plutôt que mises en file d’attente lorsque la réserve ne peut pas les financer, ou lorsque des arbres, des rochers ou des falaises bloquent le site. La ruche ne déblaye pas le terrain.\n\nChaque objet pouvant être placé affiche son coût en pollution dans son info-bulle.
hm-tips-nodes=[item=hm-hive-node] Les nœuds de la ruche étendent la construction, le recrutement et la propagation dans une zone de 50×50, puis forment une chaîne vers l’extérieur. Chaque nouveau nœud doit simplement toucher le bord du réseau.\n\nLeur nombre est limité par l’évolution de l’ennemi : chaque nouveau nœud exige un monde plus riche, progressivement au début, puis de manière exponentielle par la suite. Une fois l’évolution dépassée 0,90, cette limite disparaît complètement. La pollution générée par les ingénieurs stimule l’évolution. Leur hâte favorise donc votre croissance.\n\nUn nœud peut devenir une [item=hm-hive] Ruche à part entière : fabriquez un [item=hm-promote-node] Nœud de promotion en vous tenant à proximité. Les ruches promues partagent l'espace de stockage du réseau et servent de nouveaux pôles de recrutement.
hm-tips-promotion=L'ancre ne bouge jamais, mais le réseau peut faire naître de nouveaux cœurs. Fabriquez un [item=hm-promote-node] Nœud de promotion en vous tenant près d'un nœud de ruche de votre réseau : le nœud devient une [item=hm-hive] Ruche à part entière au même endroit : un deuxième pôle de recrutement partageant le même espace de stockage.\n\nLa promotion coûte 1 000 points de pollution prélevés sur la réserve et est irréversible : les ruches promues sont aussi permanentes que l’ancre. Elles ne comptent pas pour la limite d’évolution : promouvoir un nœud libère en fait un emplacement de nœud.\n\nLe but est la redondance : le réseau ne s’effondre que lorsque la DERNIÈRE ruche meurt. Tant qu’une ruche promue est en place, la perte de l’ancre entraîne simplement la fusion de son espace de stockage avec celui de la ruche survivante.
hm-tips-pheromones=Fabriquer un [item=hm-pheromones] libère des phéromones et un leurre à usage unique qui apparaît à l'endroit où vous vous trouvez. Les recrues du réseau convergent vers lui, vos ruches y envoient une partie des créatures stockées, et dès qu'un nombre suffisant s'est rassemblé, elles partent en tant que groupe d'attaque autonome : c'est le moteur qui les dirige, pas vous.\n\nL'instinct est verrouillé jusqu’à ce que l’évolution ennemie atteigne 0,05. Un message vous avertit lorsqu’il s’active. Chaque joueur ne peut disposer que d’un seul appât actif à la fois : le fabriquer l’annule et le réinitialise, et un appât qui ne rassemble rien disparaît automatiquement au bout de 30 secondes.\n\nLes Biters arrivant à l’appât attaquent l’ingénieur qui s’en occupe. Placez-le là où leurs défenses sont faibles.
hm-tips-vents=Un [item=hm-pheromone-vent] diffuseur de phéromones est un leurre fixe : gratuit, pouvant être installé n'importe où, sans zone de construction requise, mais vous devez posséder une ruche, et le diffuseur cesse de fonctionner si votre réseau disparaît. Il attire vers lui les biters entrant dans le réseau, compte les arrivées et, lorsque le groupe est complet, les envoie en tant que groupe d'attaque vers la présence d'ingénieur la plus proche que le moteur puisse trouver. Aucun ingénieur à portée ? Le diffuseur conserve son stock complet jusqu’à ce qu’une guerre se déclare pour l’utiliser. Le compteur flottant au-dessus d’un diffuseur indique le stock accumulé : rouge signifie complet, c’est-à-dire que l’envoi est imminent ou en attente d’une cible.\n\nLa taille du stock correspond à la technologie "Taille du groupe d’attaque" appliquée au mode du diffuseur. Réajustez un diffuseur en fabriquant un marqueur de mode tout en vous tenant à moins de 20 tuiles de celui-ci : [item=hm-pheromone-mode-small] PEtit (0,5x, raids légers fréquents), [item=hm-pheromone-mode-default] Par défaut (1x), [item=hm-pheromone-mode-large] Grand (2x, vagues lourdes plus rares). Le diffuseur le plus proche de votre réseau adopte le nouveau mode.\n\nChaque biter qu'un diffuseur envoie au combat est un biter que la ruche n'absorbe pas. L'offensive se paie en ressources : si vous alimentez trop de diffuseurs, la réserve s'épuise.
hm-tips-rules=Le sol humain repousse la ruche : les blocs situés près des structures d’ingénieur sont inaccessibles au chef, à moins qu’un élément de la ruche (un biter, un ouvrier, un bâtiment) ne se trouve déjà à proximité. Envoyez une créature en avant pour ouvrir la voie. Tant que votre première ruche n’existe pas encore, vous pouvez explorer librement.\n\nRecherchez [technology=hm-hive-supremacy] Suprématie de la ruche et la zone infestée elle-même devient hostile : les arbres qui s'y trouvent meurent et rejettent leur pollution dans le monde, et les structures d’ingénieur qui s’y trouvent sont détruites en environ une minute.

