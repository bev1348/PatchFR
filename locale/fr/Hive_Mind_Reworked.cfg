[technology-description]
hm-hive-spawners=La ruche apprend à s'organiser. Il est désormais possible de construire des nœuds de ruche pour étendre votre portée.
hm-hive-labs=La ruche développe un système de recherche. Il est désormais possible de construire des laboratoires de ruche afin de transformer la pollution absorbée en avancées scientifiques.
hm-worms-small=La colonie peut produire des tourelles de petit ver pour défendre son territoire.
hm-worms-medium=La colonie peut produire des tourelles de ver moyen, plus résistant et avec une plus grande portée.
hm-worms-big=La colonie peut produire des tourelles de grand ver capable de contrer des menaces blindées.
hm-worms-behemoth=La ruche atteint son apogée. Des vers géants défendent le territoire de la ruche avec une force écrasante.
hm-attraction-reach=La diffusion des phéromones de la ruche a une portée plus grande. Chaque niveau élargit le rayon à partir duquel les Biters sont attirés vers la ruche.
hm-hive-supremacy=La zone infestée de la ruche devient hostile aux étrangers. Les arbres, les constructions des joueurs et toute autre entité n'appartenant pas à la ruche qui se trouvent sur cette zone se fanent et meurent. Les arbres mourants libèrent leur pollution dans le monde.
hm-pheromone-vent=La ruche apprend à diffuser son appât en dehors du réseau. Un Diffuseur de phéromones détourne vers lui les Biters qui s'approchent, les rassemble en un groupe d'attaque et les envoie à l'extérieur pour semer la terreur.
hm-attack-group-size=À chaque niveau, les groupes d'attaque envoyés par les diffuseurs de phéromones s'agrandissent. L'appétit grandit au fur et à mesure que l'essaim s'étend.

[effect-description]
hm-attraction-reach=+10 % de rayon d'attraction
hm-hive-supremacy=Tout ce qui se trouve dans une zone infestée et qui ne fait pas partie de la ruche subit des dégâts et est détruit
hm-attack-group-size=+2 Biters par diffusion de phéromones



