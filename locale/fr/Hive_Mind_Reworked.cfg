[item-description]
hm-hive=Votre point d'ancrage. Si vous activez l'option Liaison d'ancrage de ruche, vous le placez une seule fois et sa construction prend 30 secondes. Pendant ces 30 secondes, vous pouvez le démolir pour récupérer l'objet et choisir un nouvel emplacement. Une fois construit, il ne peut plus être déplacé.
hm-pheromones=Marqueur à émission de phéromones. La recette "Libérer des phéromones" permet de déclencher un appât à usage unique à votre position. Les Biters recrutés s'y rassemblent et, dès qu'ils sont suffisamment nombreux, forment un groupe d'attaque autonome que le moteur envoie au combat.
hm-promote-node=Marqueur de promotion. La recette "Promotion de nœud" permet de transformer le Nœud de ruche le plus proche situé à portée en une nouvelle ruche sur place. Cela coûte de la pollution provenant du réseau. Utilisez ceci pour déplacer le centre de gravité du réseau vers un groupe lointain.
hm-pollution=Pollution concentrée extraite des créatures capturées. Utilisée pour construire des structures de la ruche et alimenter la recherche.
hm-pollution-science-pack=Recherche sur la biomasse issue de la condensation des polluants absorbés et des organismes transformés.
hm-build-cost=Coût de la pollution pour mettre en place : __1__
hm-build-cost-free=Coût de la pollution pour mettre en place : gratuit (structure de base)
hm-build-cost-with-flavor=__1__\nCoût de la pollution pour mettre en place : __2__

