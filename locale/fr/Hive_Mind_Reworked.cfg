[gui]
hm-join-hive=Rejoindre la Ruche
hm-reject-hive=Rejeter la Ruche
hm-join-hive-confirm=Confirmer : adhérer définitivement
hm-reject-hive-confirm=Confirmer : refuser définitivement
hm-join-hive-tooltip=Abandonnez votre corps d'ingénieur et prenez les commandes de la ruche des Biters à la place. Cette décision est DÉFINITIVE : votre corps sera dissous, votre inventaire détruit, et il n'y aura pas de retour en arrière possible. Cliquez une fois pour vous préparer, puis une nouvelle fois pour valider.
hm-reject-hive-tooltip=Rejetez la ruche et continuez à jouer en tant qu'ingénieur. Décision définitive : cette offre ne se représentera plus jamais. Cliquez une fois pour activer, puis une nouvelle fois pour confirmer.
hm-pollution-tooltip=La pollution : le sang de la ruche. Les Biters absorbés la remplissent. Chaque construction et chaque pack de science la vide.\nNids répondant à l'appel du réseau : __1__ (flux ≈ __2__ Biters par minute).\nPas de nids signifie pas de ressources. Développez des nœuds vers les nids sauvages.
hm-hive-joined=Vous avez rejoint la Ruche. Votre corps n'est désormais plus qu'une présence directrice.
hm-hive-rejected=Alors vous décidez de devenir de la nourriture...

[mod-setting-name]
hm-forbidden-zone-chunk-radius=Zone interdite : rayon du bloc
hm-forbidden-zone-scout-radius=Zone interdite : rayon de l'éclaireur
hm-debug-vent=Évent de pollution de débogage
hm-debug-telemetry=Journal de télémétrie de débogage

[mod-setting-description]
hm-forbidden-zone-chunk-radius=Rayon du bloc autour des structures d'ingénierie dans lequel le chef de la ruche ne peut pas pénétrer, sauf si la ruche se trouve à proximité. Réglable en cours de partie.
hm-forbidden-zone-scout-radius=Rayon autour du chef dans lequel toute entité de la force de la ruche (biter, ouvrier, bâtiment) est considérée comme un éclaireur et ouvre la zone interdite. Réglable en cours de partie.
hm-debug-vent=Si activé, les administrateurs de la ruche peuvent déployer l'Évent de pollution de débogage, un émetteur gratuit qui rejette dans le monde l'équivalent de la pollution générée par environ 1 000 foreuses actives à chaque tick. Destiné aux tests en mode bac à sable portant sur la croissance, le recrutement et la suprématie des Biters. Désactivé par défaut. Il est recommandé de le laisser désactivé lors des parties normales.
hm-debug-telemetry=Si activé, le mod enregistre les lignes de réglage [perf] et [recruit] dans le fichier script-output/hm-debug.txt à chaque mise à jour. Désactivé par défaut. Ne l'activez que si vous effectuez des réglages sur le mod et avez besoin de ces données.

[message]
hm-tech-required=La ruche n'a pas encore acquis les connaissances nécessaires pour construire cette structure.
hm-no-hive-in-range=Aucune ruche ne se trouve à portée pour réaliser cette construction.
hm-insufficient-resources=Pollution insuffisante : __2__ / __1__ (il y en a / il en faut).
hm-insufficient-resources-generic=La pollution n'est pas suffisante pour construire ça.
hm-no-mining=La présence de la ruche empêche l'extraction.
hm-placement-obstructed=Impossible de construire à cet endroit : la ruche ne peut pas éliminer les arbres, les rochers ou les falaises.
hm-pheromone-vent-no-hive=Un diffuseur de phéromones doit être fixé à une ruche. Sinon, il s'effondre.
hm-anchor-construction-started=La ruche s'enracine dans la terre. Pendant trente secondes, le lien reste fragile : si l'emplacement ne convient pas, il faut alors retirer la ruche. Passé ce délai, le lieu et la ruche ne font plus qu'un.
hm-anchor-construction-cancelled=La ruche s'envole. La graine est de nouveau entre tes mains. Essaie un endroit plus calme.
hm-pheromones-awaken=La pollution s'intensifie. Quelque chose s'agite dans la ruche : une faim qui n'était pas là auparavant. L'instinct de chasse se réveille. La recette "Libérer des phéromones" est à votre disposition.
hm-forbidden-zone=La ruche recule. Il y a trop de silhouettes humaines ici, et aucune créature devant vous. Envoyez un Biter en éclaireur avant de les suivre.
hm-node-evolution-gated=Impossible de placer le nœud __3__ : nécessite une évolution de __1__ (actuellement __2__). Les progrès de l'ingénieur déterminent le rythme de votre expansion.
hm-promote-node-no-target=Aucun nœud de ruche dans un rayon __1__ tuiles. Placez-vous près du nœud que vous souhaitez promouvoir et réessayez.
hm-promote-node-not-in-network=Ce nœud ne fait pas partie de votre réseau.
hm-promote-node-insufficient=La pollution n'est pas suffisamment importante pour promouvoir : __2__ / __1__ (il y en a / il en faut).
hm-promote-node-no-network=Aucun réseau de ruche ne couvre cette position. La promotion nécessite un réseau sur lequel s'appuyer.
hm-promote-node-failed=Échec de la promotion : le moteur n'a pas pu placer une ruche à cet emplacement.
hm-promote-node-success=Un nœud de ruche a été promu. Le réseau compte un nouveau membre.
hm-vent-mode-no-target=Il n'y a pas de diffuseur de phéromones à moins de __1__ tuiles. Placez-vous près du diffuseur que vous souhaitez réajuster, puis réessayez.
hm-vent-mode-wrong-network=Ce diffuseur n'est pas connecté à votre réseau.
hm-vent-mode-set=Le diffuseur émet à nouveau son appel (mode __1__). Il rassemble désormais __2__ créatures avant que l'essaim ne se mette en marche.
hm-hive-silent-land=Ces lieux sont silencieux : aucun nid ne répond à l'appel de la ruche. Rien ne viendra s'y installer, et le bassin de pollution restera vide. Développez des nœuds vers des nids sauvages, sinon la ruche mourra de faim là où elle se trouve.
hm-network-collapsed=Le réseau a disparu, toutes les ruches, tous les nœuds et tous les diffuseurs ont été détruits. Pourtant, la ruche perdure : une nouvelle graine prend forme dans ta main. Choisis cette fois un sol plus fertile, là où les nids sauvages murmurent déjà.
hm-guidance-join=Votre volonté s'est fondue avec celle de la ruche. Il ne reste plus de votre corps que ce que la ruche a fait pousser pour vous, fixé là où se trouvaient autrefois vos mains. Installez la ruche dans une contrée sauvage où les nids murmurent déjà : la ruche se nourrit de leurs petits, et une terre silencieuse ne nourrit rien. /hm-help lorsque vous perdez votre chemin.
hm-guidance-first-hive=La ruche est vivante. Un faible battement, là où votre regard se pose, mesure la pollution accumulée en ce lieu — chaque action de la ruche coûte de la pollution, et seuls les Biters qu’elle absorbe la régénèrent. Envoyez des nœuds de ruche vers l’extérieur pour amplifier l’appel.
hm-guidance-first-creep=La zone infestée s'étend hors de la ruche. Elle apporte avec elle la connaissance : un Laboratoire de ruche peut désormais être développé, et ce qu'il apprend est réinjecté dans l'essaim.
hm-guidance-first-lab=Le laboratoire s'ouvre. La ruche le nourrira d'elle-même avec les créatures qu'elle a stockées. Les packs de science sur la pollution se forment sans qu'on ait besoin de les créer. Choisissez ce que vous voulez savoir ensuite.
hm-guidance-first-research=La connaissance afflue. De nouveaux bâtiments apparaissent dans votre inventaire en un clin d'œil.
hm-help-header=── ce dont la ruche se souvient ──
hm-help-flow=Rejoignez la ruche · installez la ruche · laissez les Biters s'y glisser · développez des nœuds et des laboratoires · apprenez · grandissez.
hm-help-pollution=La pollution est le sang de la ruche. Les créatures absorbées remplissent le réservoir, chaque construction l'épuise. Le chiffre affiché en haut de l'écran correspond au solde actuel. Passez la souris dessus pour voir le flux.
hm-help-nests=L'appel de la ruche ne parvient qu'aux êtres vivants qui se trouvent à proximité. Les nids sauvages situés à l'intérieur d'une ruche ou d'un nœud alimentent le flux de recrues : plus il y a de nids, plus le sang afflue rapidement. Un terrain dépourvu de nids ne produit rien.
hm-help-workers=Chaque structure est construite par un ouvrier, une larve qui part de la ruche ou du nœud le plus proche et se rend sur le chantier. Veillez à ce que les constructions restent à portée du réseau, sinon elles ne seront jamais achevées.
hm-help-pheromones=La recette "Libérer des phéromones" dépose un leurre à usage unique à l'endroit où vous vous trouvez. Les recrues affluent. Dès qu'elles sont suffisamment nombreuses, elles forment un groupe d'attaque et le moteur les emmène plus loin.
hm-help-vents=Les Diffuseurs de phéromones remplissent la même fonction sans que vous ayez besoin d'être présent : ils sont gratuits, peuvent être placés n’importe où et disparaissent en même temps que votre réseau. Le compteur situé au-dessus de chaque diffuseur indique le lot en cours de collecte (rouge = envoi imminent). Fabriquez un marqueur de mode "Petit", "Par défaut" ou "Grand" à moins de 20 tuiles d’un Diffuseurs pour ajuster la taille de l’envoi.
hm-help-promote=La recette "Promotion de nœud" transforme un nœud de ruche de votre réseau en une deuxième Ruche. Cela a un coût en pollution. Utilisez-la pour déplacer le centre de gravité du réseau vers un groupe distant.
hm-help-anchor=Votre objet Ruche est limité à un par joueur et sa liaison prend trente secondes. Pendant ce laps de temps, il est toujours possible d'enlever la ruche et de récupérer la graine. Passé ce délai, cela n'est plus possible. Si vous perdez toutes les ruches du réseau, une nouvelle graine apparaîtra dans votre main.
hm-help-evolution=Chaque nouveau nœud de ruche nécessite une évolution ennemie plus poussée pour s'implanter : progressivement au début, puis de manière exponentielle par la suite. Une fois l'évolution dépassée 0,90, la barrière disparaît complètement. La pollution générée par les ingénieurs alimente cette évolution ; votre expansion évolue donc au rythme de leurs progrès.
hm-help-forbidden=Le sol humain repousse la ruche. Les blocs situés à proximité des structures d'ingénierie vous sont interdits, à moins qu'un élément de la ruche ne se trouve déjà à vos côtés — un biter, un ouvrier ou un bâtiment. Envoyez une créature en avant pour ouvrir la voie.
hm-help-supremacy=La recherche "Domination de la ruche" rend la zone infestée hostile aux étrangers. Les arbres qui s'y trouvent meurent et rejettent leur pollution.

