[item-description]
hm-hive=Votre graine unique, à placer librement, permanente une fois arrivée à maturité. Son placement déclenche un délai de 30 secondes. Pendant ce laps de temps, exploitez la ruche pour récupérer la graine. Passé ce délai, l’emplacement et la ruche ne font plus qu’un. Posez-la dans une zone sauvage où les nids abondent. La ruche se nourrit de leurs petits, et un sol désert ne nourrit rien. Si toutes les ruches de votre réseau tombent, une nouvelle graine apparaît dans votre main.
hm-pheromones=Marqueur à émission de phéromones. La recette "Libérer des phéromones" permet de déclencher un appât à usage unique à votre position. Les Biters recrutés s'y rassemblent et, dès qu'ils sont suffisamment nombreux, forment un groupe d'attaque autonome que le moteur envoie au combat.
hm-promote-node=Marqueur de promotion. La recette "Promotion de nœud" permet de transformer le Nœud de ruche le plus proche situé à portée en une nouvelle ruche sur place. Cela coûte de la pollution provenant du réseau. Utilisez ceci pour déplacer le centre de gravité du réseau vers un groupe lointain.
hm-pheromone-mode-small=Marqueur de mode. Sa fabrication permet de réinitialiser le Diffuseur de phéromones le plus proche de votre réseau en mode "Petit" : des groupes d'attaque deux fois plus petits, déployés plus fréquemment.
hm-pheromone-mode-default=Marqueur de mode. Sa fabrication permet de réinitialiser le Diffuseur de phéromones le plus proche de votre réseau en mode "Par défaut" : des groupes d'attaque de taille standard.
hm-pheromone-mode-large=Marqueur de mode. Sa fabrication permet de réinitialiser le Diffuseur de phéromones le plus proche de votre réseau en mode "Grand" : des groupes d'attaque deux fois plus grands, plus lents à se rassembler.
hm-creature=Une créature absorbée dans les réserves de la ruche. Elle servira de ressource pour la construction et la recherche, ou ressortira vivante lorsque les phéromones l'appelleront ou que la ruche s'effondrera.
hm-pollution=Pollution concentrée extraite des créatures capturées. Utilisée pour construire des structures de la ruche et alimenter la recherche.
hm-pollution-science-pack=Recherche sur la biomasse issue de la condensation des polluants absorbés et des organismes transformés.
hm-build-cost=Coût de la pollution pour mettre en place : __1__
hm-build-cost-free=Coût de la pollution pour mettre en place : gratuit (structure de base)
hm-build-cost-with-flavor=__1__\nCoût de la pollution pour mettre en place : __2__

