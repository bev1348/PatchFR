[entity-description]
hm-hive=Le cœur de l'esprit de la ruche. Il héberge les créatures, envoie les travailleurs et consolide votre présence. Un seul peut exister par joueur.
hm-hive-node=Élargit la portée de la construction et de la logistique de la ruche. Construit par les travailleurs de la ruche. Nécessite la recherche "Nids de la ruche".
hm-hive-lab=Un nœud de recherche alimenté directement par la pollution de la ruche. Il consomme des packs de science de pollution pour faire progresser les connaissances de la ruche.
hm-hive-worker=Une unité de ruche au sol. Elle se déplace depuis la ruche la plus proche jusqu'à un fantôme en attente et le matérialise à son arrivée, laissant un cadavre sur le site de construction.
hm-hive-storage=Le lieu où sont conservées les créatures de la ruche. Les Biters absorbés y sont conservés et utilisés pour la construction et la recherche.
hm-pollution-generator=DÉBUG : Rejette en permanence des émissions polluantes équivalentes à celles de 1000 foreuses de charbon en activité.
hm-pheromone-vent=Détourne le flux de biters entrants dans le réseau et envoie les biters rassemblés sous la forme d'un groupe d'attaque autonome. La ruche ne désigne pas de cible : c'est le moteur qui guide le groupe. Peut être construite n'importe où. Le joueur qui la place doit posséder une ruche.
hm-spawner-ghost=Un site de construction. La ruche abritera bientôt ici un nouveau nid de mordeurs.
hm-spitter-spawner-ghost=Un site de construction. La ruche abritera bientôt ici un nouveau nid de cracheurs.
hm-small-worm-ghost=Un site de construction. La ruche abritera bientôt ici un petit ver.
hm-medium-worm-ghost=Un site de construction. La ruche abritera bientôt ici un ver moyen.
hm-big-worm-ghost=Un site de construction. La ruche abritera bientôt ici un grand ver.
hm-behemoth-worm-ghost=Un site de construction. La ruche abritera bientôt ici un énorme ver.

