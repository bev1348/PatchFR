rf-balance=Niveau d'équilibre
rf-efficiency=Efficacité du recyclage
rf-intermediates=Contrôle du recyclage des produits intermédiaires
rf-modules=Modules supplémentaires autorisés
rf-revert-modules=Annule la limitation du nombre d'emplacements pour les modules
