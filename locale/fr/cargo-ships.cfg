[entity-description]
boat=Bateau petit et rapide avec peu d'espace d'inventaire. Peut être placé sur les voies navigables ou comme véhicule indépendant.
cargo_ship=Grand bateau de marchandises capable de transporter une grande quantité de ressources.
oil_tanker=Grand bateau-citerne capable de transporter de grandes quantités de fluides.
pump=Peut également être placé sur l'eau pour le chargement et le déchargement des pétroliers.
port=Destinations des bateaux automatisés.
buoy=Divise le réseau de voies navigables en sections, ce qui permet à plusieurs navires de circuler sur le même réseau.
chain_buoy=Lit les signaux suivants sur le chemin pour permettre un meilleur contrôle des bateaux.
bridge__base=Pont ferroviaire automatisé, qui s'ouvre pour laisser passer les navires en dessous. Placé en bordure d'un tronçon rectiligne existant de voie navigable.
ship-loading-pump=Pompe équipée d'un long bras en sortie permettant de charger des bateaux-citernes. Le côté long se connecte uniquement aux bateaux, tandis que le côté court se connecte uniquement aux tuyaux et aux trains. Peut être placée sur l'eau.
ship-unloading-pump=Pompe équipée d'un long bras en entrée permettant de décharger des bateaux-citernes. Le côté long se connecte uniquement aux bateaux, tandis que le côté court se connecte uniquement aux tuyaux et aux trains. Peut être placée sur l'eau.

[item-name]
waterway=Voie navigable

[item-description]
waterway=Un chemin au-dessus de l'eau que les navires peuvent suivre.

[technology-name]
cargo_ships=Bateaux de marchandises
water_transport=Transport par bateaux
automated_water_transport=Transport maritime automatisé
tank_ship=Bateau-citerne
automated_bridges=Ponts ferroviaires

[technology-description]
cargo_ships=Transport à grande échelle par voie maritime.
water_transport=Permet de traverser des plans d'eau.
automated_water_transport=Permet de créer des voies navigables, qui sont obtenues en utilisant le bouton de raccourci ou avec __CONTROL__give-waterway__. Des ports peuvent être construits sur les voies navigables afin de mettre en place des routes maritimes automatisées.
tank_ship=Possibilité de transporter des fluides sur l'eau. Les bateaux-citernes sont remplis et vidés par des pompes.
automated_bridges=Permet la création de ponts qui permettent aux voies ferroviaires et navigables de se croiser.

[mod-setting-name]
fuel_modifier=Capacité en carburant du navire
speed_modifier=Vitesse de déplacement du navire
waterway_reach_increase=Augmentation de la portée quand vous manipulez des constructions en haute mer.
use_dark_blue_waterways=Voies navigables plus sombres
tanker_capacity=Capacité des bateaux-citernes x1000
cargo_ship_capacity=Capacité des bateaux de marchandises
no_catching_fish=Désactiver la pêche avec des bras
prevent_waterway_rail_connections=Empêcher les connexions entre les voies navigables et d'autres types de rail

[mod-setting-description]
fuel_modifier=La capacité standard en carburant des navires est multipliée par cette valeur.
waterway_reach_increase=Augmentation de la portée des joueurs lors de la manpulation des voies navigables, bouées, ports, etc. Permet de placer et de déconstruire les voies navigables de loin. Réglez sur '0' pour désactiver l'augmentation de la portée.
use_dark_blue_waterways=Modifie les voies navigables pour qu'elles soient plus foncées et donc plus visibles. (Actuellement, seules les anciennes voies navigables sont concernées)
speed_modifier=Multipliez la vitesse de déplacement des navires et des bateaux par cette valeur. Attention : Les navires rapides ont l'air stupide.
tanker_capacity=Capacité de stockage du bateau-citerne, par 1000 unités de fluide.
cargo_ship_capacity=Capacité des bateaux de marchandises, par piles.
no_catching_fish=Empêche les bras de capturer des poissons s'ils sont placés au bord de l'eau.
prevent_waterway_rail_connections=Si activé, vous ne pourrez pas connecter une voie navigable avec un autre type de rail.

[cargo-ship-message]
error-place-on-water=Erreur : __1__ ne peut être placé que sur l'eau.
error-connect-rails=Erreur : Impossible de connecter __1__ à __2__.
place-on-waterway=Placement de __1__ sur une voie navigable.
place-independent=Placement de __1__ comme pouvant être conduits librement.
error-place-on-waterway=Erreur : Impossible de placer __1__ sur une voie navigable.
error-unlinked-engine=Erreur : Suppression de __1__ trouvé sans vaisseau lié.
error-train-on-waterway=Erreur : __1__ ne peut pas être placé sur une voie navigable !
error-ship-no-space=Erreur : __1__ doit être placé sur une voie navigable droite avec un espace suffisant de tous les côtés !
error-canceled=Erreur : Impossible de placer __1__ ici, l'objet a été détruit.
error-bridge-busy=Erreur : Avant de supprimer la pont-bascule, assurez-vous qu'aucun train ou navire ne le traverse actuellement.
migration-11-warning=[color=yellow] AVERTISSEMENT >>> Échec de la migration des navires de marchandises <<< AVERTISSEMENT[/color]\nVous avez chargé une carte provenant de Factorio 1.1 ou d'une version antérieure. Veuillez charger et enregistrer cette carte dans Factorio 2.0 avant de passer à la version 2.1.\nTéléchargez le fichier ZIP pour la version 2.0.77 de Factorio sur factorio.com afin d’éviter toute incompatibilité avec votre installation Steam.
