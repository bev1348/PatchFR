[tips-and-tricks-item-name]
cargo-ships=Bateau de marchandises

[tips-and-tricks-item-description]
cargo-ships=Les navires sont placés sur des [entity=straight-waterway]. Les voies navigables sont obtenues en cliquant sur le bouton Voie navigable dans la barre de raccourcis ou en appuyant sur __CONTROL__give-waterway__.\nLe [item=boat] peut être placé sur des voies navigables ou indépendamment, de sorte qu'il peut être conduit comme une voiture.\n\nChaque bateau-citerne peut être peut être raccordé à un maximum de six [entity=ship-loading-pump] ou [entity=ship-unloading-pump].

