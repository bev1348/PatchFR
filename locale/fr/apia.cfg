[space-location-description]
apia=L'une des planètes d'un système planétaire binaire dotée d'une atmosphère dense et visqueuse. Sa surface est constituée de nombreuses petites îles dérivant dans des océans de gelée royale riche en nutriments, produite par les abeilles locales. La faune est constituée d'une symbiose entre des insectes producteurs de miel et des larves d'invertébrés.
carnova=La planète la plus massive de ce système planétaire binaire, dotée d'une atmosphère riche en oxygène. Elle est recouverte d'un océan de liquide dont la composition s'apparente à celle du sang. Sa surface est parsemée de nombreuses îles de chair, d'où émergent des dépôts minéraux osseux. La faune est constituée de poissons prédateurs qui peuplent ces mers.
apia-carnova-orbit=Le centre de rotation du système planétaire binaire.

