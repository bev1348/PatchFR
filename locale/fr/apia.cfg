phosphorus=Utilisation du phosphore dans les procédés chimiques.
phosphate-battery=Utilisation de l'acide phosphorique dans la fabrication des batteries.
apiculture=Les ruches sauvages présentes sur la planète peuvent être une source de miel et de cire.
honey-processing=Le miel peut devenir une source d'eau et d'énergie pour l'usine.
wax-processing=La capacité thermique de la cire et ses propriétés chimiques la rendent extrêmement utile dans ces conditions planétaires.
artificial-hive=Automatiser la production de rayons de miel pour développer l'usine.
apicultural-science-pack=Un pas de plus vers l'excellence.
bio-solar-panel=Adopter la technologie de la photosynthèse pour la production d'énergie.
bioreactor=Synthèse chimique d'énergie à partir de nutriments.
phosphorus-shell=Ce n'est pas un crime de guerre s'ils mordent.
bones-processing=Les os constituent une source très riche en calcite, en minéraux et en pierres.
refreshment=Si vous en avez assez de voir de la pourriture partout, voici peut-être la solution.

