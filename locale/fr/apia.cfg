[tips-and-tricks-item-description]
apia-briefing=[planet=apia] est l'une des planètes du système planétaire binaire [planet=apia]-[planet=carnova] dotée d'une atmosphère dense, où les [entity=logistic-robot] et les [entity=construction-robot] nécessitent des coûts plus élevés. En raison de la densité de nuages, les [entity=solar-panel] sont moins efficaces.\nToute la surface est recouverte de mers de [fluid=royal-jelly], habitées par des [entity=larvae]. Les restes durcis de ces créatures peuvent devenir une source de ressources de base : [item=iron-ore], [item=copper-ore], et [item=stone].\nLes autres habitants de la planète sont des insectes producteurs de miel qui construisent des [entity=wild-hive]. Les [item=honeycombs] qu'ils produisent peuvent être transformés en [item=honey] et en [item=wax].\nUne nouvelle ressource importante de la planète est le [item=phosphorus] et l'[fluid=phosphoric-acid].
carnova-briefing=[planet=carnova] est l'une des planètes du système planétaire binaire [planet=apia]-[planet=carnova]. Sa surface est recouverte d'océans de [fluid=blood], où des frayères de la faune locale (les [entity=piranha]) apparaissent souvent.\nLa principale source de ressources de base provient des [item=bones], composés de minéraux et de calcium. À partir de ceux-ci, on peut obtenir des ressources de base : [item=iron-ore], [item=copper-ore], [item=stone], [item=phosphorus], et [item=calcite].\nLa surface est constituée de nombreuses îles de [item=flesh], qui peuvent être transformées pour obtenir des [item=proteins] et des [item=lipids]. Une autre source industrielle d'acide sera l'[fluid=phosphoric-acid].


