module-inserter-ex-destroy=Détruire l'inséreur de module
module-inserter-ex-keep-open=Garder ouvert
module-inserter-ex-delete-module-set=Supprimer cet ensemble de modules
module-inserter-ex-add-module-set=Ajouter un ensemble de modules alternatif\nCela peut être utilisé pour fournir un ensemble de modules alternatif à utiliser, au cas où le premier ensemble serait invalide (par exemple, parce qu'il contient des modules de productivité et que la recette actuelle n'autorise pas la productivité).\nLors de l'insertion, les ensembles seront testés de haut en bas, et le premier ensemble valide sera utilisé.
module-inserter-ex-already-configured-in-this-row=__1__ est déjà configuré sur cette ligne
module-inserter-ex-already-configured-in-another-row=__1__ est déjà configuré sur la ligne __2__
module-inserter-ex-config-frame-title=Configuration du module
module-inserter-ex-module-configuration-tooltip=Chaque ligne définit une correspondance entre les machines et/ou les recettes et une spécification de module utilisée pour déterminer quels modules sont utilisés pour remplir quelles machines.
module-inserter-ex-target-entities=Conditions cibles
module-inserter-ex-target-entities-tooltip=Détermine quelles machines utiliseront la spécification du module associée.\nLes lignes sont vérifiées dans l'ordre, de haut en bas, et la première ligne correspondante est utilisée. Si aucune ligne ne correspond et que la case "modules par défaut" est cochée, cette ligne sera utilisée. Sinon, les modules existants dans la machine resteront inchangés.\nPour qu'une ligne corresponde, toutes les conditions spécifiées doivent être remplies (les types de conditions non définis sont ignorés). Par exemple, si les machines et les recettes sont toutes deux définies, seules les machines configurées pour l'une de ces recettes correspondront, tandis que si seules les machines sont définies, toutes ces machines correspondront, quelle que soit la recette pour laquelle elles sont configurées.
module-inserter-ex-module-specification=Spécifications de module
module-inserter-ex-module-specification-tooltip=Modules à insérer\nDéfini les modules à insérer dans les cibles associées (à gauche)\nLes emplacements vides supprimeront tout module actuellement présent dans cet emplacement\nSi une machine dispose de moins d'emplacements pour modules, elle utilisera les premiers modules jusqu'à atteindre le nombre d'emplacements pour modules et ignorera les autres.\nPeut également définir des ensembles de modules alternatifs, au cas où le premier ne serait pas toujours applicable (par exemple, s'il comporte des modules de productivité)
module-inserter-ex-default-modules=Modules par défaut
module-inserter-ex-default-modules-tooltip=Si activé, remplira toutes les machines non spécifiées ci-dessous avec les modules présents ici.
module-inserter-ex-move-config-row-up-tooltip=Déplacer cette ligne vers le haut\n[font=default-semibold][color=#84CDEC]Maj + Clic gauche[/color][/font] pour la déplacer tout en haut
module-inserter-ex-move-config-row-down-tooltip=Déplacer cette ligne vers le bas\n[font=default-semibold][color=#84CDEC]Maj + Clic gauche[/color][/font] pour la déplacer tout en bas
module-inserter-ex-add-preset=Ajouter un préréglage
module-inserter-ex-add-preset-tooltip=Créer un nouveau préréglage.\nMaintenez la touche [font=default-semibold][color=#84CDEC]Maj[/color][/font] enfoncée pour copier le préréglage actuel.
module-inserter-ex-move-preset-up-tooltip=Déplacer le préréglage vers le haut\n[font=default-semibold][color=#84CDEC]Maj + Clic gauche[/color][/font] pour le déplacer tout en haut
module-inserter-ex-move-preset-down-tooltip=Déplacer le préréglage vers le bas\n[font=default-semibold][color=#84CDEC]Maj + Clic gauche[/color][/font] pour le déplacer tout en bas
module-inserter-ex-target-config-slots=Emplacements :
module-inserter-ex-show-full-target-config=Afficher toutes les options de configuration de la cible
module-inserter-ex-total-module-effects-tooltip=Effets totaux du module

