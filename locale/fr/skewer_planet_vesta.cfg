[technology-description]
dt-fuel=Combinaison de deutérium et de tritium servant de catalyseur à de multiples réactions utilisant du plasma.
hot-lithium-production=La chaleur, en tant que catalyseur, provoque une réaction dans le lithium qui permet d'extraire le tritium.
tritium-production=Le tritium est un produit essentiel pour les procédés utilisant du plasma.
hot-heavy-water-production=Le chauffage de l'eau lourde et du sulfure d'hydrogène permet d'extraire facilement le deutérium.
deuterium-production=Le deutérium est un produit essentiel pour les procédés utilisant du plasma.
s1_cluster_processing=Des traces de fer et de cuivre ont été découvertes sous forme de dépôts calcifiés sur des roches situées à proximité. Il semble qu'une espèce d'algue vivant sur ces roches y dépose des métaux communs sous forme cristallisée.
s1_ammonia_chilled_plate=Lorsque l'acier et le fer sont chauffés ensemble puis refroidis rapidement, ils forment un alliage capable de résister à des températures extrêmes.
s1_brine=La transformation de l'eau en saumure est une étape importante dans la production de tritium gazeux. Hum, n'ai-je pas déjà vu ce procédé quelque part ?
s1_exotic_algae=On peut découvrir d'autres recettes à base d'algues exotiques.
s1_iridium_plate=La plaque d'iridium résiste aux températures extrêmes qui se produisent lors du processus de magnétisation.
s1_nutrients_from_co2=Le dioxyde de carbone semble offrir l'environnement le plus propice aux micro-organismes de Vesta.
s1_vestan_char=Le carbone peut être davantage chauffé et transformé en un matériau plus facilement inflammable.
s1_sandceramicmesh=Parfois, pour voir grand… il faut commencer petit. Vraiment tout petit, même.
fusion-missile=Les alliages magnétiques permettent de contenir un plasma instable à la fois puissant et expansif. Ces fusées infligent des dégâts importants et ont une portée étendue.
ske_fusion_thruster=Nos propulseurs peuvent être encore améliorés et perfectionnés. Ils exploitent désormais la puissance du plasma pour propulser nos plateformes plus loin et plus vite que jamais, grâce à une source d'énergie plus efficace.
ske_fusion-thruster=Nos propulseurs peuvent être encore améliorés et perfectionnés. Ils exploitent désormais la puissance du plasma pour propulser nos plateformes plus loin et plus vite que jamais, grâce à une source d'énergie plus efficace.
s2_transport-belt-capacity-vesta=Capacité du convoyeur de Vesta
s2_worker-robots-storage-vesta=Volume de chargement du robot ouvrier de Vesta
transport-belt-capacity-vesta=Capacité du convoyeur de Vesta de Vesta
worker-robots-storage-vesta=Volume de chargement du robot ouvrier
s1_dueterium=La production de combustibles de fusion plus avancés peut être réalisée en exploitant les éléments présents dans l'atmosphère de Vesta. En décomposant divers composés, ceux-ci peuvent être remodelés et transformés en isotopes d'hydrogène purs. Le deutérium et le tritium sont, curieusement, nécessaires à la production d'iridium.
s1_iridium=Les plaques en iridium sont suffisamment solides et résistantes à la chaleur pour offrir aux algues un environnement chaud propice à leur croissance, sans que celles-ci ne périssent à cause de la chaleur.
s1_algea_discovery=Les différents gaz présents dans l'atmosphère de Vesta abritent également de nombreuses espèces microbiennes. Des traces de ces microbes peuvent être extraites des gaz et, grâce à une culture minutieuse, peuvent constituer notre seul moyen d'obtenir des ressources, notamment du fer et du cuivre.
s1_algea_extracting=Les algues de Vesta sont incroyablement puissantes et très évoluées. Si on leur apporte certains gaz et de la chaleur, elles modifient leur composition et produisent des composés métalliques similaires aux bactéries de Gléba. Ces composés métalliques peuvent ensuite être traités par combustion pour produire diverses ressources métalliques.
s1_gas_manipulation_science_pack=Recherches sur diverses améliorations technologiques liées aux gaz
s2_fusion_enhancements=Poursuivre le développement de nos découvertes révolutionnaires en matière d'énergie de fusion.
planet-discovery-vesta=Explorer Vesta, une planète géante principalement gazeuse. Il semblerait qu'il y ait des formations rocheuses emprisonnées dans son champ gazeux. Cette zone gazeuse est un mélange de nombreux gaz simples, notamment de l'hydrogène, de l'azote, du dioxyde de carbone et de l'hélium. Il semblerait qu'il y ait des traces de diverses impuretés à l'intérieur du champ gazeux, qui peuvent être filtrées.
s1_algea_filtering=Les filtres permettent de retenir facilement les concentrations d'algues qui se sont développées dans nos réserves d'eau. Cependant, tous les filtres ne conviennent pas : ils doivent être spécialement conçus pour séparer les algues sans causer de dégâts à leur structure.
s1_algea_filtering_2=Les filtres peuvent être nettoyés, ce qui nous permet de récupérer le filtre ainsi que quelques algues en prime.
s1_algea_oversaturation=Une alimentation excessive des algues autochtones de Vesta les rend extrêmement nutritives. Elles peuvent servir de substitut local aux nutriments et ne pourissent pas avec le temps !
s1_algea_culturing=Les différents gaz présents dans l'atmosphère de Vesta abritent également de nombreuses espèces microbiennes. Des traces de ces microbes peuvent être extraites des gaz et, grâce à une culture minutieuse, peuvent constituer notre seul moyen d'obtenir des ressources, notamment du fer et du cuivre.
s1_algea_treatment=Les algues de Vesta sont incroyablement puissantes et très évoluées. Si on leur apporte certains gaz et de la chaleur, elles modifient leur composition et produisent des composés métalliques similaires aux bactéries de Gléba. Ces composés métalliques peuvent ensuite être traités par combustion pour produire diverses ressources métalliques.
s1_electrolysis=Parfois, ce n'est pas la chaleur qui résout nos problèmes, mais l'électricité. En appliquant une forte tension à différentes formes de matière, nous pouvons en modifier la composition. Certaines espèces d'algues peuvent réagir de manière inattendue lorsqu'elles sont soumises à un courant électrique.
s1_supermagnet=L'utilisation de courants électriques élevés dans un tore permet de créer des champs d'énergie magnétique intense. Ces champs peuvent servir à agiter et dynamiser diverses ressources afin de les activer. Certaines algues peuvent réagir à ces énergies d'une manière différente de celle attendue.
s1_t2d2=La production de combustibles de fusion plus perfectionnés peut être réalisée en exploitant les éléments présents dans l'atmosphère de Vesta. En décomposant divers composés, ceux-ci peuvent être remodelés et transformés en substances pures, susceptibles de faire progresser encore davantage nos avancées en matière d'énergie de fusion.
s2_fusion_robots=Étant donné que nous disposons désormais de technologies de pointe en matière de production d'énergie, il est tout à fait logique que nous modernisions nos capacités logistiques et robotiques en utilisant ces mêmes technologies. Ces robots seront alimentés par l'énergie de fusion basée sur la technologie DT et n'auront jamais besoin d'être rechargés, ce qui leur permettra de fonctionner en continu.
s2_plasma_pipes=Jusqu'à présent, il était impossible de déplacer ou de manipuler le plasma issu des réactions de fusion. En fabriquant des bobines de cuivre autour d'une structure tubulaire renforcée et en revêtant l'intérieur d'alliages de prométhium solides et résistants à la chaleur, nous pouvons désormais déplacer le plasma à notre guise. Cependant, en raison de la nature de l'élément que nous manipulons, ces tuyaux ne peuvent pas être placés sous le sol.
s2_plateworkings=L'hydrogène et l'oxygène constituent d'excellents catalyseurs pour la fusion de nos minerais. Nous pouvons augmenter le rendement de nos métaux de base, comme le cuivre et le fer, en utilisant l'un de ces deux gaz lors de la combustion. L'hydrogène offre un meilleur rendement, mais à une vitesse de traitement légèrement plus lente, tandis que l'oxygène permet un traitement extrêmement rapide.
s2_intermediate_productivity=Augmente la production des objets les plus couramment fabriqués.
s1_algea_rare_metals=Les métaux rares sont indispensables à la fabrication de processeurs et d'autres objets, mais il n'existe aucune source de métaux rares sur Vesta. Nous pouvons cultiver une espèce d'algue capable de calcifier ces métaux pour nous.
ske_heating_conductor=La chaleur est parfois le seul catalyseur capable de modifier la structure moléculaire. Le conducteur thermique peut accueillir divers fluides ou objets et les exposer à une chaleur intense afin de créer un nouveau matériau.
hydrogen-sulfide=Le sulfure d'hydrogène est une ressource indispensable à la production de gaz deutérium. Si nous parvenons à le produire en dehors de Vesta, la fabrication de Robots à fusion directement sur d'autres planètes deviendra moins un rêve et davantage une réalité.
ske_carbon_dioxide_offworld=La production de Dioxyde de carbone devrait être une tâche simple consistant à chauffer une source de carbone à des températures extrêmes et à la combiner avec une source d'oxygène, telle que l'eau.
carbon-dioxide=La production de Dioxyde de carbone devrait être une tâche simple consistant à chauffer une source de carbone à des températures extrêmes et à la combiner avec une source d'oxygène, telle que l'eau.
ske_working_with_gases=Les gaz constituent la majeure partie des ressources de Vesta. Nous pouvons extraire les gaz de la mer de nuages à l'aide de pompes côtières.
ske_gas_giant_platform=S'étendre sur la mer de nuages n'est pas aussi difficile qu'on pourrait le croire. La mer est suffisamment dense pour supporter même les fondations les plus lourdes, ce qui nous permet de nous étendre facilement.

