[mod-setting-description]
ske_fusion_thruster_og=Ce paramètre rétablit les performances du Propulseur à fusion à leur niveau d'avant les restrictions apportées par la mise à jour 2.0.31, ce qui se traduit par une poussée incroyable. Déplacez vos vaisseaux extrêmement rapidement et en toute sécurité en l'associant à des Missiles à fusion.
ske_realistic_gases=Remplace les gaz colorés par des variantes plus couramment acceptées.
ske_vesta_gases=Si désactivé, Vesta utilise les gaz partagés. Si ce mod présente des incompatibilités avec d'autres mods concernant les fluides, activez cette option pour que les différents gaz liés à Vesta soient indépendants. Cela entraînera toutefois des doublons.
ske_disable_metal_and_stars_bots=Désactivée par défaut. Si vous jouez avec Metal and Stars et que vous préférez ne pas obtenir de robots antimatière provenant de Metal and Stars, activez cette option.
ske_vesta_original_generation=Si activée, Vesta conservera sa configuration d'origine. De vastes plateformes rocheuses qui ont été capturées par son champ d'influence viendront orner la surface de la géante gazeuse. Idéal pour une partie décontractée. Si cette option est désactivée, Vesta deviendra une géante gazeuse réaliste, avec uniquement la Plateforme pour géante gazeuse comme zone d'arrivée et aucune autre masse terrestre. Idéal pour ceux qui souhaitent se lancer un défi.
ske_vesta_legacy_recipes=Rétablit les recettes et la chaîne des technologies originales de la version 1.0. La version actuelle de Vesta comporte davantage d'étapes intermédiaires et inclut des bâtiments pouvant être réservés à un usage exclusif sur la planète. Les nouveaux contenus destinés à la planète seront généralement regroupés ici. Si vous préférez une expérience beaucoup plus simple et fluide, veuillez désactiver cette option.
ske_easy_fluids=Si activé, la plupart des recettes sur Vesta nécessiteront beaucoup moins de gaz. Cette option n'a aucun effet en mode Complexe.

