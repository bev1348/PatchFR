[mod-name]
muluna-utility-constants=Constantes de service pour Muluna

[mod-description]
muluna-utility-constants=Modifie certaines constantes utilitaires essentielles au moteur de Factorio afin de mieux s'adapter à l'utilisation que fait Muluna de recettes à haut débit. Cela peut entraîner des effets indésirables. C'est pourquoi chaque valeur concernée est configurable.

[mod-setting-name]
utility-constant-max-fluid-flow-multiplier=Multiplicateur de débit pour fluides maximum

[mod-setting-description]
utility-constant-max-fluid-flow-multiplier=Ajuste le débit maximal des fluides des machines par rapport à la valeur standard de 100/tick. Réduisez cette valeur si vous constatez une répartition inégale des fluides.

