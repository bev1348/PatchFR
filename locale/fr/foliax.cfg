foliax-spoilage=Crée une installation d'élimination pour les graines qui pourrissent en cours de rotation du bras, afin que la tour puisse les récupérer et les acheminer vers la sortie.
foliax-fulgora-route=Liaison spatiale entre Foliax et Fulgora.
foliax-edge-route=Liaison spatiale entre Foliax et le bord du système solaire
foliax-promethium=Mettre en place la chaîne technologique et de fabrication des blocs d'astéroïdes de prométhium, en utilisant la plupart des ressources de Foliax et des astéroïdes.

[item-description]
iron-plant-biomass=Les gousses d'Arbor Ferréa contiennent des concentrations élevées de fer.
copper-plant-biomass=Les gousses d'Arbor Cupréa contiennent des concentrations élevées de cuivre.
bitumen-plant-biomass=Les coraux d'Arbor Pétroléi contiennent des concentrations élevées de bitume.
uranium-plant-biomass=Les barbes d'Arbor Potentium contiennent des concentrations élevées d'uranium.
calcite-plant-biomass=L'écorce d'Arbor Marmorea contient des concentrations élevées de calcite.
tungsten-plant-biomass=L'écorce d'Arbor Durissima contient des concentrations élevées de tungstène.
obsidian-plant-biomass=Les coraux d'Arbor Ignéus contiennent des concentrations élevées d'obsidienne.
holmium-plant-biomass=Les barbes d'Arbor Fulminis contiennent des concentrations élevées d'holmium.
