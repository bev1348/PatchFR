[technology-description]
planet-discovery-foliax=Une planète verdoyante et animée, dépourvue de ressources exploitables mais riche en potentiel botanique.
foliax-perpectual-motor=Exploitez la puissance de l'arcane pour créer un moteur qui tourne indéfiniment.
foliax-exodus=Il est temps de faire ses valises et de quitter la ferme, il y a toute une galaxie à explorer !
foliax-omega=Découvrez les connaissances nécessaires pour créer une source d'alimentation aux possibilités infinies !
foliax-spawner=Découvrez les connaissances nécessaires pour créer des créatures à partir de plantes !
foliax-drill=Découvrez les connaissances nécessaires pour creuser profondément dans le sol gratuitement !
foliax-cryo=Découvrez les connaissances nécessaires pour rendre les usines pour produits chimiques plus résistantes.
foliax-lumberjack=Frappez ces arbres très fort et très vite.
foliax-promethium-one=Étape 1 : broyer les barres en poudre.
foliax-promethium-two=Étape 2 : mélanger les poudres avec la lave et les gaz.
foliax-promethium-three=Étape 3 : mélanger les fluides avec des composants organiques pour créer des graines.
foliax-promethium-four=Étape 5 : pressez ensemble les astéroïdes de l'espace et l'écorce de Prométhéus.
foliax-promethium-five=Étape 6 : libérer l'énergie contenue dans le bloc d'astéroïde de prométhium.
foliax-bars-productivity=Augmenter la production de recettes de barres de niveau 3 (chambre biologique).
foliax-circuit-productivity=Augmenter la production de recettes de circuits de Foliax.
foliax-solar-panel-equipment=Découvrez un panneau solaire personnel plus grand, tant en taille qu'en puissance.
foliax-scrap-productivity=Augmenter la production de toutes les recettes de foliax et de déchets de base.
foliax-worker-robots-storage=Augmenter la capacité de chargement des robots.
foliax-soil=Découvrez comment planter des arbres de Foliax sur d'autres mondes.
foliax-bar-to-plate=Utilisé pour transformer les barres de Foliax en plaques utilisables.
foliax-military-weapons-one=Arme de base pour vous défendre contre les extraterrestres.
foliax-military-weapons-two=Ne laissez pas ces extraterrestres envahir votre pelouse.
foliax-military-weapons-three=Chassez préventivement les extraterrestres de votre pelouse.
foliax-military-weapons-four=Dégagez ces sources extraterrestres à distance.
foliax-military-weapons-five=Supprimez ces sources extraterrestres pour toujours.
foliax-military-weapons-six=Manipulez la lumière et donnez-lui une touche personnelle.
foliax-military-weapons-seven=Vous êtes devenu la mort... et c'est magnifique.
foliax-military-weapons-eight=Distribuez des balles à visée radioactive.
foliax-military-turret-one=Une liberté automatisée face à la menace croissante des extraterrestres.
foliax-military-turret-two=Déployez toute votre liberté, montrez aux extraterrestres jusqu'où elle peut aller.
foliax-military-turret-three=Purifiez les âmes des extraterrestres avec la lumière.
foliax-military-turret-four=Les missiles visent toujours la tête lorsqu'il s'agit d'extraterrestres.
foliax-military-turret-five=Bombardons ces sources extraterrestres à distance, qui osera s'opposer à nous maintenant ?
foliax-military-turret-six=Les missiles ignorent les provocations, ils vont toujours droit au but, quelle que soit la distance.
foliax-military-turret-seven=Une découverte choquante : exploitez la puissance de la foudre en chaîne grâce à la science !
foliax-military-turret-eight=Transpercez l'âme de vos ennemis si fort que leurs ancêtres le ressentiront.
foliax-military-turret-nine=Menez une croisade contre les extraterrestres hérétiques avec le seigneur de la lumière, car la nuit est sombre et pleine de terreurs.
foliax-military-defense-one="Vous ne passerez pas !" Espérons que les extraterrestres aient tous la même taille.
foliax-military-defense-two=À bien y réfléchir, l'ingénieur et ses créations peuvent passer.
foliax-military-defense-three=Au cas où il y aurait un groupe d'extraterrestres et qu'ils viendraient nous chercher.
foliax-poison-laser-turret=Toute résistance est inutile.
foliax-poison-laser-turret-infinite=Avec plus de connaissances, même les astéroïdes ne peuvent résister à la puissance de cette tourelle.
foliax-military-upgrades-one=Nourrissez les laboratoires de violence liquide afin d'étudier des moyens plus rapides et plus meurtriers de détruire les extraterrestres.
foliax-military-upgrades-two=Nourrissez les laboratoires de violence liquide afin d'étudier des moyens plus rapides et plus meurtriers de détruire les extraterrestres.
foliax-military-upgrades-three=Nourrissez les laboratoires de violence liquide afin d'étudier des moyens plus rapides et plus meurtriers de détruire les extraterrestres.
pelagos-rum=Quelle est la lettre préférée des pirates ? On pourrait penser que c'est le R, mais le premier amour des pirates sera toujours le C.
foliax-matter=Découvrez les connaissances nécessaires pour manipuler la matière.
foliax-promethium-productivity=Augmenter la productivité de la chaîne de promethium sur Foliax.
