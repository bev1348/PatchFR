foliax-electronic-circuit=Circuit électronique correctement fabriqué.
foliax-omega-powerplant=Tentez de créer la centrale électrique la plus puissante jamais construite, qui n'explosera certainement pas à cause d'une négligence en matière de sécurité.
foliax-spawner=Tentez de créer une nouvelle vie, avec des plantes de Foliax, des poissons et l'arcane.
foliax-asteroid-pressing=Compressez les astéroïdes de l'espace et l'écorce de Prométhéus en une seule entité.
foliax-promethium-discharge=Libérez l'énergie pour créer une entité au potentiel énorme.

[entity-description]
iron-farm-tree=Un lichen de Foliax doté de sacs gazeux sous pression qui transforme la matière en décomposition en nodules de fer.
copper-farm-tree=Un lichen de Foliax doté de sacs gazeux sous pression qui transforme la matière en décomposition en nodules de cuivre.
stone-farm-tree=Un lichen de Foliax doté de sacs gazeux sous pression qui transforme la matière en décomposition en pierre.
coal-farm-tree=Un lichen de Foliax doté de sacs gazeux sous pression qui transforme la matière en décomposition en charbon.
uranium-farm-tree=Un lichen de Foliax avec un feuillage sec et clairsemé qui produit des lianes exceptionnellement solides, armées de barbes d'uranium.
tungsten-farm-tree=Un champignon de Foliax qui se présente sous la forme d'un entonnoir en tungstène.
holmium-farm-tree=Un lichen de Foliax avec un feuillage sec et clairsemé qui produit des lianes exceptionnellement solides, armées de barbes d'holmium.
calcite-farm-tree=Un champignon de Foliax à l'écorce dure en calcite et au chapeau velu en forme de massue.
scrap-farm-tree=Un arbre de Foliax dont l'écorce est composée d'une substance inconnue. Peut-être qu'un catalyseur provenant d'un autre arbre pourrait la transformer en un matériau utilisable.
bitumen-farm-tree=D'étranges empilements coralliens de bitume poussent depuis le sol.
obsidian-farm-tree=D'étranges empilements coralliens d'obsidienne poussent depuis le sol.
fluorite-farm-tree=D'étranges empilements coralliens de fluorite poussent depuis le sol.
lithium-farm-tree=Un champignon de Foliax avec des racines semblables à des tentacules et des nodules de lithium qui produisent un bruit de cliquetis.
bauxite-farm-tree=Un lichen de Foliax doté de sacs gazeux sous pression qui transforme la matière en décomposition en nodules de bauxite.
tin-farm-tree=Un lichen de Foliax doté de sacs gazeux sous pression qui transforme la matière en décomposition en nodules d'étain.
lead-farm-tree=Un lichen de Foliax doté de sacs gazeux sous pression qui transforme la matière en décomposition en nodules de plomb.
zinc-farm-tree=Un lichen de Foliax doté de sacs gazeux sous pression qui transforme la matière en décomposition en nodules de zinc.
raremetals-farm-tree=Un arbre de Foliax dont l'écorce est composée de divers métaux rares.
imersite-farm-tree=Un lichen de Foliax avec un feuillage sec et clairsemé qui produit des lianes exceptionnellement solides, armées de barbes en imersite.
wood-farm-tree=Un arbre ancien.
yumako-farm-tree=Un arbre de Foliax qui produit des fruits savoureux et nutritifs.
jellystem-farm-tree=Un arbre de Foliax avec une tige gélatineuse et des excroissances charnues et molles qui produisent des noix gélatineuses ridées.
sulfur-farm-tree=Un lichen de Foliax à la structure spongieuse qui produit des brimfruits.
arcane-farm-tree=L'énergie arcane de Foliax circule à travers ce saule, produisant des cubes d'énergie arcane.
promethium-farm-tree=Un arbre de Foliax dense et énergique dont les racines poussent très profondément, absorbant le sang d'une planète.
foliax-willow=Les saules de Foliax sont tristement célèbres pour leur capacité à capturer des graines et autres spécimens biologiques.
foliax-recycler=Recycleur conçu pour traiter les déchets sur Foliax.
foliax-omega-powerplant=D'un moment à l'autre, ça va se mettre en marche.
foliax-spawner=Une avancée scientifique révolutionnaire : créer des créatures à partir de plantes !
foliax-enemies-spawner=Éloignez-vous, quelque chose remonte à la surface.
foliax-mixer-machine=Mélangez différents fruits et/ou viandes. Savourez un rafraîchissement ou offrez une délicieuse friandise à votre laboratoire biologique affamé.
foliax-burner-biolab=Ce cerveau en cage a des goûts raffinés, aime travailler, mais uniquement lorsqu'on lui fournit des cocktails ou des bouteilles en verre à grignoter.
foliax-burner-biolab-mk2=Ce cerveau suralimenté en cage a des goûts raffinés, aime travailler, mais uniquement lorsqu'on lui fournit des cocktails ou des bouteilles en verre à grignoter.
foliax-arcane-turret=La composition d'arcane de cette tourelle se dégradera au bout de 10 heures de fonctionnement.
foliax-leyline=Un autel qui capte les lignes telluriques de Foliax, accumulant peu à peu des [item=foliax-arcane-cube].

[technology-description]
foliax-perpectual-motor=Exploitez la puissance de l'arcane pour créer un moteur qui tourne indéfiniment.
foliax-exodus=Il est temps de faire ses valises et de quitter la ferme, il y a toute une galaxie à explorer !
foliax-lumberjack=Frappez ces arbres très fort et très vite.
foliax-promethium-one=Étape 1 : broyer les barres en poudre.
foliax-promethium-two=Étape 2 : mélanger les poudres avec la lave et les gaz.
foliax-promethium-three=Étape 3 : mélanger les fluides avec des composants organiques pour créer des graines.
foliax-promethium-four=Étape 5 : pressez ensemble les astéroïdes de l'espace et l'écorce de Prométhéus.
foliax-promethium-five=Étape 6 : libérer l'énergie contenue dans le bloc d'astéroïde de prométhium.
foliax-bars-productivity=Augmenter la production de recettes de barres de niveau 3 (chambre biologique).
foliax-circuit-productivity=Augmenter la production de recettes de circuits de Foliax.
foliax-solar-panel-equipment=Découvrez un panneau solaire personnel plus grand, tant en taille qu'en puissance.
foliax-scrap-productivity=Augmenter la production de toutes les recettes de déchets de Foliax.
foliax-worker-robots-storage=Augmenter la capacité de chargement des robots.
foliax-soil=Découvrez comment planter des arbres de Foliax sur d'autres mondes.
foliax-bar-to-plate=Pressez les barres de Foliax pour former des plaques prêtes à l'emploi.
foliax-military-weapons-one=Arme de base pour vous défendre contre les extraterrestres.
foliax-military-weapons-two=Ne laissez pas ces extraterrestres envahir votre pelouse.
foliax-military-weapons-three=Chassez préventivement les extraterrestres de votre pelouse.
foliax-military-weapons-four=Dégagez ces sources extraterrestres à distance.
foliax-military-weapons-five=Supprimez ces sources extraterrestres pour toujours.
foliax-military-weapons-six=Manipulez la lumière et donnez-lui une touche personnelle.
foliax-military-weapons-seven=Vous êtes devenu la mort... et c'est magnifique.
foliax-military-weapons-eight=Distribuez des balles à visée radioactive.
foliax-military-turret-one=Une liberté automatisée face à la menace croissante des extraterrestres.
foliax-military-turret-two=Déployez toute votre liberté, montrez aux extraterrestres jusqu'où elle peut aller.
foliax-military-turret-three=Purifiez les âmes des extraterrestres avec la lumière.
foliax-military-turret-five=Bombardons ces sources extraterrestres à distance, qui osera s'opposer à nous maintenant ?
foliax-military-turret-six=Les missiles ignorent les provocations, ils vont toujours droit au but, quelle que soit la distance.
foliax-military-turret-nine=Menez une croisade contre les extraterrestres hérétiques avec le seigneur de la lumière, car la nuit est sombre et pleine de terreurs.
foliax-arcane-turret=Canalise l'énergie d'arcane de Foliax vers de très gros rochers ou des extraterrestres.
foliax-military-defense-one="Vous ne passerez pas !" Espérons que les extraterrestres aient tous la même taille.
foliax-military-defense-two=À bien y réfléchir, l'ingénieur et ses créations peuvent passer.
foliax-military-defense-three=Au cas où il y aurait un groupe d'extraterrestres et qu'ils viendraient nous chercher.
foliax-military-upgrades-one=Nourrissez les laboratoires de violence liquide afin d'étudier des moyens plus rapides et plus meurtriers de détruire les extraterrestres.
foliax-military-upgrades-two=Nourrissez les laboratoires de violence liquide afin d'étudier des moyens plus rapides et plus meurtriers de détruire les extraterrestres.
