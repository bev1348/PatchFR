[item-description]
foliax-arcane-cube=Cube mystérieux composé d'une substance inconnue. Semble réagir de manière étrange au contact d'autres objets.
foliax-sulfur-fruit=Un fruit âcre composé d'une substance semblable à de la sève à l'intérieur d'un noyau cristallin.
foliax-perpectual-motor=Un moteur fonctionnant à l'arcane qui tourne indéfiniment.
foliax-omega-powerplant=Reculez et admirez cette magnifique prouesse technique. Sérieusement, reculez.
foliax-charged-promethium-asteroid-chunk=La combinaison d'astéroïdes et d'écorce de Prométhéus a créé un nouveau bloc à fort potentiel énergétique.
foliax-arcane-gear-wheel=Engrenage imprégné d'arcane. Semble se dilater ou se contracter, voire se dupliquer si nécessaire.
foliax-machine-arm=Bras de machine imprégné d'arcane. Semble se dilater ou se contracter, voire se dupliquer si nécessaire.
iron-plant-biomass=Les gousses d'Arbor Ferréa contiennent des concentrations élevées de fer.
copper-plant-biomass=Les gousses d'Arbor Cupréa contiennent des concentrations élevées de cuivre.
bitumen-plant-biomass=Les coraux d'Arbor Pétroléi contiennent des concentrations élevées de bitume.
uranium-plant-biomass=Les barbes d'Arbor Potentium contiennent des concentrations élevées d'uranium.
calcite-plant-biomass=L'écorce d'Arbor Marmorea contient des concentrations élevées de calcite.
tungsten-plant-biomass=L'écorce d'Arbor Durissima contient des concentrations élevées de tungstène.
obsidian-plant-biomass=Les coraux d'Arbor Ignéus contiennent des concentrations élevées d'obsidienne.
holmium-plant-biomass=Les barbes d'Arbor Fulminis contiennent des concentrations élevées d'holmium.
lithium-plant-biomass=Les gousses d'Arbor Lithiosus contiennent des concentrations élevées de lithium.
fluorite-plant-biomass=Les coraux d'Arbor Fluoricus contiennent des concentrations élevées de fluorite.
scrap-plant-biomass=L'écorce d'Arbor purgamentum contient une substance étrange qui, une fois traitée, crée des déchets industriels.
bauxite-plant-biomass=Les gousses d'Arbor Argillaris contiennent des concentrations élevées d'alumine.
tin-plant-biomass=Les gousses d'Arbor Stannalis contiennent des concentrations élevées d'étain.
lead-plant-biomass=Les gousses d'Arbor Plumbalis contiennent des concentrations élevées de plomb.
zinc-plant-biomass=Les gousses d'Arbor Calamina contiennent des concentrations élevées de zinc.
raremetals-plant-biomass=L'écorce d'Arbor Singularis contient diverses concentrations de métaux rares.
imersite-plant-biomass=Les barbes d'Arbor Vigoréum contiennent des concentrations élevées d'imersite.
foliax-promethium-biomass=L'écorce d'Arbor Prométhéus est imprégné du sang d'une planète.
foliax-fruit-juice=Simple, puissant et délicieux. Les laboratoires biologiques semblent apprécier ce produit, allant même jusqu'à consommer le verre.
foliax-fish-juice=Boisson très nutritive qui confère à l'ingénieur une vitesse surhumaine lorsqu'il la consomme.
foliax-radio-juice=Boire des radiations pourrait faire de l'ingénieur un super-héros, du moins pendant un certain temps.
foliax-glass-bottle=À jeter par terre pour indiquer que la boisson est acceptable.
foliax-research-bottle=À jeter par terre pour indiquer que l'étude est acceptable.
foliax-nutrient-juice=Minéraux essentiels pour favoriser la réponse cognitive et l'énergie.
pelagos-rum=Lancez ce rhum de qualité vers vos ennemis pour tenter de négocier.
foliax-tolerance-module-1=Tolérance artificielle aux boissons mélangées.

