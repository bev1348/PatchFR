fluorite-plant-biomass=Les coraux d'Arbor Fluoricus contiennent des concentrations élevées de fluorite.
scrap-plant-biomass=L'écorce d'Arbor purgamentum contient une substance étrange qui, une fois traitée, crée des déchets industriels.
bauxite-plant-biomass=Les gousses d'Arbor Argillaris contiennent des concentrations élevées d'alumine.
