[mod-name]
m-rpg_items=RPG Items (Objet RPG)

[mod-description]
m-rpg_items=63 objets, 30 effets, un max de fun !\nAuteur : OwnlyMe\nModifié par ZwerOxotnik

[mod-setting-name]
dota_regeneration_hack=Ajustement de régénération
rpgitems_price_mult=Multiplicateur de prix

[mod-setting-description]
dota_regeneration_hack=Annule la régénération de santé des joueurs et la simule lorsque le scénario n'est pas en cours d'exécution (0,020 mises à jour par seconde et par joueur)
rpgitems_price_mult=Les prix sont équilibrés de manière à ce que vous puissiez vous offrir 6 objets en 50 heures de jeu.\nVeuillez ajuster ce paramètre si vos parties durent plus longtemps.

