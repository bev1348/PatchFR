potion=Restaure 90 points de vie
mana_potion=Restaure 30 points de mana
amnesia_book=Vous permet de réinitialiser vos compétences.\nVous confère +3 points de compétence (RGBW)\nLes bonus qui changent toutes les heures repartiront de 0 !
staff=[color=0.7,0.7,0.7]La probabilité d'étourdissement est doublée lors des attaques des joueurs[/color]
staff_spepa=[color=0.7,0.7,0.7]La probabilité d'étourdissement est triplée lors des attaques des joueurs[/color]
bonus_slot=+1 Emplacement d'objet

