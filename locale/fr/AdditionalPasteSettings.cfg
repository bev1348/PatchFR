[mod-name]
AdditionalPasteSettings_CoreNest=Additional Paste Settings (Extended) (Paramètres supplémentaires de collage (avancés))

[mod-description]
AdditionalPasteSettings_CoreNest=Cette version dérivée est publiée séparément de la version originale Additional Paste Settings sur le portail des mods.\n\nElle ajoute des paramètres de collage supplémentaires pour le jeu (Maj+Clic droit -> Maj+Clic gauche), tels que la fusion/combinaison des demandes au niveau des coffres logistiques, la définition d'un multiplicateur de demande fixe, la possibilité de modifier le comportement standard de 30 secondes et la possibilité de coller depuis des machines d'assemblage vers des bras pour leur attribuer une condition.


