[controls-description]
additional-paste-settings-hotkey=Pour la plupart des utilisateurs, ce devrait être Maj+Clic gauche. Ce devrait TOUJOURS être la touche de raccourci qui permet de coller les paramètres sur les entités.
additional-paste-settings-hotkey-alt=Pour la plupart des utilisateurs, ce devrait être SHIFT + ALT + clic gauche. Cette touche permet de diviser par deux le nombre de piles d'un bras.

