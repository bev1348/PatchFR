additional-paste-settings-options-train-stop-assembler-products-load-unload-then-input-unloads=Arrêt de train (depuis la machine d'assemblage) : Chargement/Déchargement des produits, puis saisie des Déchargements
additional-paste-settings-options-train-stop-assembler-ltn-inputs-bundle-step=Arrêt de train (depuis la machine d'assemblage) : toutes les entrées avec un seul nom, dans le style LTN (entre les produits et les déchargements par entrée)
