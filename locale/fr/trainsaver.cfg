
[mod-name]
trainsaver=trainsaver (économiseur d'écran ferroviaire)

[mod-description]
trainsaver=Un économiseur d'écran dynamique qui suit les trains dans leurs déplacements. \nUtilisez __CONTROL_STYLE_BEGIN__Ctrl+T__CONTROL_STYLE_END__ pour l'activer ou le désactiver, et __CONTROL_STYLE_BEGIN__Droite__CONTROL_STYLE_END__ / __CONTROL_STYLE_BEGIN__Gauche__CONTROL_STYLE_END__ pour changer de cible. Consultez les paramètres du mod pour connaître les options de configuration.

[mod-setting-name]
ts-transition-speed=Vitesse de transition (km/h)
ts-transition-time=Durée de  transition (secondes)
ts-wait-at-signal=Minimum au signal (secondes)
ts-station-minimum=Minimum à la gare (secondes)
ts-driving-minimum=Minimum en mouvement (minutes)
ts-zoom=Zoom
ts-variable-zoom=Zoom variable
ts-time-wait=Délai d'inactivité (minutes)
ts-afk-auto-start=Démarrage automatique en AFK (minutes)
ts-autostart-while-viewing-map=Démarrage automatique lorsque la carte est ouverte
ts-autostart-while-gui-is-open=Démarrage automatique lorsqu'une interface graphique est ouverte
ts-menu-hotkey=Quitter avec le menu
ts-linked-game-control-hotkey=Quitter avec des commandes du jeu
ts-notable-events=Afficher les événements marquants
ts-secrets=Autoriser l'élargissement des cibles

[mod-setting-description]
ts-transition-speed=Vitesse de déplacement de la caméra lors des transitions entre les trains. \n[color=blue]Valeur par défaut :[/color] [color=orange]0[/color] (transitions instantanées) \nValeurs recommandées en fonction de la vitesse maximale des trains : \n[color=orange]259[/color] pour les trains utilisant du [item=coal] ou du [item=wood] comme carburant  \n[color=orange]272[/color] pour les trains utilisant du [item=solid-fuel] comme carburant  \n[color=orange]298[/color] pour les trains utilisant du [item=rocket-fuel] ou du [item=nuclear-fuel] comme carburant
ts-transition-time=Le nombre de secondes nécessaires pour passer d'un train à l'autre. \n[color=blue]Valeur par défaut :[/color] [color=orange]0[/color] (transitions instantanées) \nRemarque : Trainsaver utilisera par défaut la Vitesse de transition plutôt que la Durée de transition lorsque la Vitesse de transition est supérieure à 0.
ts-wait-at-signal=Durée minimale (en secondes) pendant laquelle la caméra reste positionnée sur un train arrêté à un signal. \n[color=blue]Valeur par défaut :[/color] [color=orange]30[/color]
ts-station-minimum=Durée minimale (en secondes) pendant laquelle la caméra reste positionnée sur un train arrêté en gare. \n[color=blue]Valeur par défaut :[/color] [color=orange]5[/color]
ts-driving-minimum=Durée minimale (en minutes) pendant laquelle la caméra reste positionnée sur un train en mouvement. \n[color=blue]Valeur par défaut :[/color] [color=orange]10[/color]
ts-zoom=Niveau de zoom de la caméra pendant le mode d'économiseur d'écran. Plus la valeur est faible, plus le zoom est éloigné. Le zoom par défaut du jeu est [color=orange]1,5[/color]. \n[color=blue]Par défaut :[/color] [color=orange]0,375[/color]
ts-variable-zoom=Lorsque cette option est activée, le zoom de la caméra peut varier de [color=orange]±20%[/color]
ts-time-wait=Le nombre de minutes avant la fin de l'économiseur d'écran lorsqu'aucun train n'est en service. \n[color=blue]Par défaut :[/color] [color=orange]15[/color]
ts-afk-auto-start=Durée minimale (en minutes) avant que l'économiseur d'écran ne se lance automatiquement lorsque le joueur est AFK. 0 pour qu'il ne se lance jamais automatiquement. \n[color=blue]Valeur par défaut :[/color] [color=orange]5[/color]
# ts-autostart-while-viewing-map=Détermine si l'économiseur d'écran se lance automatiquement après un certain temps lorsque le joueur consulte la carte
# ts-autostart-while-gui-is-open=Détermine si l'économiseur d'écran se lance automatiquement après un certain temps lorsque le joueur a une interface graphique ouverte
ts-menu-hotkey=Quitter l'économiseur d'écran à l'ouverture du menu du jeu (__CONTROL__toggle-menu__)
ts-linked-game-control-hotkey=Quitter l'économiseur d'écran lorsqu'une touche de contrôle du jeu est enfoncée (déplacement (__CONTROL_STYLE_BEGIN____CONTROL_MOVE____CONTROL_STYLE_END__), inventaire (__CONTROL__open-character-gui__), réseau logistique (__CONTROL__logistic-networks__), etc.)
ts-notable-events=Affiche un message dans la console lorsque certains événements particuliers se produisent
ts-secrets=Spider ?? Je le connais à peine !

