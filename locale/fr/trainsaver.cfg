[ts-command-help]
trainsaver=- Active ou désactive Trainsaver, un économiseur d'écran dynamique qui suit les trains en circulation
ts-start=- Lance Trainsaver : place le joueur en mode économiseur d'écran dynamique
ts-end=- Arrête trainsaver : rend immédiatement le contrôle de la caméra au joueur
ts-verbose=- Active ou désactive les messages de débogage de Trainsaver dans la console
ts-reset_history=- Efface l'historique de Trainsaver
ts-ignore_stations=- Les trains à destination des gares indiquées ne seront pas considérés comme des cibles potentielles. Complétez la commande en ajoutant des gares à l'aide de  __CONTROL__place-in-chat__ \nExemple : [color=orange]/ts-ignore_stations [train-stop=__1__][/color]
ts-unignore_stations=- Supprime des gares de la liste des gares ignorées. Complétez la commande en ajoutant des gares à l'aide de __CONTROL__place-in-chat__ \nExemple : [color=orange]/ts-unignore_stations [train-stop=__1__][/color]
ts-list_ignored_stations=- Affiche la liste de toutes les gares actuellement sur la liste des gares ignorées
ts-next_target=- Montre la cible suivante dans l'historique dans Trainsaver
ts-previous_target=- Montre la cible précédente dans l'historique dans Trainsaver

[ts-messages]
station-ignored=[color=orange]Trainsaver :[/color] __1__ a ajouté les gares nommées [__2__] à la liste des gares à ignorer
station-already-ignored=[color=orange]Trainsaver :[/color] Les gares nommées [__1__] figurent déjà sur la liste des gares à ignorer
station-unignored=[color=orange]Trainsaver :[/color] __1__ a supprimé les gares nommées [__2__] de la liste des gares à ignorer
station-not-ignored=[color=orange]Trainsaver :[/color] Les gares nommées [__1__] ne figurent pas sur la liste des gares à ignorer
ignored-stations-list=[color=orange]Trainsaver :[/color] Gares ignorées : \n- __1__
no-ignored-stations=[color=orange]Trainsaver :[/color] Il n'y a actuellement aucune gare ignorée
failed-to-parse-station=[color=orange]Trainsaver :[/color] Impossible d'analyser les noms de gares à partir de la saisie : "__1__"
ts-ignore_stations-help=Utilisez __CONTROL__place-in-chat__ sur des gares pour les ajouter à la commande /ts-ignore_stations. \nExemple : [color=orange]/ts-ignore_stations [train-stop=__1__] [train-stop=__2__][/color]
ts-unignore_stations-help=Utilisez __CONTROL__place-in-chat__ sur des gares pour les ajouter à la commande /ts-unignore_stations. \nExemple : [color=orange]/ts-unignore_stations [train-stop=__1__] [train-stop=__2__][/color]


