[technology-description]
geothermal=Extraction d'énergie à partir de la chaleur naturelle de la planète, provenant soit de roches en fusion, soit de réservoirs souterrains surchauffés.
geothermal-hot-exchanger=Un perfectionnement par rapport au précédent, permettant une meilleure production d'énergie.
geothermal-heat-well=Extraction directe de la chaleur à partir de sources thermiques naturelles, avec un potentiel de production énorme.
geothermal-heat-well-efficiency=Augmenter l'efficacité des Forages géothermiques.
geothermal-filtering=Suppression des oligo-éléments de l'eau extraite pour simplifier le traitement.
insulated-wagon=Un wagon-citerne isolé thermiquement, pour permettre le transport de liquides chauffés sans pertes.


